<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Trail Mix</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --rock: #475569;
            --trail: #22c55e;
            --trail-dim: rgba(34, 197, 94, 0.25);
            --accent: #38bdf8;
            --text: #f8fafc;
            --muted: #94a3b8;
            --checkpoint: #fbbf24;
            --cell: 48px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse 100% 80% at 50% -30%, rgba(34, 197, 94, 0.12), transparent 50%), var(--bg);
            color: var(--text);
            padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            max-width: 520px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--trail);
        }

        .tagline {
            margin: 0;
            font-size: 0.88rem;
            color: var(--muted);
            line-height: 1.45;
        }

        #hud {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px 16px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        #hud strong { color: var(--accent); }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 18px;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 0.82rem;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            touch-action: manipulation;
        }

        button.primary {
            background: linear-gradient(180deg, #0ea5e9, #0284c7);
            border-color: rgba(56, 189, 248, 0.5);
        }

        button:hover {
            filter: brightness(1.06);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #board-wrap {
            padding: 14px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        #board {
            display: grid;
            gap: 3px;
            background: var(--border);
            padding: 3px;
            border-radius: 8px;
            user-select: none;
        }

        .cell {
            width: var(--cell);
            height: var(--cell);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .cell.grass {
            background: linear-gradient(145deg, #14532d 0%, #166534 100%);
            color: transparent;
        }

        .cell.rock {
            background: linear-gradient(145deg, #374151, var(--rock));
            cursor: default;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.35);
        }

        .cell.path {
            background: linear-gradient(145deg, #15803d, var(--trail));
            box-shadow: inset 0 0 12px var(--trail-dim);
            color: rgba(255, 255, 255, 0.95);
        }

        .cell.path-start {
            box-shadow: 0 0 0 2px var(--accent), inset 0 0 12px var(--trail-dim);
        }

        .cell.checkpoint {
            background: linear-gradient(145deg, #a16207, var(--checkpoint));
            color: #1c1917;
            font-size: 1.15rem;
        }

        .cell.path.checkpoint {
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .cell.hint-next {
            animation: pulse 1.2s ease infinite;
        }

        @keyframes pulse {
            50% { box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.55); }
        }

        #msg {
            min-height: 1.5rem;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 12px;
            color: var(--muted);
        }

        #msg.win { color: var(--trail); }
        #msg.hint { color: #fbbf24; font-weight: 600; }

        @media (max-width: 420px) {
            :root { --cell: 40px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Trail Mix</h1>
    <p class="tagline">Walk the trail in order: reach <strong style="color:var(--checkpoint)">1 → 2 → 3…</strong> on open grass. Rocks block you. You can’t step on the same tile twice.</p>
</header>

<div id="hud">
    <span>Level <strong id="lvl-num">1</strong> / <span id="lvl-total">5</span></span>
    <span>Next: <strong id="next-cp">—</strong></span>
</div>

<div id="board-wrap">
    <div id="board" role="application" aria-label="Trail puzzle grid"></div>
</div>

<p id="msg" role="status" aria-live="polite"></p>

<div class="btn-row">
    <button type="button" id="btn-undo">Undo step</button>
    <button type="button" id="btn-reset">Reset path</button>
    <button type="button" id="btn-next" class="primary" disabled>Next level</button>
</div>

<script>
(function () {
    'use strict';

    /** @typedef {{ rows: number, cols: number, rocks: string[], markers: Record<string, number> }} Puzzle */

    /** @type {Puzzle[]} */
    /** Layouts verified with checkpoint-order pathfinder (see verify-levels.mjs). */
    var LEVELS = [
        {
            rows: 5,
            cols: 5,
            rocks: ['0,4', '3,1'],
            markers: { '1,1': 1, '3,3': 2, '4,4': 3 }
        },
        {
            rows: 6,
            cols: 6,
            rocks: ['3,2', '3,3', '2,3'],
            markers: { '5,0': 1, '0,0': 2, '0,5': 3, '5,5': 4 }
        },
        {
            rows: 7,
            cols: 7,
            rocks: ['1,1', '1,2', '2,1', '5,5', '5,6', '6,5'],
            markers: { '3,3': 1, '0,6': 2, '6,0': 3, '3,0': 4 }
        },
        {
            rows: 6,
            cols: 8,
            rocks: ['2,0', '2,2', '2,4', '2,6', '4,1', '4,3', '4,5', '4,7'],
            markers: { '0,1': 1, '0,2': 2, '0,3': 3, '0,4': 4, '0,5': 5 }
        },
        {
            rows: 8,
            cols: 8,
            rocks: ['0,4', '1,4', '2,4', '3,5', '4,5', '5,2'],
            markers: { '7,1': 1, '7,2': 2, '7,3': 3, '7,4': 4, '7,5': 5, '7,6': 6 }
        }
    ];

    var levelIndex = 0;
    var path = [];
    var pathSet = new Set();
    var maxMarker = 0;
    var nextRequired = 1;
    var won = false;

    var boardEl = document.getElementById('board');
    var msgEl = document.getElementById('msg');

    function key(r, c) {
        return r + ',' + c;
    }

    function parseKey(k) {
        var p = k.split(',');
        return { r: +p[0], c: +p[1] };
    }

    function getPuzzle() {
        return LEVELS[levelIndex];
    }

    function cellMarker(r, c) {
        var m = getPuzzle().markers[key(r, c)];
        return m === undefined ? 0 : m;
    }

    function isRock(r, c) {
        return getPuzzle().rocks.indexOf(key(r, c)) !== -1;
    }

    function renderBoard() {
        var p = getPuzzle();
        maxMarker = 0;
        Object.keys(p.markers).forEach(function (k) {
            if (p.markers[k] > maxMarker) maxMarker = p.markers[k];
        });

        boardEl.style.gridTemplateColumns = 'repeat(' + p.cols + ', var(--cell))';
        boardEl.replaceChildren();

        for (var r = 0; r < p.rows; r++) {
            for (var c = 0; c < p.cols; c++) {
                var cell = document.createElement('button');
                cell.type = 'button';
                cell.className = 'cell';
                cell.dataset.r = String(r);
                cell.dataset.c = String(c);

                if (isRock(r, c)) {
                    cell.classList.add('rock');
                    cell.disabled = true;
                    cell.setAttribute('aria-label', 'Rock at row ' + (r + 1) + ' column ' + (c + 1));
                } else {
                    var mk = cellMarker(r, c);
                    if (mk) {
                        cell.classList.add('grass', 'checkpoint');
                        cell.textContent = String(mk);
                        cell.setAttribute('aria-label', 'Checkpoint ' + mk + ' at row ' + (r + 1) + ' column ' + (c + 1));
                    } else {
                        cell.classList.add('grass');
                        cell.setAttribute('aria-label', 'Grass at row ' + (r + 1) + ' column ' + (c + 1));
                    }
                    cell.addEventListener('click', onCellClick);
                }
                boardEl.appendChild(cell);
            }
        }
        paintPath();
        updateHud();
    }

    function paintPath() {
        var cells = boardEl.querySelectorAll('.cell:not(.rock)');
        cells.forEach(function (el) {
            el.classList.remove('path', 'path-start', 'hint-next');
            var r = +el.dataset.r;
            var c = +el.dataset.c;
            var k = key(r, c);
            var mk = cellMarker(r, c);
            if (mk) {
                el.textContent = String(mk);
                el.classList.add('checkpoint');
            } else {
                el.textContent = '';
            }
        });

        path.forEach(function (k, i) {
            var o = parseKey(k);
            var el = boardEl.querySelector('.cell[data-r="' + o.r + '"][data-c="' + o.c + '"]');
            if (!el) return;
            el.classList.add('path');
            if (i === 0) el.classList.add('path-start');
            var mk = cellMarker(o.r, o.c);
            if (mk) {
                el.classList.add('checkpoint');
                el.textContent = String(mk);
            }
        });

        hintNextMoves();
    }

    function hintNextMoves() {
        if (won || path.length === 0) return;
        var last = parseKey(path[path.length - 1]);
        var dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        dirs.forEach(function (d) {
            var nr = last.r + d[0];
            var nc = last.c + d[1];
            var p = getPuzzle();
            if (nr < 0 || nr >= p.rows || nc < 0 || nc >= p.cols) return;
            if (isRock(nr, nc)) return;
            var nk = key(nr, nc);
            if (pathSet.has(nk)) return;
            if (canStepTo(nr, nc)) {
                var el = boardEl.querySelector('.cell[data-r="' + nr + '"][data-c="' + nc + '"]');
                if (el) el.classList.add('hint-next');
            }
        });
    }

    function canStepTo(r, c) {
        if (isRock(r, c)) return false;
        var k = key(r, c);
        if (pathSet.has(k)) return false;
        var mk = cellMarker(r, c);
        if (mk === 0) return true;
        return mk === nextRequired;
    }

    function onCellClick(ev) {
        var el = ev.currentTarget;
        if (won) return;
        var r = +el.dataset.r;
        var c = +el.dataset.c;
        var k = key(r, c);

        if (path.length === 0) {
            var startMk = cellMarker(r, c);
            if (startMk !== 1) {
                flashMsg('Start at checkpoint 1.', 'hint');
                return;
            }
            path.push(k);
            pathSet.add(k);
            nextRequired = 2;
            flashMsg('');
            paintPath();
            checkWin();
            return;
        }

        var last = parseKey(path[path.length - 1]);
        var dr = Math.abs(r - last.r);
        var dc = Math.abs(c - last.c);
        if (dr + dc !== 1) {
            flashMsg('Move to an adjacent grass tile.', 'hint');
            return;
        }

        if (!canStepTo(r, c)) {
            var mk = cellMarker(r, c);
            if (mk > 0 && mk !== nextRequired) {
                flashMsg('Reach checkpoint ' + nextRequired + ' next.', 'hint');
            } else {
                flashMsg("Can't revisit a tile.", 'hint');
            }
            return;
        }

        path.push(k);
        pathSet.add(k);
        var stepped = cellMarker(r, c);
        if (stepped > 0) nextRequired = stepped + 1;
        flashMsg('');
        paintPath();
        checkWin();
    }

    function checkWin() {
        if (nextRequired <= maxMarker) return;
        won = true;
        flashMsg('Trail complete!', 'win');
        document.getElementById('btn-next').disabled = levelIndex >= LEVELS.length - 1;
        paintPath();
    }

    function flashMsg(text, cls) {
        msgEl.textContent = text || '';
        msgEl.className = cls || '';
    }

    function recomputeNextFromPath() {
        nextRequired = 1;
        path.forEach(function (k) {
            var o = parseKey(k);
            var m = cellMarker(o.r, o.c);
            if (m > 0) nextRequired = m + 1;
        });
    }

    function updateHud() {
        document.getElementById('lvl-num').textContent = String(levelIndex + 1);
        document.getElementById('lvl-total').textContent = String(LEVELS.length);
        document.getElementById('next-cp').textContent =
            path.length === 0 ? '1 (tap to start)' : won ? 'Done' : String(nextRequired);
    }

    function undo() {
        if (won || path.length <= 1) return;
        path.pop();
        pathSet = new Set(path);
        recomputeNextFromPath();
        won = false;
        document.getElementById('btn-next').disabled = true;
        flashMsg('');
        paintPath();
        updateHud();
    }

    function resetPath() {
        path = [];
        pathSet.clear();
        nextRequired = 1;
        won = false;
        flashMsg('');
        document.getElementById('btn-next').disabled = true;
        paintPath();
        updateHud();
    }

    function nextLevel() {
        if (levelIndex >= LEVELS.length - 1) return;
        levelIndex++;
        resetPath();
        renderBoard();
    }

    function init() {
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-reset').addEventListener('click', resetPath);
        document.getElementById('btn-next').addEventListener('click', nextLevel);
        renderBoard();
    }

    init();
})();
</script>
</body>
</html>
