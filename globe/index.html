<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Earth Globe</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #050518 0%, #010108 70%, #000000 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
      max-width: 420px;
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    p {
      margin: 3px 0;
      color: #d7d7d7;
      font-size: 0.9rem;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1rem;
      z-index: 20;
      text-shadow: 0 2px 8px black;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="ui-overlay">
    <h1>Interactive 3D Earth</h1>
    <p>Red marker: North Pole | Blue marker: South Pole</p>
    <p>Click/touch and drag to rotate the Earth.</p>
  </div>

  <div id="loading">Loading Earth textures...</div>

  <script>
    // -----------------------------
    // 1. Scene, camera, renderer
    // -----------------------------

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 0, 4.5);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    if (THREE.sRGBEncoding) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }

    document.body.appendChild(renderer.domElement);

    // -----------------------------
    // 2. Lighting
    // -----------------------------

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.28);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.65);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);

    const rimLight = new THREE.DirectionalLight(0x88aaff, 0.35);
    rimLight.position.set(-4, 1, -5);
    scene.add(rimLight);

    // -----------------------------
    // 3. Star field
    // -----------------------------

    const starGeometry = new THREE.BufferGeometry();
    const starCount = 2500;
    const starPositions = [];

    for (let i = 0; i < starCount; i++) {
      const radius = 60 + Math.random() * 80;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);

      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.sin(phi) * Math.sin(theta);
      const z = radius * Math.cos(phi);

      starPositions.push(x, y, z);
    }

    starGeometry.setAttribute(
      "position",
      new THREE.Float32BufferAttribute(starPositions, 3)
    );

    const starMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.07,
      sizeAttenuation: true
    });

    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // -----------------------------
    // 4. Earth group
    // -----------------------------

    const globeGroup = new THREE.Group();

    // Natural Earth axial tilt
    globeGroup.rotation.z = THREE.MathUtils.degToRad(23.5);

    scene.add(globeGroup);

    // -----------------------------
    // 5. Texture loading
    // -----------------------------

    const loader = new THREE.TextureLoader();

    let texturesLoaded = 0;
    const totalTextures = 4;

    function textureDone() {
      texturesLoaded++;

      if (texturesLoaded >= totalTextures) {
        const loading = document.getElementById("loading");

        if (loading) {
          loading.style.display = "none";
        }
      }
    }

    function loadTexture(url) {
      const texture = loader.load(
        url,
        textureDone,
        undefined,
        function () {
          console.warn("Could not load texture:", url);
          textureDone();
        }
      );

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      return texture;
    }

    /*
      These are external texture files hosted by the Three.js project.

      This will run on GitHub Pages as long as these URLs are available.

      For a more permanent app version, download the texture files,
      place them in your own repo, and change the paths to local files:

        assets/earth/earth_atmos_2048.jpg
        assets/earth/earth_bump_2048.jpg
        assets/earth/earth_specular_2048.jpg
        assets/earth/earth_clouds_1024.png
    */

    const earthTexture = loadTexture(
      "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
    );

    const bumpMap = loadTexture(
      "https://threejs.org/examples/textures/planets/earth_bump_2048.jpg"
    );

    const specularMap = loadTexture(
      "https://threejs.org/examples/textures/planets/earth_specular_2048.jpg"
    );

    const cloudTexture = loadTexture(
      "https://threejs.org/examples/textures/planets/earth_clouds_1024.png"
    );

    // -----------------------------
    // 6. Earth sphere
    // -----------------------------

    const earthGeometry = new THREE.SphereGeometry(1.5, 128, 128);

    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthTexture,
      bumpMap: bumpMap,
      bumpScale: 0.045,
      specularMap: specularMap,
      specular: new THREE.Color(0x777777),
      shininess: 20
    });

    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earth);

    // -----------------------------
    // 7. Cloud layer
    // -----------------------------

    const cloudGeometry = new THREE.SphereGeometry(1.518, 128, 128);

    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: 0.42,
      depthWrite: false
    });

    const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
    globeGroup.add(clouds);

    // -----------------------------
    // 8. Atmosphere glow
    // -----------------------------

    const atmosphereGeometry = new THREE.SphereGeometry(1.58, 128, 128);

    const atmosphereMaterial = new THREE.MeshBasicMaterial({
      color: 0x4da6ff,
      transparent: true,
      opacity: 0.13,
      side: THREE.BackSide
    });

    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    globeGroup.add(atmosphere);

    // -----------------------------
    // 9. Pole markers
    // -----------------------------

    function addPoleMarker(y, color) {
      const markerGroup = new THREE.Group();

      const pinMaterial = new THREE.MeshBasicMaterial({
        color: color
      });

      const stemGeometry = new THREE.CylinderGeometry(0.018, 0.018, 0.35, 20);
      const stem = new THREE.Mesh(stemGeometry, pinMaterial);

      stem.position.y = y > 0 ? y + 0.18 : y - 0.18;

      const ballGeometry = new THREE.SphereGeometry(0.065, 32, 32);
      const ball = new THREE.Mesh(ballGeometry, pinMaterial);

      ball.position.y = y > 0 ? y + 0.38 : y - 0.38;

      markerGroup.add(stem);
      markerGroup.add(ball);

      globeGroup.add(markerGroup);
    }

    addPoleMarker(1.5, 0xff3333);  // North Pole
    addPoleMarker(-1.5, 0x3366ff); // South Pole

    // -----------------------------
    // 10. Mouse and touch controls
    // -----------------------------

    const state = {
      isDragging: false,
      previousX: 0,
      previousY: 0,
      spinX: 0,
      spinY: 0
    };

    function pointerDown(x, y) {
      state.isDragging = true;
      state.previousX = x;
      state.previousY = y;
    }

    function pointerMove(x, y) {
      if (!state.isDragging) {
        return;
      }

      const deltaX = x - state.previousX;
      const deltaY = y - state.previousY;

      state.spinY = deltaX * 0.0048;
      state.spinX = deltaY * 0.0048;

      globeGroup.rotation.y += state.spinY;
      globeGroup.rotation.x += state.spinX;

      state.previousX = x;
      state.previousY = y;
    }

    function pointerUp() {
      state.isDragging = false;
    }

    window.addEventListener("mousedown", function (event) {
      pointerDown(event.clientX, event.clientY);
    });

    window.addEventListener("mousemove", function (event) {
      pointerMove(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", pointerUp);
    window.addEventListener("mouseleave", pointerUp);

    window.addEventListener(
      "touchstart",
      function (event) {
        if (event.touches.length > 0) {
          pointerDown(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener(
      "touchmove",
      function (event) {
        if (event.touches.length > 0) {
          pointerMove(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener("touchend", pointerUp);
    window.addEventListener("touchcancel", pointerUp);

    // -----------------------------
    // 11. Animation loop
    // -----------------------------

    const friction = 0.96;

    function animate() {
      requestAnimationFrame(animate);

      if (!state.isDragging) {
        state.spinX *= friction;
        state.spinY *= friction;

        globeGroup.rotation.x += state.spinX;
        globeGroup.rotation.y += state.spinY + 0.001;
      }

      // Clouds rotate very slightly faster than the surface.
      clouds.rotation.y += 0.00065;

      // Slow star drift for depth.
      stars.rotation.y += 0.00008;

      renderer.render(scene, camera);
    }

    animate();

    // -----------------------------
    // 12. Window resize handling
    // -----------------------------

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
