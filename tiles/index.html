<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #ffd1dc;
        --bg-glow: rgba(255, 255, 255, 0.45);
        --tile-bg: rgba(255, 255, 255, 0.35);
        --tile-edge: rgba(255, 255, 255, 0.65);
        --accent: #1a1a2e;
        --accent-soft: rgba(26, 26, 46, 0.35);
        --error-color: #e63946;
        --text-color: #1a1a2e;
    }

    html {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
    }

    body {
        background: radial-gradient(120% 80% at 50% 0%, var(--bg-glow), transparent 55%),
                    radial-gradient(90% 70% at 100% 100%, rgba(255, 182, 193, 0.35), transparent 50%),
                    var(--bg);
        color: var(--text-color);
        font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        overscroll-behavior: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .shell {
        height: 100%;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding:
            max(env(safe-area-inset-top), 6px)
            max(env(safe-area-inset-right), 8px)
            max(env(safe-area-inset-bottom), 6px)
            max(env(safe-area-inset-left), 8px);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        overflow: hidden;
    }

    .top {
        flex: 0 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: clamp(2px, 0.7vmin, 8px);
        padding-bottom: clamp(4px, 1vmin, 10px);
    }

    h1 {
        margin: 0;
        font-weight: 800;
        font-size: clamp(1rem, 4.2vmin, 1.85rem);
        letter-spacing: -0.03em;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .subtitle {
        margin: 0;
        font-size: clamp(0.62rem, 2.1vmin, 0.9rem);
        font-weight: 400;
        opacity: 0.75;
        max-width: min(32rem, 100%);
        text-align: center;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        line-clamp: 4;
        overflow: hidden;
    }

    .stats-bar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: clamp(6px, 1.8vmin, 28px);
        margin: 0;
        font-size: clamp(0.65rem, 2vmin, 0.9rem);
        font-weight: 600;
    }

    .stats-bar > div {
        padding: clamp(4px, 1.2vmin, 8px) clamp(8px, 2vmin, 14px);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(26, 26, 46, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .board-wrap {
        flex: 1 1 0;
        min-height: 0;
        min-width: 0;
        width: 100%;
        position: relative;
        container-type: size;
        container-name: board;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #grid {
        --gap: clamp(2px, 1.1cqmin, 10px);
        --grid-pad: clamp(3px, 1.6cqmin, 12px);
        --tile-size: min(
            calc((100cqw - 2 * var(--grid-pad) - 3 * var(--gap)) / 4),
            calc((100cqh - 2 * var(--grid-pad) - 3 * var(--gap)) / 4)
        );
        display: grid;
        grid-template-columns: repeat(4, var(--tile-size));
        grid-template-rows: repeat(4, var(--tile-size));
        gap: var(--gap);
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: var(--grid-pad);
        border-radius: max(12px, calc(var(--tile-size) * 0.14));
        position: relative;
        max-width: 100%;
        max-height: 100%;
        box-sizing: border-box;
        box-shadow:
            0 25px 50px rgba(26, 26, 46, 0.12),
            0 0 0 1px rgba(255, 255, 255, 0.5) inset,
            0 1px 0 rgba(255, 255, 255, 0.8) inset;
    }

    .tile {
        width: var(--tile-size);
        height: var(--tile-size);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.55), var(--tile-bg));
        position: relative;
        cursor: pointer;
        border-radius: max(8px, calc(var(--tile-size) * 0.11));
        border: 2px solid rgba(255, 255, 255, 0.55);
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.22s ease,
                    border-color 0.2s ease,
                    filter 0.2s ease;
        box-shadow:
            0 8px 24px rgba(26, 26, 46, 0.1),
            0 0 0 1px rgba(26, 26, 46, 0.04) inset;
        overflow: hidden;
    }

    .tile::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.5), transparent 45%);
        pointer-events: none;
        z-index: 50;
    }

    .tile:hover:not(.empty) {
        transform: translateY(-3px) scale(1.02);
        box-shadow:
            0 14px 32px rgba(26, 26, 46, 0.14),
            0 0 0 1px rgba(26, 26, 46, 0.06) inset;
    }

    .tile:active:not(.empty) {
        transform: translateY(0) scale(0.98);
        transition-duration: 0.08s;
    }

    .tile.selected {
        border-color: var(--accent);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.55));
        box-shadow:
            0 0 0 3px var(--accent-soft),
            0 12px 28px rgba(26, 26, 46, 0.18),
            0 0 40px rgba(100, 120, 200, 0.15);
        animation: selected-pulse 2.2s ease-in-out infinite;
    }

    @keyframes selected-pulse {
        0%, 100% { box-shadow: 0 0 0 3px var(--accent-soft), 0 12px 28px rgba(26, 26, 46, 0.18); }
        50% { box-shadow: 0 0 0 5px rgba(26, 26, 46, 0.2), 0 14px 34px rgba(26, 26, 46, 0.22); }
    }

    .tile.empty {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.92);
    }

    .layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: calc(var(--tile-size) * 0.54);
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                    filter 0.35s ease;
        text-shadow:
            0 1px 0 rgba(255, 255, 255, 0.95),
            0 -1px 0 rgba(255, 255, 255, 0.5),
            0 0 20px rgba(255, 255, 255, 0.35);
        filter: drop-shadow(0 2px 4px rgba(26, 26, 46, 0.12));
    }

    .layer.removed {
        opacity: 0 !important;
        transform: scale(1.35) rotate(12deg);
        filter: blur(2px) drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
    }

    .tile.match-flash::after {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        pointer-events: none;
        z-index: 40;
        background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.55), transparent 65%);
        animation: match-ring 0.55s ease-out forwards;
    }

    @keyframes match-ring {
        from { opacity: 1; transform: scale(0.85); }
        to { opacity: 0; transform: scale(1.15); }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-7px); }
        40% { transform: translateX(7px); }
        60% { transform: translateX(-5px); }
        80% { transform: translateX(5px); }
    }
    .shake {
        animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        border-color: var(--error-color) !important;
    }

    #win-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        border-radius: inherit;
        padding: clamp(12px, 3vmin, 22px);
        text-align: center;
    }

    #win-overlay h2 {
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.02em;
    }

    #final-stats {
        margin: 14px 0 18px;
        font-size: 0.95rem;
        color: rgba(26, 26, 46, 0.65);
        line-height: 1.5;
    }

    button {
        background: linear-gradient(180deg, #2d2d44, #1a1a2e);
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        font-size: clamp(0.85rem, 2.5vmin, 1rem);
        box-shadow: 0 8px 24px rgba(26, 26, 46, 0.25);
        transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(26, 26, 46, 0.3);
    }

    button:active {
        transform: translateY(0);
    }
</style>

</head>
<body>

<div class="shell">
    <div class="top">
        <h1>Layers</h1>
        <p class="subtitle">Each cell hides a stack of symbols. Tap two cells: every symbol that appears on <strong>both</strong> stacks is peeled away in pairs until one side runs out of that symbol. Clear all 80 layers to win.</p>
        <div class="stats-bar">
            <div>Streak: <span id="streak" class="stat-val">0</span></div>
            <div>Errors: <span id="errors" class="stat-val">0</span></div>
            <div>Remaining: <span id="remain" class="stat-val">0</span></div>
        </div>
    </div>
    <div class="board-wrap">
        <div id="grid">
            <div id="win-overlay">
                <h2>Level clear</h2>
                <div id="final-stats"></div>
                <button type="button" onclick="initGame()">Next shuffle</button>
            </div>
        </div>
    </div>
</div>

<script>
    /** ~3├Ќ original pool size; deduped. Each deal draws 30 distinct glyphs from here. */
    const SYMBOL_POOL_RAW = [
        'РгА', 'Ргб', 'РЌѕ', 'РЌЄ', 'Рќ│', 'Рќй', 'Рќи', 'РЌЂ', 'Рюќ', 'Рюџ', 'РЏњ', 'РЏќ', 'РЏЌ', 'РЏЮ', 'РЏъ', 'РЏЪ', 'РЮѓ', 'Рд┐', 'РдЙ', 'РЌј',
        'РгЪ', 'Рга', 'РгБ', 'Ргц', 'РгЦ', 'Ргд', 'РгД', 'Рге', 'РгЕ', 'Ргф', 'РгФ', 'Ргг', 'РгГ', 'Рг«', 'Рг»',
        'РЌє', 'РЌЅ', 'РЌљ', 'РЌЉ', 'РЌњ', 'РЌЊ', 'РЌћ', 'РЌЋ', 'РЌќ', 'РЌЌ', 'РЌў', 'РЌЎ', 'РЌФ', 'РЌф', 'РЌЕ', 'РЌе', 'РЌД', 'РЌд', 'РЌГ', 'РЌг',
        'Рќ▓', 'Рќ╝', 'РЌђ', 'РќХ', 'Рќа', 'РќА', 'Рќф', 'РќФ', 'РЌЈ', 'РЌІ',
        'РўЁ', 'Рўє', 'Рюд', 'РюД', 'РюЕ', 'Рюф', 'РюФ', 'Рюг', 'РюГ', 'Рю«', 'Рю»', 'Рю░', 'Рю▒', 'Рю▓', 'Рю│', 'Рю┤', 'Рюх', 'РюХ', 'Рюи', 'РюИ',
        'РюА', 'Рюб', 'РюБ', 'Рюц', 'РюЦ',
        'РіЋ', 'Ріќ', 'РіЌ', 'Ріў', 'РіЎ', 'Ріџ', 'РіЏ', 'Ріъ', 'РіЪ', 'Ріа', 'РіА',
        'РЪљ', 'РЪЉ', 'РЪњ', 'РЪЊ', 'РЪћ', 'РЪЋ', 'РЪќ', 'РЪЌ', 'РЪў', 'РЪЎ', 'РЪџ', 'РЪЏ', 'РЪю', 'РЪЮ', 'РЪъ', 'РЪЪ', 'РЪа', 'РЪА', 'РЪб', 'РЪБ',
        'РЪђ', 'РЪЂ', 'РЪѓ',
        'РДѕ', 'РДЅ', 'РДі', 'РДІ', 'РДЏ', 'РДю', 'РДЮ', 'РДъ', 'РДЪ', 'РДђ', 'РДЂ', 'РДѓ', 'РДЃ', 'РДё', 'РДЁ', 'РДє', 'РДЄ',
        'Ређ', 'РеЂ', 'Реѓ', 'РеЃ', 'Реё', 'РеЁ', 'Реє', 'РеЄ', 'Реѕ', 'РеЅ',
        'Рю┐', 'РЮђ', 'РЮЂ', 'РЮЃ', 'РЮё', 'РЮЁ', 'РЮє', 'РЮЄ', 'РЮѕ', 'РЮЅ', 'РЮі', 'РЮІ', 'РЮќ', 'РЮЇ', 'РЮЈ', 'РЮЉ', 'РЮњ',
        'Рє»', 'Рє░', 'Рє▒', 'Рє▓', 'Рє│', 'Рє┤', 'Рєх', 'РєХ', 'Рєи', 'Рє║', 'Рє╗',
        'Рїў', 'РїЦ', 'РїД', 'Рї»', 'Рїќ', 'РїЌ', 'Рїђ', 'Рїг',
        'Рјћ', 'РјЋ', 'Рјќ', 'РјЌ', 'Рјў', 'РјЎ',
        'РЇЪ', 'РЇі', 'РЇІ', 'РЇї', 'РЇЇ', 'РЇј', 'РЇЈ', 'РЇљ', 'РЇЉ', 'РЇњ', 'РЇЊ', 'РЇћ', 'РЇЋ', 'РЇќ', 'РЇЌ', 'РЇў', 'РЇЎ', 'РЇџ', 'РЇЏ',
        'РЎа', 'РЎБ', 'РЎЦ', 'РЎд', 'РЎц', 'РЎД', 'РЎА', 'РЎб',
        'РџЏ', 'Рџю', 'РџЮ', 'Рџъ', 'РџЪ',
        'РИј', 'РИЎ', 'РИџ', 'РИЏ', 'РИю', 'РИЮ', 'РИъ', 'РИЪ', 'РИб', 'РИБ', 'РИц', 'РИЦ', 'РИд', 'РИД'
    ];
    const symbols = [...new Set(SYMBOL_POOL_RAW)];
    const ICONS_PER_GAME = 30;
    let firstSelection = null;
    let streak = 0;
    let errors = 0;
    let layersTotal = 0;

    const symbolColors = [
        '#1A1A2E', '#6D1B3A', '#0D3B66', '#1B5E20', '#4A148C', '#6D4C41', '#004D40', '#311B92', '#BF360C', '#33691E',
        '#00695C', '#AD1457', '#4527A0', '#C62828', '#1565C0', '#2E7D32', '#6A1B9A', '#EF6C00', '#00838F', '#37474F',
        '#5D4037', '#827717', '#880E4F', '#01579B', '#263238', '#B71C1C', '#4A148C', '#33691E', '#0D47A1', '#1B5E20',
        '#3E2723', '#1A237E', '#BF360C', '#004D40', '#4E342E', '#311B92', '#33691E', '#006064', '#5D4037', '#283593'
    ];

    function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function shuffleInPlace(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /**
     * 40 pair-placements ├Ќ 2 copies = 80 layers. Each pair is placed on two *different*
     * tiles (perfect matching on 80 half-edges). That guarantees no symbol exists only
     * on a single cell, so every deal is completable.
     */
    function buildWinnableTileData(palette) {
        const pairSyms = [];
        for (let i = 0; i < 40; i++) {
            pairSyms.push(palette[i % palette.length]);
        }
        shuffleInPlace(pairSyms);

        const stubs = [];
        for (let tile = 0; tile < 16; tile++) {
            for (let k = 0; k < 5; k++) stubs.push(tile);
        }

        for (let attempt = 0; attempt < 80000; attempt++) {
            shuffleInPlace(stubs);
            const tileData = Array.from({ length: 16 }, () => []);
            let bad = false;
            for (let i = 0; i < 80; i += 2) {
                const a = stubs[i];
                const b = stubs[i + 1];
                if (a === b) {
                    bad = true;
                    break;
                }
                const sym = pairSyms[i >> 1];
                tileData[a].push(sym);
                tileData[b].push(sym);
            }
            if (!bad && tileData.every((t) => t.length === 5)) {
                return tileData.map((layers) => shuffleArray(layers));
            }
        }

        const tileData = Array.from({ length: 16 }, () => []);
        for (let round = 0; round < 5; round++) {
            for (let p = 0; p < 8; p++) {
                const a = 2 * p;
                const b = a + 1;
                const sym = pairSyms[round * 8 + p];
                tileData[a].push(sym);
                tileData[b].push(sym);
            }
        }
        return tileData.map((layers) => shuffleArray(layers));
    }

    function initGame() {
        const lightColors = ['#FFD1DC', '#B3E5FC', '#C8E6C9', '#FFF9C4', '#E1BEE7', '#FFCCBC', '#B2DFDB', '#D1C4E9'];
        document.documentElement.style.setProperty('--bg', lightColors[Math.floor(Math.random() * lightColors.length)]);

        const grid = document.getElementById('grid');
        const overlay = document.getElementById('win-overlay');

        const palette = shuffleArray(symbols).slice(0, Math.min(ICONS_PER_GAME, symbols.length));
        const iconPalette = {};
        palette.forEach((icon, index) => {
            iconPalette[icon] = symbolColors[index % symbolColors.length];
        });

        const tileData = buildWinnableTileData(palette);

        grid.querySelectorAll('.tile').forEach(t => t.remove());
        overlay.style.display = 'none';

        firstSelection = null;
        streak = 0;
        errors = 0;
        layersTotal = 80;

        tileData.forEach((layerSet) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            layerSet.forEach((icon, j) => {
                const l = document.createElement('div');
                l.className = 'layer';
                l.textContent = icon;
                l.dataset.val = icon;
                l.style.color = iconPalette[icon];
                l.style.fontWeight = '800';
                l.style.zIndex = String(j);
                tile.appendChild(l);
            });
            tile.addEventListener('click', () => handleTile(tile));
            grid.appendChild(tile);
        });
        updateUI();
    }

    function countByValue(layers) {
        const m = new Map();
        for (const l of layers) {
            const v = l.dataset.val;
            m.set(v, (m.get(v) || 0) + 1);
        }
        return m;
    }

    function takeTopLayerWithValue(tile, val) {
        const stack = Array.from(tile.querySelectorAll('.layer:not(.removed)')).reverse();
        return stack.find(l => l.dataset.val === val) || null;
    }

    function handleTile(tile) {
        if (tile.classList.contains('empty') || tile.classList.contains('shake')) return;
        if (firstSelection === tile) {
            tile.classList.remove('selected');
            firstSelection = null;
            return;
        }
        if (!firstSelection) {
            setSelection(tile);
        } else {
            compare(firstSelection, tile);
        }
    }

    function setSelection(tile) {
        if (firstSelection) firstSelection.classList.remove('selected');
        firstSelection = tile;
        tile.classList.add('selected');
    }

    function flashMatch(t1, t2) {
        t1.classList.add('match-flash');
        t2.classList.add('match-flash');
        setTimeout(() => {
            t1.classList.remove('match-flash');
            t2.classList.remove('match-flash');
        }, 600);
    }

    function compare(t1, t2) {
        const active1 = Array.from(t1.querySelectorAll('.layer:not(.removed)'));
        const active2 = Array.from(t2.querySelectorAll('.layer:not(.removed)'));

        const c1 = countByValue(active1);
        const c2 = countByValue(active2);
        const shared = [...c1.keys()].filter(k => c2.has(k));
        let removedAny = false;

        if (shared.length > 0) {
            for (const s of shared) {
                let pairs = Math.min(c1.get(s), c2.get(s));
                while (pairs-- > 0) {
                    const l1 = takeTopLayerWithValue(t1, s);
                    const l2 = takeTopLayerWithValue(t2, s);
                    if (l1 && l2) {
                        l1.classList.add('removed');
                        l2.classList.add('removed');
                        layersTotal -= 2;
                        removedAny = true;
                    }
                }
            }

            if (removedAny) {
                streak++;
                flashMatch(t1, t2);
            }

            const t2Cleared = checkTileState(t2);
            checkTileState(t1);

            if (!t2Cleared) {
                t1.classList.remove('selected');
                setSelection(t2);
            } else {
                t1.classList.remove('selected');
                firstSelection = null;
            }
        } else {
            errors++;
            streak = 0;
            t2.classList.add('shake');
            t1.classList.remove('selected');
            firstSelection = null;
            setTimeout(() => t2.classList.remove('shake'), 360);
        }
        updateUI();
    }

    function checkTileState(tile) {
        const stillActive = tile.querySelectorAll('.layer:not(.removed)');
        if (stillActive.length === 0) {
            tile.classList.add('empty');
            tile.classList.remove('selected');
            return true;
        }
        return false;
    }

    function updateUI() {
        document.getElementById('streak').textContent = String(streak);
        document.getElementById('errors').textContent = String(errors);
        document.getElementById('remain').textContent = String(layersTotal);
        if (layersTotal <= 0) {
            document.getElementById('final-stats').innerHTML =
                `Final streak: <strong>${streak}</strong> ┬и Mistakes: <strong>${errors}</strong>`;
            document.getElementById('win-overlay').style.display = 'flex';
        }
    }

    initGame();
</script>

</body>
</html>
