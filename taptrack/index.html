<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tap & Track — AAC Visual Scanning Game</title>
  <link rel="stylesheet" href="../_ios_compat.css">
  <style>
    :root {
      --sky-top: #8ed8ff;
      --sky-bottom: #eaf8ff;
      --grass: #82d948;
      --grass-dark: #3d9a2f;
      --navy: #08275d;
      --blue: #1386f7;
      --blue-dark: #0753b8;
      --yellow: #ffd232;
      --orange: #ff9f1c;
      --red: #ff3b30;
      --green: #56c43d;
      --purple: #9857f6;
      --pink: #ff5bbd;
      --white: #ffffff;
      --cream: #fff7df;
      --shadow: rgba(4, 27, 62, 0.25);
      --soft-shadow: rgba(4, 27, 62, 0.13);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(var(--sky-top), var(--sky-bottom));
      color: var(--navy);
    }

    body {
      touch-action: manipulation;
    }

    #app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 999px;
      opacity: 0.9;
      filter: drop-shadow(0 4px 0 rgba(255,255,255,0.45));
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: white;
      border-radius: 999px;
    }

    .cloud.one {
      width: 130px;
      height: 38px;
      left: 10%;
      top: 8%;
    }

    .cloud.one::before {
      width: 52px;
      height: 52px;
      left: 26px;
      top: -25px;
    }

    .cloud.one::after {
      width: 42px;
      height: 42px;
      right: 22px;
      top: -18px;
    }

    .cloud.two {
      width: 160px;
      height: 42px;
      right: 8%;
      top: 13%;
      opacity: 0.82;
    }

    .cloud.two::before {
      width: 58px;
      height: 58px;
      left: 36px;
      top: -28px;
    }

    .cloud.two::after {
      width: 46px;
      height: 46px;
      right: 30px;
      top: -20px;
    }

    .hill {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -9%;
      height: 28%;
      background: radial-gradient(ellipse at center, #a4e765 0%, var(--grass) 58%, #70c83b 100%);
      border-radius: 50% 50% 0 0;
      border-top: 5px solid rgba(48, 137, 37, 0.25);
    }

    .grass-bit {
      position: absolute;
      bottom: 4%;
      width: 26px;
      height: 16px;
      border-radius: 50%;
      border-top: 5px solid var(--grass-dark);
      opacity: 0.65;
    }

    .grass-bit:nth-child(4) { left: 8%; }
    .grass-bit:nth-child(5) { left: 22%; bottom: 8%; transform: scale(0.8); }
    .grass-bit:nth-child(6) { left: 69%; bottom: 7%; transform: scale(1.2); }
    .grass-bit:nth-child(7) { left: 84%; bottom: 5%; transform: scale(0.9); }

    header {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-areas:
        "back title actions";
      gap: 8px;
      align-items: center;
    }

    .title-wrap {
      grid-area: title;
      justify-self: center;
      min-width: 0;
      width: fit-content;
      max-width: min(58vw, 420px);
      padding: 9px 14px;
      border: 4px solid var(--navy);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 6px 0 rgba(8, 39, 93, 0.14), 0 14px 24px var(--soft-shadow);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 4.2vw, 2.2rem);
      line-height: 1;
      color: var(--navy);
      text-shadow: none;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 5px;
      font-size: clamp(0.86rem, 2.6vw, 1.05rem);
      font-weight: 900;
      color: var(--navy);
      opacity: 1;
    }

    .top-actions {
      grid-area: actions;
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .back-btn {
      grid-area: back;
      justify-self: start;
    }

    button,
    select {
      font: inherit;
    }

    .pill-btn,
    .size-select {
      border: 4px solid var(--navy);
      border-radius: 999px;
      background: linear-gradient(#fff8d7, #ffd947);
      color: var(--navy);
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      font-weight: 1000;
      padding: 10px 16px;
      box-shadow: 0 5px 0 rgba(5, 39, 93, 0.18);
      min-height: 48px;
    }

    .pill-btn {
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .back-btn {
      background: linear-gradient(#ffffff, #dbeafe);
    }

    .size-select {
      cursor: pointer;
      padding-right: 28px;
    }

    .pill-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(5, 39, 93, 0.18);
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 0 14px calc(12px + env(safe-area-inset-bottom));
    }

    .prompt-card {
      width: min(680px, 100%);
      margin: 0 auto;
      background: #fff;
      border: 5px solid var(--navy);
      border-radius: 28px;
      padding: 10px 14px;
      box-shadow: 0 7px 0 rgba(8, 39, 93, 0.15), 0 16px 24px var(--soft-shadow);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .find-label {
      font-size: clamp(1rem, 3.2vw, 1.3rem);
      font-weight: 1000;
      color: var(--blue-dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .target-name {
      font-size: clamp(1.35rem, 5vw, 2.2rem);
      font-weight: 1000;
      color: var(--navy);
      line-height: 1.05;
    }

    .target-icon-preview {
      width: clamp(64px, 15vw, 96px);
      aspect-ratio: 1;
      border-radius: 24px;
      border: 4px solid var(--navy);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 5px;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.06);
    }

    .target-icon-preview img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: 16px;
    }

    .board-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .aac-grid {
      display: grid;
      gap: clamp(6px, 1.4vw, 12px);
      width: min(92vw, 720px);
      height: min(54vh, 540px);
      max-height: 100%;
      padding: clamp(8px, 1.8vw, 14px);
      background: #fff;
      border: 6px solid var(--navy);
      border-radius: 28px;
      box-shadow: 0 8px 0 rgba(8, 39, 93, 0.16), 0 22px 32px var(--shadow);
    }

    .cell {
      border: 4px solid rgba(8, 39, 93, 0.92);
      border-radius: 20px;
      background: #fff;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: clamp(2px, 0.45vw, 5px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 999px #fff, inset 0 -7px 0 rgba(15, 102, 196, 0.05);
      min-width: 0;
      min-height: 0;
    }

    .cell.blank {
      opacity: 0.44;
      cursor: default;
      background: rgba(255,255,255,0.55);
      border-style: dashed;
    }

    .cell.filled:hover {
      transform: translateY(-1px);
    }

    .cell.filled:active {
      transform: scale(0.97);
    }

    .cell.correct {
      animation: popCorrect 420ms ease-out;
      border-color: #16a34a;
      background: #fff;
      box-shadow: inset 0 0 0 999px #fff, inset 0 -7px 0 rgba(22, 163, 74, 0.12);
    }

    .cell.wrong {
      animation: shakeWrong 300ms ease-in-out;
      border-color: #ef4444;
      background: #fff;
      box-shadow: inset 0 0 0 999px #fff, inset 0 -7px 0 rgba(239, 68, 68, 0.12);
    }

    .cell.cue-row {
      box-shadow: inset 0 0 0 999px rgba(255, 229, 46, 0.18), inset 0 -7px 0 rgba(15, 102, 196, 0.08);
    }

    .cell.cue-target {
      animation: pulseCue 720ms ease-in-out infinite alternate;
    }

    .picture-frame {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .picture-frame img,
    .shape-icon {
      width: 100% !important;
      height: 100% !important;
      max-width: none;
      max-height: none;
      object-fit: contain;
      object-position: center;
      display: block;
      filter: drop-shadow(0 5px 0 rgba(8, 39, 93, 0.12));
    }

    .target-icon-preview img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: 16px;
    }

    .icon-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .status-row {
      width: min(680px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .feedback {
      min-height: 52px;
      border-radius: 999px;
      padding: 10px 18px;
      background: #fff;
      border: 4px solid rgba(8, 39, 93, 0.82);
      font-size: clamp(1rem, 3.2vw, 1.25rem);
      font-weight: 1000;
      color: var(--navy);
      display: flex;
      align-items: center;
      box-shadow: 0 5px 0 rgba(8, 39, 93, 0.12);
    }

    .trial-chip {
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--blue);
      border: 4px solid var(--navy);
      color: white;
      font-weight: 1000;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      box-shadow: 0 5px 0 rgba(8, 39, 93, 0.18);
      white-space: nowrap;
    }

    .celebration {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      display: none;
      place-items: center;
      font-size: min(18vw, 120px);
      text-shadow: 0 7px 0 rgba(8, 39, 93, 0.18);
      animation: celebrate 650ms ease-out forwards;
    }

    .celebration.show {
      display: grid;
    }

    .result-card {
      cursor: default;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 22px);
      text-align: center;
      min-height: 100%;
    }

    .result-trophy {
      font-size: min(34vw, 190px);
      line-height: 0.9;
      filter: drop-shadow(0 10px 0 rgba(8, 39, 93, 0.14));
    }

    .result-title {
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 1000;
      color: var(--navy);
      line-height: 1;
    }

    @keyframes popCorrect {
      0% { transform: scale(1); }
      45% { transform: scale(1.09) rotate(-1deg); }
      100% { transform: scale(1); }
    }

    @keyframes shakeWrong {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-5px); }
    }

    @keyframes pulseCue {
      from { transform: scale(1); box-shadow: 0 0 0 rgba(255, 210, 50, 0); }
      to { transform: scale(1.035); box-shadow: 0 0 0 8px rgba(255, 210, 50, 0.4); }
    }

    @keyframes celebrate {
      0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      35% { opacity: 1; transform: scale(1.1) rotate(5deg); }
      100% { opacity: 0; transform: scale(1.45) rotate(12deg); }
    }

    @media (max-width: 700px) {
      header {
        grid-template-columns: auto 1fr auto;
        gap: 6px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .title-wrap {
        max-width: 42vw;
        padding: 8px 10px;
        border-width: 3px;
        border-radius: 18px;
      }

      h1 {
        font-size: clamp(1.05rem, 5vw, 1.45rem);
        white-space: nowrap;
      }

      .subtitle {
        display: none;
      }

      .top-actions {
        gap: 5px;
      }

      .pill-btn {
        padding: 8px 10px;
        min-height: 44px;
        border-width: 3px;
        font-size: 0.82rem;
      }

      .back-btn {
        max-width: 94px;
        overflow: hidden;
        white-space: nowrap;
      }

      .size-select {
        padding: 8px 22px 8px 9px;
        min-height: 44px;
        border-width: 3px;
        font-size: 0.82rem;
      }

      main {
        padding-left: 10px;
        padding-right: 10px;
        gap: 8px;
      }

      .prompt-card {
        border-width: 4px;
        border-radius: 22px;
        padding: 8px 10px;
        gap: 8px;
      }

      .find-label {
        display: none;
      }

      .prompt-card {
        grid-template-columns: 1fr auto;
      }

      .target-name::before {
        content: "Find ";
        color: var(--blue-dark);
      }

      .aac-grid {
        width: min(96vw, 520px);
        height: min(58vh, 500px);
        border-width: 4px;
        border-radius: 22px;
      }

      .cell {
        border-width: 3px;
        border-radius: 15px;
      }

      .status-row {
        grid-template-columns: 1fr;
      }

      .trial-chip {
        display: none;
      }

      .feedback {
        min-height: 44px;
        justify-content: center;
      }
    }

    @media (max-width: 420px) {
      header {
        grid-template-columns: auto 1fr auto;
      }

      .title-wrap {
        max-width: 38vw;
        padding-left: 8px;
        padding-right: 8px;
      }

      .back-btn {
        width: 44px;
        min-width: 44px;
        padding-left: 0;
        padding-right: 0;
        justify-content: center;
        font-size: 0;
      }

      .back-btn::before {
        content: "←";
        font-size: 1.35rem;
        line-height: 1;
      }

      .size-select {
        max-width: 74px;
      }

      .pill-btn:not(.back-btn) {
        padding-left: 9px;
        padding-right: 9px;
      }

      .target-name {
        font-size: clamp(1.05rem, 6vw, 1.6rem);
      }

      .aac-grid {
        width: min(97vw, 520px);
        height: min(59vh, 500px);
        gap: 5px;
        padding: 6px;
      }

      .cell {
        padding: 2px;
      }
    }

    @media (max-height: 620px) {
      h1 {
        font-size: 1.15rem;
      }

      header {
        padding-top: 6px;
        padding-bottom: 4px;
      }

      .title-wrap {
        padding-top: 6px;
        padding-bottom: 6px;
      }

      .prompt-card {
        padding: 6px 9px;
      }

      .target-icon-preview {
        width: 48px;
        border-radius: 15px;
      }

      .aac-grid {
        height: min(56vh, 380px);
      }

      .feedback {
        min-height: 40px;
        padding: 7px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="background" aria-hidden="true">
      <div class="cloud one"></div>
      <div class="cloud two"></div>
      <div class="hill"></div>
      <div class="grass-bit"></div>
      <div class="grass-bit"></div>
      <div class="grass-bit"></div>
      <div class="grass-bit"></div>
    </div>

    <header>
      <a href="../index.html#map" class="pill-btn back-btn">&larr; All Games</a>

      <div class="title-wrap">
        <h1>Tap &amp; Track</h1>
        <div class="subtitle">Find the picture. Tap it.</div>
      </div>

      <div class="top-actions">
        <select id="gridSizeSelect" class="size-select" aria-label="Grid size">
          <option value="3">3 x 3</option>
          <option value="4" selected>4 x 4</option>
          <option value="5">5 x 5</option>
        </select>
        <button id="newGameBtn" class="pill-btn" type="button">New Game</button>
      </div>
    </header>

    <main>
      <section class="prompt-card" aria-live="polite">
        <div class="find-label">Find</div>
        <div id="targetName" class="target-name">Bird</div>
        <div id="targetPreview" class="target-icon-preview" aria-hidden="true"></div>
      </section>

      <section class="board-wrap">
        <div id="grid" class="aac-grid" role="grid" aria-label="Tap & Track icon grid"></div>
      </section>

      <section class="status-row">
        <div id="feedback" class="feedback">Find the picture. Tap it.</div>
        <div id="trialChip" class="trial-chip">1 / 9</div>
      </section>
    </main>

    <div id="celebration" class="celebration">⭐</div>
  </div>

  <audio id="matchSound" src="../sounds/match.mp3" preload="auto"></audio>
  <audio id="winSound" src="../sounds/win.mp3" preload="auto"></audio>
  <audio id="wrongSound" src="../sounds/wrong.mp3" preload="auto"></audio>

  <script>
    "use strict";

    const PICTURES = [
      { id: "bird", label: "Bird", picture: "bird.png" },
      { id: "fish", label: "Fish", picture: "fish.png" },

      { id: "frog", label: "Frog", picture: "frog.png" },

      { id: "wolf", label: "Wolf", picture: "wolf.png" },
      { id: "goat", label: "Goat", picture: "goat.png" },
      { id: "deer", label: "Deer", picture: "deer.png" },
      { id: "crab", label: "Crab", picture: "crab.png" },
      { id: "star", label: "Star", picture: "star.png" },
      { id: "moon", label: "Moon", picture: "moon.png" },
      { id: "tree", label: "Tree", picture: "tree.png" },
      { id: "rose", label: "Rose", picture: "rose.png" },
      { id: "leaf", label: "Leaf", picture: "leaf.png" },
      { id: "book", label: "Book", picture: "book.png" },
      { id: "cake", label: "Cake", picture: "cake.png" },
      { id: "milk", label: "Milk", picture: "milk.png" },

      { id: "ship", label: "Ship", picture: "ship.png" },
      { id: "boat", label: "Boat", picture: "boat.png" },
      { id: "bike", label: "Bike", picture: "bike.png" },
      { id: "cart", label: "Cart", picture: "cart.png" },
      { id: "bell", label: "Bell", picture: "bell.png" },
      { id: "drum", label: "Drum", picture: "drum.png" },
      { id: "kite", label: "Kite", picture: "kite.png" },
      { id: "ball", label: "Ball", picture: "ball.png" },
      { id: "dice", label: "Dice", picture: "dice.png" },
      { id: "cube", label: "Cube", picture: "cube.png" },
      { id: "gift", label: "Gift", picture: "gift.png" },
      { id: "coat", label: "Coat", picture: "coat.png" },
      { id: "sock", label: "Sock", picture: "sock.png" },
      { id: "shoe", label: "Shoe", picture: "shoe.png" },
      { id: "hand", label: "Hand", picture: "hand.png" },
      { id: "foot", label: "Foot", picture: "foot.png" },
      { id: "eyes", label: "Eyes", picture: "eyes.png" },
      { id: "nose", label: "Nose", picture: "nose.png" },
      { id: "ears", label: "Ears", picture: "ears.png" },
      { id: "ring", label: "Ring", picture: "ring.png" },
      { id: "keys", label: "Keys", picture: "keys.png" },
      { id: "door", label: "Door", picture: "door.png" },
      { id: "lamp", label: "Lamp", picture: "lamp.png" }
    ];

    const TARGET_SEQUENCE = ["bird", "fish", "duck"];
    const ZONES = ["top-left", "top-right", "center", "bottom-left", "bottom-right"];

    const state = {
      trialIndex: 0,
      currentTrial: null,
      startTime: 0,
      locked: false,
      streak: 0,
      stats: [],
      cueTimers: []
    };

    const gridEl = document.getElementById("grid");
    const targetNameEl = document.getElementById("targetName");
    const targetPreviewEl = document.getElementById("targetPreview");
    const feedbackEl = document.getElementById("feedback");
    const trialChipEl = document.getElementById("trialChip");
    const celebrationEl = document.getElementById("celebration");
    const newGameBtn = document.getElementById("newGameBtn");
    const gridSizeSelect = document.getElementById("gridSizeSelect");
    const matchSound = document.getElementById("matchSound");
    const winSound = document.getElementById("winSound");
    const wrongSound = document.getElementById("wrongSound");
    let audioUnlocked = false;

    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pictureById(id) {
      return PICTURES.find(picture => picture.id === id);
    }

    function makeTrials() {
      const trials = [];
      const size = Number(gridSizeSelect.value) || 4;

      // A game is three target prompts. Each target lands in a different scan zone.
      TARGET_SEQUENCE.forEach((target, i) => {
        trials.push({
          target,
          rows: size,
          cols: size,
          zone: ZONES[i],
          distractors: "fill"
        });
      });

      return trials;
    }

    let trials = makeTrials();

    function zoneToIndex(zone, rows, cols) {
      const lastRow = rows - 1;
      const lastCol = cols - 1;
      const midRow = Math.floor(rows / 2);
      const midCol = Math.floor(cols / 2);

      const map = {
        "top-left": [0, 0],
        "top-right": [0, lastCol],
        "center": [midRow, midCol],
        "bottom-left": [lastRow, 0],
        "bottom-right": [lastRow, lastCol]
      };

      if (zone === "random") {
        return randInt(rows * cols);
      }

      const [r, c] = map[zone] || map.center;
      return r * cols + c;
    }

    function buildTrialGrid(trial) {
      const total = trial.rows * trial.cols;
      const cells = new Array(total).fill(null);
      const targetIndex = zoneToIndex(trial.zone, trial.rows, trial.cols);
      cells[targetIndex] = trial.target;

      // Fill every other cell with an image/icon distractor.
      // Keep the target unique so the answer is visually unambiguous.
      const distractorPool = shuffle(PICTURES.map(picture => picture.id).filter(id => id !== trial.target));
      const emptyIndexes = shuffle([...Array(total).keys()].filter(i => i !== targetIndex));

      emptyIndexes.forEach((cellIndex, i) => {
        cells[cellIndex] = distractorPool[i % distractorPool.length];
      });

      return { cells, targetIndex };
    }

    function startGame() {
      clearCueTimers();
      trials = makeTrials();
      state.trialIndex = 0;
      state.stats = [];
      state.locked = false;
      state.streak = 0;
      feedbackEl.textContent = "Find the picture. Tap it.";
      renderTrial();
    }

    function renderTrial() {
      clearCueTimers();
      state.locked = false;
      const trial = trials[state.trialIndex];
      const built = buildTrialGrid(trial);
      state.currentTrial = { ...trial, cells: built.cells, targetIndex: built.targetIndex };
      state.startTime = performance.now();

      const targetPicture = pictureById(trial.target);
      targetNameEl.textContent = targetPicture.label;
      targetPreviewEl.innerHTML = createPictureHTML(targetPicture, true);
      trialChipEl.textContent = `${state.trialIndex + 1} / ${trials.length}`;

      gridEl.style.gridTemplateColumns = `repeat(${trial.cols}, 1fr)`;
      gridEl.style.gridTemplateRows = `repeat(${trial.rows}, 1fr)`;
      gridEl.dataset.size = String(trial.cols);
      gridEl.innerHTML = "";

      state.currentTrial.cells.forEach((iconId, index) => {
        const cell = document.createElement("button");
        const picture = pictureById(iconId);

        cell.type = "button";
        cell.className = "cell filled";
        cell.setAttribute("role", "gridcell");
        cell.dataset.index = String(index);
        cell.dataset.icon = iconId;
        cell.setAttribute("aria-label", picture.label);
        cell.innerHTML = `
          <div class="picture-frame">${createPictureHTML(picture, false)}</div>
          <div class="icon-label">${picture.label}</div>
        `;
        cell.addEventListener("click", () => handleCellTap(cell, index, iconId));

        gridEl.appendChild(cell);
      });
    }

    function handleCellTap(cell, index, iconId) {
      if (state.locked) return;
      unlockAudio();

      const trial = state.currentTrial;
      const isCorrect = iconId === trial.target;

      if (isCorrect) {
        state.locked = true;
        clearCueTimers();
        const elapsed = Math.round(performance.now() - state.startTime);
        state.stats.push({
          trial: state.trialIndex + 1,
          target: trial.target,
          targetIndex: trial.targetIndex,
          rows: trial.rows,
          cols: trial.cols,
          distractors: trial.distractors,
          elapsedMs: elapsed
        });

        cell.classList.add("correct");
        state.streak++;
        playSound(matchSound);
        if (state.streak % 3 === 0) {
          setTimeout(() => playSound(winSound), 160);
        }
        showCelebration();
        feedbackEl.textContent = state.streak % 3 === 0 ? "Three in a row!" : "Great finding!";

        setTimeout(() => {
          state.trialIndex++;
          if (state.trialIndex >= trials.length) {
            showResults();
          } else {
            feedbackEl.textContent = "Find the picture. Tap it.";
            renderTrial();
          }
        }, 820);
      } else {
        cell.classList.remove("wrong");
        void cell.offsetWidth;
        cell.classList.add("wrong");
        playSound(wrongSound);
        state.streak = 0;
        feedbackEl.textContent = "Try again.";
        setTimeout(() => {
          if (!state.locked) feedbackEl.textContent = "Find the picture. Tap it.";
        }, 900);
      }
    }

    function showResults() {
      clearCueTimers();
      state.locked = true;
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = "1fr";
      gridEl.style.gridTemplateRows = "1fr";

      const result = document.createElement("div");
      result.className = "cell correct result-card";
      result.innerHTML = `
        <div class="result-trophy">🏆</div>
        <div class="result-title">You found them!</div>
      `;
      gridEl.appendChild(result);
      targetNameEl.textContent = "Great Job!";
      targetPreviewEl.innerHTML = "⭐";
      feedbackEl.textContent = "Tap New Game to play again.";
      trialChipEl.textContent = `${trials.length} / ${trials.length}`;
    }

    function clearCueTimers() {
      state.cueTimers.forEach(timer => clearTimeout(timer));
      state.cueTimers = [];
    }

    function showCelebration() {
      const icons = ["⭐", "✨", "🎉", "✅"];
      celebrationEl.textContent = icons[randInt(icons.length)];
      celebrationEl.classList.remove("show");
      void celebrationEl.offsetWidth;
      celebrationEl.classList.add("show");
      setTimeout(() => celebrationEl.classList.remove("show"), 700);
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      [matchSound, winSound, wrongSound].forEach(sound => {
        if (!sound) return;
        try {
          sound.load();
        } catch (err) {
          // Audio is optional.
        }
      });
      audioUnlocked = true;
    }

    function playSound(sound) {
      if (!sound) return;
      try {
        sound.pause();
        sound.currentTime = 0;
        const playPromise = sound.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } catch (err) {
        // Audio is optional.
      }
    }

    function createPictureHTML(picture, preview) {
      const className = preview ? "" : "shape-icon";
      return `<img class="${className}" src="../missing_letter/images/${picture.picture}" alt="${picture.label}">`;
    }

    newGameBtn.addEventListener("click", startGame);
    gridSizeSelect.addEventListener("change", startGame);

    document.addEventListener("pointerdown", unlockAudio, { once: true, capture: true });
    document.addEventListener("touchstart", unlockAudio, { once: true, capture: true });
    document.addEventListener("keydown", unlockAudio, { once: true, capture: true });

    window.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "r") startGame();
    });

    startGame();
  </script>
</body>
</html>
