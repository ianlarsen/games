<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Interactive Floating Green Blob</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #02030a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }

    canvas:active {
      cursor: grabbing;
    }

    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.88);
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    p {
      margin: 3px 0;
      font-size: 0.88rem;
      color: rgba(220, 235, 230, 0.78);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="ui-overlay">
    <h1>Floating Green Blob</h1>
    <p>Click or tap the blob to make a subtle indentation.</p>
    <p>Drag gently to rotate it in space.</p>
  </div>

  <script>
    // --------------------------------------------------
    // 1. Scene, camera, renderer
    // --------------------------------------------------

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02030a);

    const camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 0, 6.6);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    if (THREE.sRGBEncoding) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }

    document.body.appendChild(renderer.domElement);

    // --------------------------------------------------
    // 2. Space background: stars and faint galactic haze
    // --------------------------------------------------

    function createStarField() {
      const starGroup = new THREE.Group();

      const starCount = 2200;
      const positions = [];
      const colors = [];
      const sizes = [];

      const colorA = new THREE.Color(0xffffff);
      const colorB = new THREE.Color(0xaed2ff);
      const colorC = new THREE.Color(0xfff1d6);

      for (let i = 0; i < starCount; i++) {
        let radius = 65 + Math.random() * 120;
        let theta = Math.random() * Math.PI * 2;
        let phi;

        // Mild clustering toward a loose diagonal band.
        if (Math.random() < 0.55) {
          phi = Math.PI / 2 + (Math.random() - 0.5) * 0.95;
          theta += Math.sin(theta * 2.0) * 0.18;
        } else {
          phi = Math.acos(Math.random() * 2 - 1);
        }

        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);

        positions.push(x, y, z);

        const colorRoll = Math.random();
        const color = colorA.clone();

        if (colorRoll < 0.18) {
          color.lerp(colorB, 0.45);
        } else if (colorRoll > 0.88) {
          color.lerp(colorC, 0.35);
        }

        const brightness = 0.55 + Math.random() * 0.45;

        colors.push(
          color.r * brightness,
          color.g * brightness,
          color.b * brightness
        );

        sizes.push(0.04 + Math.random() * 0.08);
      }

      const starGeometry = new THREE.BufferGeometry();

      starGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positions, 3)
      );

      starGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(colors, 3)
      );

      const starMaterial = new THREE.PointsMaterial({
        size: 0.075,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        sizeAttenuation: true,
        depthWrite: false
      });

      const stars = new THREE.Points(starGeometry, starMaterial);
      starGroup.add(stars);

      return starGroup;
    }

    function createHazeTexture() {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, size, size);

      const centerX = size / 2;
      const centerY = size / 2;

      const gradient = ctx.createRadialGradient(
        centerX,
        centerY,
        0,
        centerX,
        centerY,
        size / 2
      );

      gradient.addColorStop(0.00, "rgba(120, 255, 190, 0.22)");
      gradient.addColorStop(0.18, "rgba(80, 170, 255, 0.13)");
      gradient.addColorStop(0.42, "rgba(120, 80, 255, 0.06)");
      gradient.addColorStop(1.00, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      return texture;
    }

    const stars = createStarField();
    scene.add(stars);

    const hazeTexture = createHazeTexture();

    function addHaze(x, y, z, scale, opacity, rotation) {
      const material = new THREE.SpriteMaterial({
        map: hazeTexture,
        transparent: true,
        opacity: opacity,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const sprite = new THREE.Sprite(material);
      sprite.position.set(x, y, z);
      sprite.scale.set(scale * 1.6, scale, 1);
      sprite.material.rotation = rotation;

      scene.add(sprite);

      return sprite;
    }

    const haze1 = addHaze(-5.2, 2.4, -16, 6.5, 0.24, -0.42);
    const haze2 = addHaze(5.8, -2.7, -18, 7.8, 0.18, 0.55);
    const haze3 = addHaze(0.5, 4.4, -22, 5.2, 0.12, 0.2);

    // --------------------------------------------------
    // 3. Lighting for shiny green blob
    // --------------------------------------------------

    const ambientLight = new THREE.AmbientLight(0x6fa88f, 0.18);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.65);
    keyLight.position.set(4.5, 5.2, 6);
    scene.add(keyLight);

    const greenFill = new THREE.DirectionalLight(0x76ffb1, 0.55);
    greenFill.position.set(-5, 2, 3);
    scene.add(greenFill);

    const blueRim = new THREE.DirectionalLight(0xa8c7ff, 0.95);
    blueRim.position.set(-3.5, -1.2, -5);
    scene.add(blueRim);

    const tinyHighlight = new THREE.PointLight(0xffffff, 1.2, 12);
    tinyHighlight.position.set(2.3, 2.1, 3.5);
    scene.add(tinyHighlight);

    // --------------------------------------------------
    // 4. Blob geometry and soft-body data
    // --------------------------------------------------

    const blobRadius = 1.55;

    const geometry = new THREE.SphereGeometry(
      blobRadius,
      96,
      96
    );

    const positionAttribute = geometry.attributes.position;
    const vertexCount = positionAttribute.count;

    const basePositions = new Float32Array(positionAttribute.array.length);
    const originalDirections = [];

    const displacement = new Float32Array(vertexCount);
    const velocity = new Float32Array(vertexCount);
    const phase = new Float32Array(vertexCount);
    const lumpStrength = new Float32Array(vertexCount);

    const tempVertex = new THREE.Vector3();
    const tempNormal = new THREE.Vector3();

    // Make the base sphere organically lumpy but not grotesque.
    for (let i = 0; i < vertexCount; i++) {
      tempVertex.fromBufferAttribute(positionAttribute, i);

      const n = tempVertex.clone().normalize();

      const lump =
        Math.sin(n.x * 2.4 + n.y * 1.3) * 0.105 +
        Math.cos(n.y * 2.1 - n.z * 1.7) * 0.095 +
        Math.sin((n.x + n.z) * 3.2) * 0.06;

      const radiusScale = 1.0 + lump;

      tempVertex.copy(n).multiplyScalar(blobRadius * radiusScale);

      positionAttribute.setXYZ(i, tempVertex.x, tempVertex.y, tempVertex.z);

      basePositions[i * 3] = tempVertex.x;
      basePositions[i * 3 + 1] = tempVertex.y;
      basePositions[i * 3 + 2] = tempVertex.z;

      originalDirections.push(n.clone());

      phase[i] = Math.random() * Math.PI * 2;
      lumpStrength[i] = 0.006 + Math.random() * 0.008;
    }

    geometry.computeVertexNormals();

    const blobMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x19d26f,
      emissive: 0x021b0e,
      emissiveIntensity: 0.18,
      roughness: 0.18,
      metalness: 0.03,
      clearcoat: 1.0,
      clearcoatRoughness: 0.08,
      reflectivity: 0.72
    });

    const blob = new THREE.Mesh(geometry, blobMaterial);

    blob.rotation.x = THREE.MathUtils.degToRad(-8);
    blob.rotation.y = THREE.MathUtils.degToRad(18);

    scene.add(blob);

    // --------------------------------------------------
    // 5. Interaction state
    // --------------------------------------------------

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const state = {
      isPointerDown: false,
      isDragging: false,
      previousX: 0,
      previousY: 0,
      spinX: 0,
      spinY: 0,
      downX: 0,
      downY: 0
    };

    function updatePointerFromEvent(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
    }

    function pokeBlob(clientX, clientY, strengthMultiplier) {
      updatePointerFromEvent(clientX, clientY);

      raycaster.setFromCamera(pointer, camera);

      const hits = raycaster.intersectObject(blob);

      if (hits.length === 0) {
        return;
      }

      const hit = hits[0];

      const localHit = blob.worldToLocal(hit.point.clone()).normalize();

      const radiusOfInfluence = 0.34;
      const pokeStrength = -0.18 * strengthMultiplier;

      for (let i = 0; i < vertexCount; i++) {
        const dir = originalDirections[i];

        const similarity = dir.dot(localHit);

        if (similarity > 1.0 - radiusOfInfluence) {
          const falloffRaw = (similarity - (1.0 - radiusOfInfluence)) / radiusOfInfluence;
          const falloff = falloffRaw * falloffRaw * (3.0 - 2.0 * falloffRaw);

          displacement[i] += pokeStrength * falloff;
          velocity[i] += -0.015 * falloff;
        }
      }

      // Very subtle object reaction so it feels touched, not punched.
      blob.rotation.x += (Math.random() - 0.5) * 0.015;
      blob.rotation.y += (Math.random() - 0.5) * 0.015;
    }

    function pointerDown(clientX, clientY) {
      state.isPointerDown = true;
      state.isDragging = false;

      state.previousX = clientX;
      state.previousY = clientY;

      state.downX = clientX;
      state.downY = clientY;
    }

    function pointerMove(clientX, clientY) {
      if (!state.isPointerDown) {
        return;
      }

      const deltaX = clientX - state.previousX;
      const deltaY = clientY - state.previousY;

      const totalMove =
        Math.abs(clientX - state.downX) +
        Math.abs(clientY - state.downY);

      if (totalMove > 7) {
        state.isDragging = true;
      }

      if (state.isDragging) {
        state.spinY = deltaX * 0.0032;
        state.spinX = deltaY * 0.0032;

        blob.rotation.y += state.spinY;
        blob.rotation.x += state.spinX;
      }

      state.previousX = clientX;
      state.previousY = clientY;
    }

    function pointerUp(clientX, clientY) {
      if (state.isPointerDown && !state.isDragging) {
        pokeBlob(clientX, clientY, 1.0);
      }

      state.isPointerDown = false;
      state.isDragging = false;
    }

    window.addEventListener("mousedown", function (event) {
      pointerDown(event.clientX, event.clientY);
    });

    window.addEventListener("mousemove", function (event) {
      pointerMove(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", function (event) {
      pointerUp(event.clientX, event.clientY);
    });

    window.addEventListener("mouseleave", function () {
      state.isPointerDown = false;
      state.isDragging = false;
    });

    window.addEventListener(
      "touchstart",
      function (event) {
        if (event.touches.length > 0) {
          pointerDown(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener(
      "touchmove",
      function (event) {
        if (event.touches.length > 0) {
          pointerMove(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener("touchend", function (event) {
      if (event.changedTouches.length > 0) {
        pointerUp(event.changedTouches[0].clientX, event.changedTouches[0].clientY);
      }
    });

    window.addEventListener("touchcancel", function () {
      state.isPointerDown = false;
      state.isDragging = false;
    });

    // --------------------------------------------------
    // 6. Animation and soft physics
    // --------------------------------------------------

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      // Soft idle rotation
      if (!state.isPointerDown) {
        state.spinX *= 0.965;
        state.spinY *= 0.965;

        blob.rotation.x += state.spinX;
        blob.rotation.y += state.spinY + 0.0007;
      }

      // Blob physics:
      // subtle spring back to original shape, not cartoon rubber.
      const spring = 0.045;
      const damping = 0.875;

      const renderPosition = geometry.attributes.position;

      for (let i = 0; i < vertexCount; i++) {
        const baseX = basePositions[i * 3];
        const baseY = basePositions[i * 3 + 1];
        const baseZ = basePositions[i * 3 + 2];

        tempVertex.set(baseX, baseY, baseZ);
        tempNormal.copy(tempVertex).normalize();

        velocity[i] += -displacement[i] * spring;
        velocity[i] *= damping;

        displacement[i] += velocity[i];

        // Very slow, barely perceptible organic drift.
        const breathe =
          Math.sin(elapsed * 0.75 + phase[i]) *
          Math.cos(elapsed * 0.37 + baseX * 0.65 + baseY * 0.35) *
          lumpStrength[i];

        const finalOffset = displacement[i] + breathe;

        tempVertex.addScaledVector(tempNormal, finalOffset);

        renderPosition.setXYZ(i, tempVertex.x, tempVertex.y, tempVertex.z);
      }

      renderPosition.needsUpdate = true;
      geometry.computeVertexNormals();

      stars.rotation.y += 0.00006;
      stars.rotation.x += 0.000015;

      haze1.material.rotation += 0.00005;
      haze2.material.rotation -= 0.000035;
      haze3.material.rotation += 0.000025;

      renderer.render(scene, camera);
    }

    animate();

    // --------------------------------------------------
    // 7. Resize handling
    // --------------------------------------------------

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
