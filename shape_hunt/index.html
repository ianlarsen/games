<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Hunt</title>
  <link rel="stylesheet" href="../_ios_compat.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #fdf4ff 0%, #ede9fe 50%, #dbeafe 100%);
      min-height: 100dvh;
      padding: 1rem 1rem 2rem;
      scroll-behavior: smooth;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      max-width: 720px;
      margin: 0 auto 0.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn {
      text-decoration: none;
      background: #fff;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .score-badge {
      background: #fff;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: #7c3aed;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    /* ── Main ───────────────────────────────────────────────────────── */
    main {
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      color: #5b21b6;
      margin-bottom: 0.1rem;
      text-shadow: 1px 2px 0 rgba(0,0,0,0.07);
    }

    .subtitle {
      font-size: clamp(0.82rem, 3.2vw, 0.95rem);
      color: #555;
      margin-bottom: 0.3rem;
    }

    .round-label {
      font-size: clamp(0.7rem, 2.4vw, 0.85rem);
      color: #888;
      margin-bottom: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-track {
      background: #e5e7eb;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 0.8rem;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(to right, #a78bfa, #7c3aed);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* ── Puzzle card ────────────────────────────────────────────────── */
    .puzzle-card {
      background: #fffbeb;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      overflow: hidden;
    }

    #puzzle-svg {
      display: block;
      width: 100%;
      border-radius: 10px;
    }

    /* ── Question row ───────────────────────────────────────────────── */
    .question-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #f5f3ff;
      border: 2px solid #c4b5fd;
      border-radius: 16px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.75rem;
      font-size: clamp(1rem, 4vw, 1.25rem);
      font-weight: 800;
      color: #3730a3;
      line-height: 1.3;
    }

    /* ── Choices ─────────────────────────────────────────────────────── */
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 420px;
      margin: 0 auto 0.65rem;
    }

    .choice-btn {
      border-radius: 16px;
      border: 3px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      padding: 0.65rem 0.6rem;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 800;
      color: #1f2937;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .choice-btn:hover,
    .choice-btn:focus-visible {
      transform: translateY(-3px) scale(1.04);
      border-color: #a78bfa;
      box-shadow: 0 7px 18px rgba(0,0,0,0.12);
      outline: 3px solid #a78bfa;
      outline-offset: 2px;
    }
    .choice-btn:active { transform: scale(0.95); }

    .choice-btn.state-correct {
      border-color: #22c55e;
      background: #f0fff4;
      animation: cellPop 0.3s ease;
    }
    .choice-btn.state-wrong {
      border-color: #f87171;
      background: #fff5f5;
      animation: shake 0.35s ease;
    }

    @keyframes cellPop {
      0%   { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      60%       { transform: translateX(7px); }
    }

    /* ── Feedback ────────────────────────────────────────────────────── */
    .feedback {
      min-height: 2rem;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 800;
    }
    .feedback.correct { color: #15803d; }
    .feedback.wrong   { color: #dc2626; }

    /* ── Win overlay ─────────────────────────────────────────────────── */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .win-overlay.show { opacity: 1; pointer-events: auto; }

    .win-card {
      background: #fff;
      border-radius: 26px;
      padding: 2rem 1.6rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      animation: popCard 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popCard {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-emoji  { font-size: 3rem; margin-bottom: 0.4rem; }
    .win-title  { font-size: clamp(1.3rem,5vw,1.7rem); font-weight: 800; color: #1f2937; margin-bottom: 0.4rem; }
    .win-score  { font-size: 1rem; color: #6b7280; margin-bottom: 1.2rem; }

    .replay-btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 50px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      transition: transform 0.12s;
    }
    .replay-btn:hover  { transform: translateY(-2px); }
    .replay-btn:active { transform: scale(0.96); }

    /* ── Confetti ────────────────────────────────────────────────────── */
    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    /* ── Mobile — everything on one screen ──────────────────────────── */
    @media (max-width: 600px) {
      body {
        padding: 0.35rem 0.35rem 0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        overscroll-behavior-y: none;
      }

      header { flex-shrink: 0; margin-bottom: 0.25rem; }
      .back-btn, .score-badge {
        min-height: 38px;
        padding: 0.3rem 0.7rem;
        font-size: 0.82rem;
        border-radius: 10px;
      }

      main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      h1           { font-size: 1rem;    margin-bottom: 0; }
      .subtitle    { font-size: 0.68rem; margin-bottom: 0.1rem; }
      .round-label { font-size: 0.62rem; margin-bottom: 0.15rem; }

      .progress-track { height: 6px; margin-bottom: 0.25rem; flex-shrink: 0; }

      .puzzle-card {
        flex: 1;
        min-height: 0;
        margin-bottom: 0.3rem;
        padding: 0.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #puzzle-svg { max-height: 100%; }

      .question-row {
        flex-shrink: 0;
        padding: 0.28rem 0.6rem;
        margin-bottom: 0.22rem;
        font-size: clamp(0.85rem, 3.5vw, 1rem);
        gap: 0.35rem;
      }

      .choices-grid { flex-shrink: 0; gap: 6px; margin-bottom: 0.18rem; }
      .choice-btn   { min-height: 48px; font-size: 1.2rem; }

      .feedback {
        flex-shrink: 0;
        min-height: 1.3rem;
        font-size: 0.88rem;
        padding-bottom: env(safe-area-inset-bottom, 0.25rem);
      }
    }

    @media (max-width: 360px) {
      .choice-btn { min-height: 42px; font-size: 1.05rem; }
    }
  </style>
</head>

    }

    // ═══════════════════════════════════════════════════════════════════
    //  GAME STATE
    // ═══════════════════════════════════════════════════════════════════
    let round      = 0;
    let score      = 0;
    let answered   = false;
    let roundQueue = [];

    // ═══════════════════════════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildRoundQueue() {
      return shuffle(PUZZLES).slice(0, TOTAL);
    }

    // ═══════════════════════════════════════════════════════════════════
    //  SVG HELPERS
    // ═══════════════════════════════════════════════════════════════════
    const NS = 'http://www.w3.org/2000/svg';

    function makeShapeEl(s) {
      let el;
      if (s.t === 'C') {
        el = document.createElementNS(NS, 'circle');
        el.setAttribute('cx', s.cx); el.setAttribute('cy', s.cy); el.setAttribute('r', s.r);
      } else if (s.t === 'R') {
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x', s.x); el.setAttribute('y', s.y);
        el.setAttribute('width', s.w); el.setAttribute('height', s.h);
      } else if (s.t === 'E') {
        el = document.createElementNS(NS, 'ellipse');
        el.setAttribute('cx', s.cx); el.setAttribute('cy', s.cy);
        el.setAttribute('rx', s.rx); el.setAttribute('ry', s.ry);
      } else { // RR
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x', s.x); el.setAttribute('y', s.y);
        el.setAttribute('width', s.w); el.setAttribute('height', s.h);
        el.setAttribute('rx', s.rx); el.setAttribute('ry', s.rx);
      }
      el.setAttribute('fill', 'none');
      el.setAttribute('stroke', '#1a1a1a');
      el.setAttribute('stroke-width', '3.5');
      el.setAttribute('stroke-linejoin', 'round');
      return el;
    }

    // Small inline icon for the question row
    function iconSVG(type) {
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', '0 0 36 36');
      svg.setAttribute('width', '28');
      svg.setAttribute('height', '28');
      svg.style.cssText = 'display:inline-block;vertical-align:middle;flex-shrink:0';
      let el;
      if (type === 'C') {
        el = document.createElementNS(NS, 'circle');
        el.setAttribute('cx','18'); el.setAttribute('cy','18'); el.setAttribute('r','13');
      } else if (type === 'R') {
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x','4'); el.setAttribute('y','10');
        el.setAttribute('width','28'); el.setAttribute('height','16');
      } else if (type === 'E') {
        el = document.createElementNS(NS, 'ellipse');
        el.setAttribute('cx','18'); el.setAttribute('cy','18');
        el.setAttribute('rx','15'); el.setAttribute('ry','9');
      } else { // RR
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x','4'); el.setAttribute('y','10');
        el.setAttribute('width','28'); el.setAttribute('height','16');
        el.setAttribute('rx','5');
      }
      el.setAttribute('fill','none');
      el.setAttribute('stroke','currentColor');
      el.setAttribute('stroke-width','3');
      svg.appendChild(el);
      return svg;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  RENDER ROUND
    // ═══════════════════════════════════════════════════════════════════
    function renderRound() {
      answered = false;
      const pz = roundQueue[round];

      document.getElementById('round-label').textContent =
        `Round ${round + 1} of ${TOTAL}`;
      document.getElementById('progress-fill').style.width =
        `${(round / TOTAL) * 100}%`;

      // Draw shapes in random order (affects layering, creating variety)
      const svg = document.getElementById('puzzle-svg');
      svg.innerHTML = '';
      shuffle(pz.shapes).forEach(s => svg.appendChild(makeShapeEl(s)));

      // Question row: icon + text
      const qRow = document.getElementById('question-row');
      qRow.innerHTML = '';
      qRow.appendChild(iconSVG(pz.target));
      const span = document.createElement('span');
      span.textContent = `How many ${pz.label} can you count?`;
      qRow.appendChild(span);

      // Number choices
      const correctText = String(pz.correct);
      const allChoices  = shuffle([correctText, ...pz.distractors.map(String)]);
      const grid = document.getElementById('choices-grid');
      grid.innerHTML = '';
      allChoices.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = text;
        btn.addEventListener('click', () => handleChoice(text, btn, correctText));
        grid.appendChild(btn);
      });

      const fb = document.getElementById('feedback');
      fb.textContent = '';
      fb.className = 'feedback';
    }

    // ═══════════════════════════════════════════════════════════════════
    //  HANDLE CHOICE
    // ═══════════════════════════════════════════════════════════════════
    function handleChoice(chosen, btn, correct) {
      if (answered) return;
      const fb = document.getElementById('feedback');

      if (chosen === correct) {
        answered = true;
        btn.classList.add('state-correct');
        playSound('match');
        const msgs = [
          "That's right! 🌟", "You got it! ⭐", "Great counting! 🧠",
          "Correct! 🎉", "Wonderful! 🎊", "Sharp eyes! 👀",
        ];
        fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
        fb.className = 'feedback correct';
        score++;
        document.getElementById('score-val').textContent = score;
        setTimeout(() => {
          round++;
          if (round >= TOTAL) showWinScreen();
          else renderRound();
        }, 1300);
      } else {
        btn.classList.add('state-wrong');
        fb.textContent = 'Not quite — try again!';
        fb.className = 'feedback wrong';
        setTimeout(() => {
          btn.classList.remove('state-wrong');
          fb.textContent = '';
          fb.className = 'feedback';
        }, 850);
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    //  WIN SCREEN
    // ═══════════════════════════════════════════════════════════════════
    function showWinScreen() {
      document.getElementById('progress-fill').style.width = '100%';
      playSound('win');
      const emojiEl = document.getElementById('win-emoji');
      const titleEl = document.getElementById('win-title-el');
      const scoreEl = document.getElementById('win-score-msg');
      if (score >= TOTAL)  { emojiEl.textContent = '🏆🔷🏆'; titleEl.textContent = 'Shape Master!'; }
      else if (score >= 6) { emojiEl.textContent = '⭐🔷⭐'; titleEl.textContent = 'Super Spotter!'; }
      else if (score >= 4) { emojiEl.textContent = '🌟🔷🌟'; titleEl.textContent = 'Good Counting!'; }
      else                 { emojiEl.textContent = '💪🔷💪'; titleEl.textContent = 'Keep Practising!'; }
      scoreEl.textContent = `You got ${score} out of ${TOTAL} right!`;
      document.getElementById('win-overlay').classList.add('show');
      launchConfetti();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  CONFETTI
    // ═══════════════════════════════════════════════════════════════════
    function launchConfetti() {
      const style = document.createElement('style');
      style.textContent = `@keyframes confettiFall {
        0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
        100% { transform:translateY(105vh) rotate(540deg); opacity:0; }
      }`;
      document.head.appendChild(style);
      const layer  = document.getElementById('confetti-layer');
      layer.innerHTML = '';
      const colors = ['#f87171','#fbbf24','#34d399','#60a5fa','#a78bfa','#fb7185','#4ade80'];
      for (let i = 0; i < 70; i++) {
        const el   = document.createElement('div');
        const size = 7 + Math.random() * 8;
        el.style.cssText = `
          position:absolute;left:${Math.random()*100}%;top:-20px;
          width:${size}px;height:${size}px;
          border-radius:${Math.random()>0.45?'50%':'2px'};
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation:confettiFall ${1.6+Math.random()*2.2}s ease-in ${Math.random()}s forwards;
        `;
        layer.appendChild(el);
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    //  RESTART
    // ═══════════════════════════════════════════════════════════════════
    function restartGame() {
      round = 0;
      score = 0;
      document.getElementById('score-val').textContent = '0';
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('confetti-layer').innerHTML = '';
      roundQueue = buildRoundQueue();
      renderRound();
    }

    restartGame();
  </script>
</body>
</html>
