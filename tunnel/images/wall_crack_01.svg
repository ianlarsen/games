<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>wall_crack_01</title>
  <desc>Transparent branching wall crack decal for a 3D maze wall.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <linearGradient id="crackGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090807"/>
      <stop offset="55%" stop-color="#1b1712"/>
      <stop offset="100%" stop-color="#050403"/>
    </linearGradient>
  </defs>

  <!-- Main vertical fracture -->
  <path d="M522 56
           C509 103 547 139 526 189
           C512 223 493 245 505 287
           C516 325 482 355 493 392
           C504 430 541 459 519 506
           C501 544 514 579 496 622
           C479 662 507 694 492 738
           C478 780 453 817 463 868
           C468 900 441 934 447 982"
        fill="none"
        stroke="url(#crackGradient)"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <!-- Inner darker split -->
  <path d="M522 56
           C509 103 547 139 526 189
           C512 223 493 245 505 287
           C516 325 482 355 493 392
           C504 430 541 459 519 506
           C501 544 514 579 496 622
           C479 662 507 694 492 738
           C478 780 453 817 463 868
           C468 900 441 934 447 982"
        fill="none"
        stroke="#020202"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Left upper branch -->
  <path d="M510 221
           C464 206 422 179 390 139
           C363 106 329 88 293 77"
        fill="none"
        stroke="#11100d"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <path d="M389 140
           C357 154 330 161 302 153"
        fill="none"
        stroke="#080706"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Right upper branch -->
  <path d="M523 185
           C570 166 612 137 644 93
           C667 61 705 45 756 39"
        fill="none"
        stroke="#12100d"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <path d="M641 96
           C681 110 717 114 759 102"
        fill="none"
        stroke="#080706"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Mid left branch -->
  <path d="M500 399
           C448 410 416 446 381 489
           C348 529 311 545 262 548"
        fill="none"
        stroke="#14120f"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <path d="M380 489
           C369 452 351 420 321 393"
        fill="none"
        stroke="#0b0908"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <path d="M348 527
           C320 504 292 493 260 497"
        fill="none"
        stroke="#0a0907"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Mid right branch -->
  <path d="M520 506
           C568 530 610 559 639 604
           C669 650 706 673 764 679"
        fill="none"
        stroke="#15120f"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <path d="M637 604
           C666 586 701 578 741 584"
        fill="none"
        stroke="#0b0908"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Lower left branch -->
  <path d="M493 735
           C444 724 404 734 362 764
           C328 789 292 797 253 789"
        fill="none"
        stroke="#13110e"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <path d="M362 764
           C344 735 322 714 291 702"
        fill="none"
        stroke="#090807"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Lower right branch -->
  <path d="M465 868
           C510 872 547 891 583 923
           C617 953 655 966 702 962"
        fill="none"
        stroke="#11100d"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <!-- Hairline cracks -->
  <path d="M536 304 C566 295 591 280 617 253"
        fill="none" stroke="#080706" stroke-width="4" stroke-linecap="round"/>
  <path d="M489 620 C459 601 429 592 397 596"
        fill="none" stroke="#080706" stroke-width="4" stroke-linecap="round"/>
  <path d="M503 287 C474 286 446 276 423 253"
        fill="none" stroke="#080706" stroke-width="4" stroke-linecap="round"/>
  <path d="M519 506 C548 493 575 489 600 496"
        fill="none" stroke="#080706" stroke-width="4" stroke-linecap="round"/>
  <path d="M492 738 C516 760 543 772 579 771"
        fill="none" stroke="#080706" stroke-width="4" stroke-linecap="round"/>

  <!-- Tiny chipped gaps around cracks -->
  <g fill="#17130f" opacity="0.65">
    <ellipse cx="506" cy="289" rx="9" ry="4" transform="rotate(-31 506 289)"/>
    <ellipse cx="494" cy="393" rx="11" ry="5" transform="rotate(24 494 393)"/>
    <ellipse cx="517" cy="507" rx="10" ry="4" transform="rotate(-18 517 507)"/>
    <ellipse cx="495" cy="622" rx="8" ry="4" transform="rotate(39 495 622)"/>
    <ellipse cx="463" cy="868" rx="10" ry="4" transform="rotate(-42 463 868)"/>
    <ellipse cx="637" cy="604" rx="9" ry="4" transform="rotate(34 637 604)"/>
    <ellipse cx="381" cy="489" rx="8" ry="4" transform="rotate(-30 381 489)"/>
  </g>
</svg>
