<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>key_circle</title>
  <desc>Standalone transparent circle key sprite for the labyrinth game.</desc>

  <defs>
    <linearGradient id="goldMain" x1="88" y1="90" x2="414" y2="405" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff4ad"/>
      <stop offset="25%" stop-color="#e7b83b"/>
      <stop offset="52%" stop-color="#8d5a12"/>
      <stop offset="78%" stop-color="#f0c95b"/>
      <stop offset="100%" stop-color="#6c4208"/>
    </linearGradient>

    <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5810"/>
      <stop offset="58%" stop-color="#3a2205"/>
      <stop offset="100%" stop-color="#c89025"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdf5a" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#ffcc33" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffcc33" stop-opacity="0"/>
    </radialGradient>

    <filter id="dropShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="8" dy="12" stdDeviation="9" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- soft pickup glow -->
  <circle cx="256" cy="256" r="210" fill="url(#glow)" filter="url(#softBlur)"/>

  <g filter="url(#dropShadow)">
    <!-- circular bow/head -->
    <circle cx="155" cy="256" r="82" fill="url(#goldMain)" stroke="#2e1b04" stroke-width="12"/>
    <circle cx="155" cy="256" r="38" fill="none" stroke="#2e1b04" stroke-width="14"/>
    <circle cx="155" cy="256" r="20" fill="#000000" opacity="0.18"/>

    <!-- antique rim detail -->
    <circle cx="155" cy="256" r="64" fill="none" stroke="#fff1a2" stroke-width="5" opacity="0.34"/>

    <!-- key shaft -->
    <rect x="223" y="238" width="150" height="36" rx="18" fill="url(#goldMain)" stroke="#2e1b04" stroke-width="10"/>

    <!-- shaft highlight -->
    <rect x="246" y="247" width="94" height="7" rx="4" fill="#fff7bd" opacity="0.5"/>

    <!-- neck connector -->
    <rect x="200" y="232" width="48" height="48" rx="20" fill="url(#goldMain)" stroke="#2e1b04" stroke-width="9"/>

    <!-- teeth -->
    <rect x="348" y="219" width="34" height="36" rx="4" fill="url(#goldDark)" stroke="#2e1b04" stroke-width="8"/>
    <rect x="371" y="262" width="52" height="35" rx="4" fill="url(#goldDark)" stroke="#2e1b04" stroke-width="8"/>
    <rect x="402" y="262" width="30" height="68" rx="4" fill="url(#goldDark)" stroke="#2e1b04" stroke-width="8"/>

    <!-- upper shine on circle -->
    <path d="M101 217 C132 180 186 179 218 216"
          fill="none"
          stroke="#fff6b8"
          stroke-width="9"
          stroke-linecap="round"
          opacity="0.48"/>

    <!-- tiny scratches -->
    <g stroke="#402706" stroke-linecap="round" opacity="0.35">
      <path d="M275 263 L330 260" stroke-width="4"/>
      <path d="M133 194 L164 186" stroke-width="4"/>
      <path d="M114 306 L145 320" stroke-width="3"/>
      <path d="M374 285 L411 287" stroke-width="3"/>
    </g>
  </g>
</svg>
