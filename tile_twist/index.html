<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Twist Tiles — OT App Version</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --surface: #bfeeff;
      --ink: #27313b;
      --muted: rgba(45, 72, 94, 0.76);
      --panel: rgba(255, 250, 236, 0.94);
      --line: rgba(82, 55, 28, 0.18);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--surface);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      overscroll-behavior: none;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      background:
        radial-gradient(circle at 22% 12%, rgba(255,255,255,0.88), transparent 22%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.52), transparent 18%),
        linear-gradient(180deg, #bfeeff 0%, #dff7ff 48%, #d7f0b7 100%);
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }
    #game-canvas.is-grabbing { cursor: grabbing; }
    .hud {
      position: absolute;
      z-index: 4;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(31, 55, 78, 0.16);
      backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
    }
    #title-card {
      left: 12px;
      top: 10px;
      max-width: min(28rem, calc(100vw - 24px));
      padding: 8px 12px;
      border-radius: 14px;
      pointer-events: auto;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      margin-bottom: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: #53371c;
      font: 700 0.72rem/1 system-ui, sans-serif;
      text-decoration: none;
      touch-action: manipulation;
    }
    .back-btn:active { transform: scale(0.98); }
    #title-card h1 {
      margin: 0 0 3px;
      font-size: 0.92rem;
      line-height: 1.1;
      color: #53371c;
    }
    #title-card p {
      margin: 0;
      font-size: 0.68rem;
      line-height: 1.28;
      color: var(--muted);
    }
    #readout {
      right: 12px;
      top: 10px;
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 0.74rem;
      color: #53371c;
      min-width: 8.5rem;
      text-align: center;
    }
    #new-game-btn {
      position: absolute;
      z-index: 5;
      right: 12px;
      top: 52px;
      padding: 10px 14px;
      border: 2px solid rgba(83, 55, 28, 0.24);
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9f43, #f2762e);
      color: #fff;
      font: 800 0.78rem/1 "Segoe UI", system-ui, sans-serif;
      box-shadow: 0 10px 24px rgba(31, 55, 78, 0.22);
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    #new-game-btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 6px 18px rgba(31, 55, 78, 0.2);
    }
    #pattern-card {
      left: 12px;
      bottom: 12px;
      width: min(31vw, 132px);
      aspect-ratio: 5 / 7;
      padding: 6px;
      border-radius: 16px;
    }
    #pattern-card canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }
    #status {
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 0.72rem;
      color: #53371c;
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
      white-space: nowrap;
    }
    #status.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-3px);
    }
    @media (max-width: 560px) {
      #title-card { left: 8px; right: 8px; top: 8px; padding: 7px 10px; }
      #title-card { max-width: calc(100vw - 16px); }
      #title-card h1 { font-size: 0.84rem; }
      #title-card p { font-size: 0.62rem; }
      .back-btn { min-height: 44px; font-size: 0.7rem; }
      #new-game-btn { right: 8px; top: auto; bottom: 8px; padding: 12px 15px; min-height: 44px; font-size: 0.76rem; }
      #pattern-card { width: min(30vw, 96px); left: 8px; bottom: 8px; padding: 5px; }
      #status { bottom: 112px; font-size: 0.66rem; }
    }
    .win-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .win-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .win-message {
      margin: 0;
      color: #fff;
      font-size: clamp(1.8rem, 8vw, 2.75rem);
      font-weight: 800;
      text-align: center;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.45);
    }
    .win-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }
    .win-btn {
      min-height: 48px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font: 700 1rem/1 system-ui, sans-serif;
      cursor: pointer;
      touch-action: manipulation;
      text-decoration: none;
      text-align: center;
    }
    .win-btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }
    .win-btn-secondary {
      background: #f3f4f6;
      color: #1f2937;
    }
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 31;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.85;
      animation: confetti-fall 5s linear forwards;
    }
    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="../_ios_compat.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas" aria-label="Twist Tiles game board"></canvas>
    <div id="title-card" class="hud">
      <a href="../index.html#map" class="back-btn">&larr; Back to All Games</a>
      <h1>Twist Tiles</h1>
      <p>Make the big card. Drag a tile. Tap to turn it.</p>
    </div>
    <button type="button" id="new-game-btn" aria-label="Start a new random solvable game">New Game</button>
    <div id="pattern-card" class="hud" aria-label="Target card to copy">
      <canvas id="pattern-canvas"></canvas>
    </div>
    <div id="status" class="hud">Matched</div>
  </div>

  <div id="win-overlay" class="win-overlay" role="dialog" aria-modal="true" aria-labelledby="win-message">
    <p id="win-message" class="win-message">You did it!</p>
    <div class="win-actions">
      <button type="button" id="play-again-btn" class="win-btn win-btn-primary">Play Again</button>
      <a href="../index.html#map" class="win-btn win-btn-secondary">Main Menu</a>
    </div>
  </div>
  <div id="confetti-container" class="confetti-container" aria-hidden="true"></div>

  <audio id="flip-sound" src="../sounds/flip.mp3" preload="auto"></audio>
  <audio id="win-sound" src="../sounds/win.mp3" preload="auto"></audio>

  <script>
    'use strict';

    const SPEC = Object.freeze({
      background: '#bfeeff',
      tile: Object.freeze({
        cellW: 74,
        radius: 17,
        inset: 9,
        shadowBlur: 24,
        shadowOffsetY: 10,
        grabLift: 10,
        snapSpeed: 0.28,
        settleSpeed: 0.22,
        faces: [
          { key: 'lattice-ringDot', label: 'Lattice / Ring', top: 'lattice', bottom: 'ringDot' },
          { key: 'triPair-zigzag', label: 'Triangles / Zigzag', top: 'triPair', bottom: 'zigzag' },
          { key: 'burst-arcBolt', label: 'Burst / Bolt', top: 'burst', bottom: 'arcBolt' },
          { key: 'zigzag-lattice', label: 'Zigzag / Lattice', top: 'zigzag', bottom: 'lattice' },
          { key: 'ringDot-lattice', label: 'Ring / Lattice', top: 'ringDot', bottom: 'lattice' },
          { key: 'arcBolt-triPair', label: 'Bolt / Triangles', top: 'arcBolt', bottom: 'triPair' }
        ]
      }),
      physics: Object.freeze({
        dragRotationGain: 0,
        releaseDamping: 0.82,
        angularDamping: 0.88,
        maxAngularVelocity: 0,
        tapTimeMs: 230,
        tapDistancePx: 9,
        snapDistanceFactor: 0.50,
        snapAngleTolerance: 0.52
      }),
      pattern: Object.freeze({
        // The board shape stays readable on phones; the symbols inside it are generated fresh.
        rowLengths: [3, 3, 4],
        maxCols: 4
      }),
      patternCard: Object.freeze({
        pixelWidth: 250,
        pixelHeight: 350,
        margin: 16,
        borderColor: '#53371c'
      }),
      tileCount: 5
    });

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const patternCanvas = document.getElementById('pattern-canvas');
    const patternCtx = patternCanvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const newGameBtn = document.getElementById('new-game-btn');
    const winOverlay = document.getElementById('win-overlay');
    const confettiContainer = document.getElementById('confetti-container');
    const playAgainBtn = document.getElementById('play-again-btn');
    const flipSound = document.getElementById('flip-sound');
    const winSound = document.getElementById('win-sound');

    let width = 1;
    let height = 1;
    let dpr = 1;
    let selected = null;
    let pointerId = null;
    let dragOffset = { x: 0, y: 0 };
    let lastPointer = { x: 0, y: 0, t: 0 };
    let pointerStart = { x: 0, y: 0, t: 0 };
    let cells = [];
    let placements = [];
    let tiles = [];
    let patternRows = [];
    let solution = [];
    let tileSeeds = [];
    let board = { x: 0, y: 0, cell: 64, gap: 8, w: 0, h: 0 };
    let audioCtx = null;
    let lastStatusTimeout = null;
    let audioUnlocked = false;
    let gameWon = false;

    const Glyphs = Object.freeze({
      lattice(ctx, s) {
        // Nine-dot cluster: simple, readable, non-text symbol.
        ctx.lineWidth = s * 0.045;
        const dot = s * 0.105;
        const gap = s * 0.24;
        for (let row = -1; row <= 1; row++) {
          for (let col = -1; col <= 1; col++) {
            ctx.fillStyle = '#ff5b8a';
            ctx.strokeStyle = '#4b220f';
            circle(ctx, col * gap, row * gap, dot, true);
            circle(ctx, col * gap, row * gap, dot, false);
          }
        }
      },
      ringDot(ctx, s) {
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.055;
        ctx.fillStyle = '#5cc8ff';
        circle(ctx, 0, 0, s * 0.34, true);
        circle(ctx, 0, 0, s * 0.34, false);
        ctx.fillStyle = '#ffffff';
        circle(ctx, 0, 0, s * 0.16, true);
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.04;
        circle(ctx, 0, 0, s * 0.16, false);
      },
      triPair(ctx, s) {
        ctx.fillStyle = '#ffd23f';
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.045;
        triangle(ctx, 0, -s * 0.18, s * 0.29, 0);
        ctx.stroke();
        triangle(ctx, 0, s * 0.18, s * 0.29, Math.PI);
        ctx.stroke();
      },
      zigzag(ctx, s) {
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.14;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(-s * 0.42, -s * 0.12);
        ctx.lineTo(-s * 0.14, s * 0.12);
        ctx.lineTo(s * 0.14, -s * 0.12);
        ctx.lineTo(s * 0.42, s * 0.12);
        ctx.stroke();
        ctx.strokeStyle = '#35c96f';
        ctx.lineWidth = s * 0.075;
        ctx.stroke();
      },
      burst(ctx, s) {
        ctx.fillStyle = '#9b5cff';
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.035;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = -Math.PI / 2 + i * Math.PI * 2 / 10;
          const r = i % 2 === 0 ? s * 0.42 : s * 0.18;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      },
      arcBolt(ctx, s) {
        ctx.fillStyle = '#ff7a28';
        ctx.strokeStyle = '#4b220f';
        ctx.lineWidth = s * 0.045;
        ctx.beginPath();
        ctx.moveTo(-s * 0.06, -s * 0.43);
        ctx.lineTo(s * 0.24, -s * 0.05);
        ctx.lineTo(s * 0.04, -s * 0.05);
        ctx.lineTo(s * 0.20, s * 0.43);
        ctx.lineTo(-s * 0.24, s * 0.04);
        ctx.lineTo(-s * 0.02, s * 0.04);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    });

    class Tile {
      constructor(spec) {
        this.id = spec.id;
        this.faceIndex = spec.faceIndex;
        this.x = 0;
        this.y = 0;
        this.homeX = 0;
        this.homeY = 0;
        this.rotation = 0;
        this.targetRotation = 0;
        this.angularVelocity = 0;
        this.vx = 0;
        this.vy = 0;
        this.isDragging = false;
        this.isLocked = false;
        this.lockedPlacementId = null;
        this.lockedCells = [];
        this.scale = 1;
        this.targetScale = 1;
        this.lift = 0;
        this.targetLift = 0;
        this.flash = 0;
      }
      get face() { return SPEC.tile.faces[this.faceIndex]; }
      get tileW() { return board.cell; }
      get tileH() { return board.cell * 2 + board.gap; }
      contains(px, py) {
        const local = screenToLocal(px, py, this);
        return Math.abs(local.x) <= this.tileW / 2 && Math.abs(local.y) <= this.tileH / 2;
      }
      cycleFace() {
        if (this.isLocked) return;
        this.faceIndex = (this.faceIndex + 1) % SPEC.tile.faces.length;
        this.targetRotation = nearestRightAngle(this.rotation + Math.PI / 2);
        this.angularVelocity = 0;
        playTick(440, 0.045, 0.025);
        showStatus('');
      }
      unlock() {
        this.isLocked = false;
        this.lockedPlacementId = null;
        this.lockedCells = [];
        assignCellOccupancy();
      }
      reset() {
        this.x = this.homeX;
        this.y = this.homeY;
        this.rotation = 0;
        this.targetRotation = 0;
        this.angularVelocity = 0;
        this.vx = 0;
        this.vy = 0;
        this.isDragging = false;
        this.isLocked = false;
        this.lockedPlacementId = null;
        this.lockedCells = [];
        this.targetScale = 1;
        this.scale = 1;
        this.targetLift = 0;
        this.lift = 0;
        this.flash = 0;
      }
      update() {
        if (!this.isDragging) {
          if (!this.isLocked) {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= SPEC.physics.releaseDamping;
            this.vy *= SPEC.physics.releaseDamping;
            if (Math.abs(this.vx) < 0.02) this.vx = 0;
            if (Math.abs(this.vy) < 0.02) this.vy = 0;
          }
          this.rotation += this.angularVelocity;
          this.angularVelocity *= SPEC.physics.angularDamping;
          if (Math.abs(this.angularVelocity) < 0.0008) this.angularVelocity = 0;
        }
        this.rotation += normAngle(this.targetRotation - this.rotation) * SPEC.tile.settleSpeed;
        this.scale += (this.targetScale - this.scale) * 0.18;
        this.lift += (this.targetLift - this.lift) * 0.20;
        this.flash *= 0.86;
        if (this.isLocked) {
          const p = placements.find(place => place.id === this.lockedPlacementId);
          if (p) {
            this.x += (p.x - this.x) * SPEC.tile.snapSpeed;
            this.y += (p.y - this.y) * SPEC.tile.snapSpeed;
            this.targetRotation = p.angle;
          }
        }
      }
    }

    function circle(ctx, x, y, r, fill) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (fill) ctx.fill(); else ctx.stroke();
    }

    function triangle(ctx, x, y, r, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(-r * 0.9, r * 0.72);
      ctx.lineTo(r * 0.9, r * 0.72);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function roundedRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function nearestRightAngle(rad) {
      return Math.round(rad / (Math.PI / 2)) * (Math.PI / 2);
    }

    function normAngle(rad) {
      let a = rad % (Math.PI * 2);
      if (a > Math.PI) a -= Math.PI * 2;
      if (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function screenToLocal(px, py, tile) {
      const cos = Math.cos(-tile.rotation);
      const sin = Math.sin(-tile.rotation);
      const dx = px - tile.x;
      const dy = py - tile.y;
      return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function cellId(row, col) { return row + ':' + col; }

    function getFaceByKey(key) {
      return SPEC.tile.faces.find(face => face.key === key) || null;
    }

    function getTileSeed(tileId) {
      return tileSeeds.find(tile => tile.id === tileId) || null;
    }

    function areAdjacentCells(a, b) {
      const dr = Math.abs(a[0] - b[0]);
      const dc = Math.abs(a[1] - b[1]);
      return dr + dc === 1;
    }

    function getPatternGlyphAt(row, col) {
      const line = patternRows[row];
      return line ? line[col] : undefined;
    }

    function shuffleCopy(items) {
      const a = items.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeShapeCells() {
      const out = [];
      SPEC.pattern.rowLengths.forEach((len, r) => {
        for (let c = 0; c < len; c++) out.push([r, c]);
      });
      return out;
    }

    function findRandomDominoTiling(shapeCells) {
      const cellSet = new Set(shapeCells.map(([r, c]) => cellId(r, c)));
      const uncovered = new Set(cellSet);
      const pairs = [];

      function neighborsOf(cell) {
        const [r, c] = cell.split(':').map(Number);
        return shuffleCopy([[r, c + 1], [r + 1, c], [r, c - 1], [r - 1, c]])
          .map(([rr, cc]) => cellId(rr, cc))
          .filter(id => uncovered.has(id));
      }

      function search() {
        if (uncovered.size === 0) return true;
        let chosen = null;
        let options = null;
        for (const id of uncovered) {
          const n = neighborsOf(id);
          if (options === null || n.length < options.length) {
            chosen = id;
            options = n;
          }
        }
        if (!chosen || options.length === 0) return false;
        uncovered.delete(chosen);
        for (const other of options) {
          if (!uncovered.has(other)) continue;
          uncovered.delete(other);
          pairs.push([chosen, other]);
          if (search()) return true;
          pairs.pop();
          uncovered.add(other);
        }
        uncovered.add(chosen);
        return false;
      }

      return search() ? pairs : null;
    }

    function generateRandomPuzzle() {
      const shape = makeShapeCells();
      if (shape.length !== SPEC.tileCount * 2) {
        throw new Error('Pattern shape must contain exactly two cells per tile.');
      }

      let tiling = null;
      for (let tries = 0; tries < 40 && !tiling; tries++) tiling = findRandomDominoTiling(shape);
      if (!tiling) throw new Error('Could not create a legal random tiling for this board shape.');

      const tileIds = shuffleCopy(Array.from({ length: SPEC.tileCount }, (_, i) => i + 1));
      patternRows = SPEC.pattern.rowLengths.map(len => Array.from({ length: len }, () => null));
      solution = [];
      tileSeeds = [];

      shuffleCopy(tiling).forEach((pair, index) => {
        const tileId = tileIds[index];
        const faceIndex = Math.floor(Math.random() * SPEC.tile.faces.length);
        const face = SPEC.tile.faces[faceIndex];
        const ordered = Math.random() < 0.5 ? pair.slice() : pair.slice().reverse();
        ordered.forEach((id, side) => {
          const [r, c] = id.split(':').map(Number);
          patternRows[r][c] = side === 0 ? face.top : face.bottom;
        });
        solution.push({
          tileId,
          faceKey: face.key,
          cells: ordered.map(id => id.split(':').map(Number))
        });
        tileSeeds.push({
          id: tileId,
          faceIndex: Math.floor(Math.random() * SPEC.tile.faces.length)
        });
      });

      tileSeeds.sort((a, b) => a.id - b.id);
    }

    function validateSolvableSpec() {
      const errors = [];
      const usedTiles = new Set();
      const usedCells = new Set();
      const allPatternCells = [];

      patternRows.forEach((row, r) => {
        row.forEach((_, c) => allPatternCells.push(cellId(r, c)));
      });

      if (allPatternCells.length !== tileSeeds.length * 2) {
        errors.push('The board has ' + allPatternCells.length + ' cells but ' + tileSeeds.length + ' two-cell tiles.');
      }

      solution.forEach(entry => {
        const tile = getTileSeed(entry.tileId);
        const face = getFaceByKey(entry.faceKey);
        if (!tile) errors.push('Solution references missing tile ' + entry.tileId + '.');
        if (!face) errors.push('Solution references missing face ' + entry.faceKey + '.');
        if (usedTiles.has(entry.tileId)) errors.push('Tile ' + entry.tileId + ' is used more than once in the solution.');
        usedTiles.add(entry.tileId);
        if (!Array.isArray(entry.cells) || entry.cells.length !== 2) {
          errors.push('Tile ' + entry.tileId + ' does not claim exactly two cells.');
          return;
        }
        if (!areAdjacentCells(entry.cells[0], entry.cells[1])) {
          errors.push('Tile ' + entry.tileId + ' solution cells are not adjacent.');
        }
        const expectedGlyphs = [face.top, face.bottom];
        entry.cells.forEach((cell, i) => {
          const [r, c] = cell;
          const id = cellId(r, c);
          const boardGlyph = getPatternGlyphAt(r, c);
          if (boardGlyph === undefined) errors.push('Tile ' + entry.tileId + ' references missing board cell ' + id + '.');
          if (boardGlyph !== expectedGlyphs[i]) {
            errors.push('Tile ' + entry.tileId + ' expects ' + expectedGlyphs[i] + ' at ' + id + ' but board has ' + boardGlyph + '.');
          }
          if (usedCells.has(id)) errors.push('Board cell ' + id + ' is used more than once in the solution.');
          usedCells.add(id);
        });
      });

      allPatternCells.forEach(id => {
        if (!usedCells.has(id)) errors.push('Board cell ' + id + ' is not covered by the solution.');
      });
      tileSeeds.forEach(tile => {
        if (!usedTiles.has(tile.id)) errors.push('Tile ' + tile.id + ' is not used by the solution.');
      });

      return { ok: errors.length === 0, errors };
    }

    function generateValidatedPuzzle() {
      for (let tries = 0; tries < 25; tries++) {
        generateRandomPuzzle();
        const validation = validateSolvableSpec();
        if (validation.ok) return;
        console.warn('Regenerating unsolvable Twist Tiles puzzle:', validation.errors);
      }
      throw new Error('Could not generate a solvable Twist Tiles puzzle after repeated attempts.');
    }

    function layout() {
      width = Math.max(1, canvas.clientWidth);
      height = Math.max(1, canvas.clientHeight);
      dpr = Math.min(window.devicePixelRatio || 1, width < 700 ? 1.65 : 2);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const mobile = width < 560;
      const maxBoardW = width - (mobile ? 28 : 220);
      const maxBoardH = height * (mobile ? 0.40 : 0.42);
      const gap = mobile ? 7 : 9;
      const cell = Math.floor(Math.min(
        (maxBoardW - gap * (SPEC.pattern.maxCols - 1)) / SPEC.pattern.maxCols,
        (maxBoardH - gap * (patternRows.length - 1)) / patternRows.length,
        mobile ? 64 : 82
      ));
      board.cell = clamp(cell, mobile ? 48 : 58, mobile ? 64 : 82);
      board.gap = gap;
      board.w = SPEC.pattern.maxCols * board.cell + (SPEC.pattern.maxCols - 1) * board.gap;
      board.h = patternRows.length * board.cell + (patternRows.length - 1) * board.gap;
      board.x = Math.round(width / 2 - board.w / 2);
      board.y = Math.round(mobile ? 86 : 92);

      cells = [];
      patternRows.forEach((row, r) => {
        row.forEach((glyph, c) => {
          cells.push({
            id: cellId(r, c), row: r, col: c, glyph,
            x: board.x + c * (board.cell + board.gap) + board.cell / 2,
            y: board.y + r * (board.cell + board.gap) + board.cell / 2,
            size: board.cell,
            occupiedBy: null,
            pulse: 0
          });
        });
      });
      buildPlacements();

      const tileCount = tileSeeds.length;
      const tileW = board.cell;
      const spread = Math.min(tileW * 1.42, (width - 40) / Math.max(tileCount, 1));
      const totalW = spread * (tileCount - 1);
      const tileY = mobile ? Math.min(height * 0.58, height - board.cell * 2.35) : height * 0.68;
      tiles.forEach((tile, i) => {
        const oldHomeX = tile.homeX;
        const oldHomeY = tile.homeY;
        const wasFresh = oldHomeX === 0 && oldHomeY === 0;
        tile.homeX = width / 2 - totalW / 2 + i * spread;
        tile.homeY = clamp(tileY + (i % 2) * 12, board.y + board.h + board.cell * 1.35, height - board.cell * 1.25);
        if (wasFresh || (!tile.isDragging && !tile.isLocked && Math.abs(tile.x - oldHomeX) < 3 && Math.abs(tile.y - oldHomeY) < 3)) {
          tile.x = tile.homeX;
          tile.y = tile.homeY;
        }
      });
      assignCellOccupancy();
    }

    function getCell(r, c) {
      return cells.find(cell => cell.row === r && cell.col === c) || null;
    }

    function buildPlacements() {
      placements = [];
      let n = 0;
      for (const a of cells) {
        const right = getCell(a.row, a.col + 1);
        const down = getCell(a.row + 1, a.col);
        if (right) {
          placements.push({ id: 'p' + n++, cells: [a.id, right.id], glyphs: [a.glyph, right.glyph], x: (a.x + right.x) / 2, y: (a.y + right.y) / 2, angle: -Math.PI / 2, kind: 'horizontal' });
          placements.push({ id: 'p' + n++, cells: [right.id, a.id], glyphs: [right.glyph, a.glyph], x: (a.x + right.x) / 2, y: (a.y + right.y) / 2, angle: Math.PI / 2, kind: 'horizontal' });
        }
        if (down) {
          placements.push({ id: 'p' + n++, cells: [a.id, down.id], glyphs: [a.glyph, down.glyph], x: (a.x + down.x) / 2, y: (a.y + down.y) / 2, angle: 0, kind: 'vertical' });
          placements.push({ id: 'p' + n++, cells: [down.id, a.id], glyphs: [down.glyph, a.glyph], x: (a.x + down.x) / 2, y: (a.y + down.y) / 2, angle: Math.PI, kind: 'vertical' });
        }
      }
    }

    function assignCellOccupancy() {
      cells.forEach(c => { c.occupiedBy = null; });
      tiles.forEach(tile => {
        if (!tile.isLocked) return;
        tile.lockedCells.forEach(id => {
          const cell = cells.find(c => c.id === id);
          if (cell) cell.occupiedBy = tile.id;
        });
      });
    }

    function init() {
      generateValidatedPuzzle();
      tiles = tileSeeds.map(t => new Tile(t));
      layout();
      tiles.forEach(tile => {
        tile.x = tile.homeX;
        tile.y = tile.homeY;
      });
      selected = tiles[0];
      drawPatternCard();
      updateReadout();
      showStatus('New card');
      requestAnimationFrame(loop);
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, '#bfeeff');
      sky.addColorStop(0.58, '#e9fbff');
      sky.addColorStop(1, '#d9f1b2');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.55;
      drawCloud(width * 0.18, height * 0.13, width < 560 ? 0.62 : 0.9);
      drawCloud(width * 0.76, height * 0.17, width < 560 ? 0.50 : 0.75);
      ctx.restore();

      ctx.save();
      ctx.fillStyle = 'rgba(117, 190, 83, 0.26)';
      ctx.beginPath();
      ctx.ellipse(width * 0.50, height + 30, width * 0.62, height * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(-34, 8, 20, Math.PI, 0);
      ctx.arc(-12, -2, 26, Math.PI, 0);
      ctx.arc(18, 2, 22, Math.PI, 0);
      ctx.arc(42, 10, 16, Math.PI, 0);
      ctx.lineTo(58, 15);
      ctx.lineTo(-54, 15);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawBuildBoard() {
      ctx.save();
      ctx.shadowColor = 'rgba(31,55,78,0.18)';
      ctx.shadowBlur = 28;
      ctx.shadowOffsetY = 12;
      roundedRect(ctx, board.x - 14, board.y - 14, board.w + 28, board.h + 28, 22);
      const bg = ctx.createLinearGradient(board.x, board.y, board.x + board.w, board.y + board.h);
      bg.addColorStop(0, 'rgba(255,250,232,0.96)');
      bg.addColorStop(1, 'rgba(255,229,159,0.92)');
      ctx.fillStyle = bg;
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = 'rgba(83,55,28,0.24)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      cells.forEach(cell => {
        const matched = cell.occupiedBy !== null;
        ctx.save();
        ctx.translate(cell.x, cell.y);
        ctx.shadowColor = matched ? 'rgba(37,122,93,0.30)' : 'rgba(31,55,78,0.11)';
        ctx.shadowBlur = matched ? 14 : 8;
        ctx.shadowOffsetY = 3;
        roundedRect(ctx, -cell.size / 2, -cell.size / 2, cell.size, cell.size, 12);
        ctx.fillStyle = matched ? 'rgba(215,245,190,0.70)' : 'rgba(255,255,255,0.86)';
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.lineWidth = matched ? 3 : 2;
        ctx.strokeStyle = matched ? 'rgba(37,122,93,0.72)' : 'rgba(83,55,28,0.24)';
        ctx.stroke();
        if (!matched) {
          ctx.setLineDash([6, 6]);
          ctx.strokeStyle = 'rgba(83,55,28,0.18)';
          roundedRect(ctx, -cell.size / 2 + 6, -cell.size / 2 + 6, cell.size - 12, cell.size - 12, 8);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        ctx.globalAlpha = matched ? 0.11 : 0.32;
        drawGlyph(ctx, cell.glyph, 0, 0, cell.size * 0.52);
        ctx.restore();
      });
    }

    function drawGhostPlacement() {
      if (!selected || !selected.isDragging) return;
      const p = findBestPlacement(selected, false);
      if (!p) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.globalAlpha = 0.28;
      ctx.lineWidth = 4;
      ctx.strokeStyle = p.isExact ? 'rgba(37,122,93,0.95)' : 'rgba(176,120,24,0.70)';
      roundedRect(ctx, -board.cell / 2 - 3, -(board.cell * 2 + board.gap) / 2 - 3, board.cell + 6, board.cell * 2 + board.gap + 6, 18);
      ctx.stroke();
      ctx.restore();
    }

    function drawGlyph(ctx, name, x, y, size) {
      const fn = Glyphs[name];
      if (!fn) return;
      ctx.save();
      ctx.translate(x, y);
      fn(ctx, size);
      ctx.restore();
    }

    function drawTile(tile) {
      const w = tile.tileW;
      const h = tile.tileH;
      const lift = tile.lift;
      ctx.save();
      ctx.translate(tile.x, tile.y - lift);
      ctx.rotate(tile.rotation);
      ctx.scale(tile.scale, tile.scale);

      ctx.shadowColor = 'rgba(27, 43, 58, ' + (tile.isDragging ? '0.34' : '0.24') + ')';
      ctx.shadowBlur = SPEC.tile.shadowBlur + lift * 1.1;
      ctx.shadowOffsetY = SPEC.tile.shadowOffsetY + lift * 0.35;
      roundedRect(ctx, -w / 2, -h / 2, w, h, SPEC.tile.radius);
      const bodyGrad = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
      bodyGrad.addColorStop(0, '#fff8dc');
      bodyGrad.addColorStop(0.32, '#ffe79a');
      bodyGrad.addColorStop(0.72, '#ffc861');
      bodyGrad.addColorStop(1, '#f4a33d');
      ctx.fillStyle = bodyGrad;
      ctx.fill();
      ctx.shadowColor = 'transparent';

      ctx.save();
      roundedRect(ctx, -w / 2, -h / 2, w, h, SPEC.tile.radius);
      ctx.clip();
      drawTileGrain(ctx, w, h);
      ctx.restore();

      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.72)';
      roundedRect(ctx, -w / 2 + 2, -h / 2 + 2, w - 4, h - 4, SPEC.tile.radius - 2);
      ctx.stroke();

      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(83, 45, 20, 0.34)';
      roundedRect(ctx, -w / 2 + SPEC.tile.inset, -h / 2 + SPEC.tile.inset, w - SPEC.tile.inset * 2, h - SPEC.tile.inset * 2, SPEC.tile.radius - 7);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(83, 45, 20, 0.34)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + SPEC.tile.inset + 5, 0);
      ctx.lineTo(w / 2 - SPEC.tile.inset - 5, 0);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.36)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + SPEC.tile.inset + 5, 3);
      ctx.lineTo(w / 2 - SPEC.tile.inset - 5, 3);
      ctx.stroke();

      drawGlyph(ctx, tile.face.top, 0, -h * 0.25, w * 0.44);
      drawGlyph(ctx, tile.face.bottom, 0, h * 0.25, w * 0.44);

      if (tile === selected) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = tile.isLocked ? 'rgba(64,166,74,0.95)' : 'rgba(255,117,24,0.98)';
        roundedRect(ctx, -w / 2 - 4, -h / 2 - 4, w + 8, h + 8, SPEC.tile.radius + 4);
        ctx.stroke();
      }

      if (tile.flash > 0.01) {
        ctx.globalAlpha = tile.flash * 0.55;
        roundedRect(ctx, -w / 2 - 6, -h / 2 - 6, w + 12, h + 12, SPEC.tile.radius + 8);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTileGrain(ctx, w, h) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = '#678195';
      ctx.lineWidth = 1;
      for (let i = -8; i <= 8; i++) {
        ctx.beginPath();
        const x = i * 11;
        ctx.moveTo(x, -h / 2);
        ctx.bezierCurveTo(x + 8, -h * 0.18, x - 10, h * 0.18, x + 6, h / 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 0.10;
      ctx.fillStyle = '#1f405c';
      [-0.36, -0.19, 0.02, 0.24, 0.39].forEach(frac => ctx.fillRect(frac * w, -h / 2, 2, h));
      ctx.restore();
    }

    function drawPatternCard() {
      const spec = SPEC.patternCard;
      patternCanvas.width = spec.pixelWidth;
      patternCanvas.height = spec.pixelHeight;
      const c = patternCtx;
      const w = spec.pixelWidth;
      const h = spec.pixelHeight;
      c.clearRect(0, 0, w, h);
      const bg = c.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#fff7d6');
      bg.addColorStop(1, '#ffd98e');
      c.fillStyle = bg;
      roundedRect(c, 0, 0, w, h, 12);
      c.fill();

      const innerW = w - spec.margin * 2;
      const innerH = h - spec.margin * 2;
      const cell = Math.floor(Math.min(innerW / SPEC.pattern.maxCols, innerH / patternRows.length));
      const gridW = cell * SPEC.pattern.maxCols;
      const gridH = cell * patternRows.length;
      const ox = spec.margin + Math.floor((innerW - gridW) / 2);
      const oy = spec.margin + Math.floor((innerH - gridH) / 2);

      patternRows.forEach((row, r) => {
        row.forEach((glyph, col) => {
          const x = ox + col * cell;
          const y = oy + r * cell;
          c.save();
          c.beginPath();
          c.rect(x, y, cell, cell);
          c.clip();
          const cg = c.createLinearGradient(x, y, x + cell, y + cell);
          cg.addColorStop(0, '#ffffff');
          cg.addColorStop(1, '#fff0b8');
          c.fillStyle = cg;
          c.fillRect(x, y, cell, cell);
          drawGlyph(c, glyph, x + cell / 2, y + cell / 2, cell * 0.52);
          c.restore();
        });
      });

      c.beginPath();
      patternRows.forEach((row, r) => {
        row.forEach((_, col) => {
          const x = ox + col * cell;
          const y = oy + r * cell;
          c.rect(Math.round(x) + 0.5, Math.round(y) + 0.5, cell, cell);
        });
      });
      c.strokeStyle = spec.borderColor;
      c.lineWidth = 1;
      c.stroke();
    }

    function pickTile(x, y) {
      for (let i = tiles.length - 1; i >= 0; i--) {
        if (tiles[i].contains(x, y)) return tiles[i];
      }
      return null;
    }

    function updateReadout() {
      // Intentionally blank: the app version relies on visual tile state only.
    }

    function beginInteraction(e) {
      if (pointerId !== null) return;
      const p = getPointerPos(e);
      const tile = pickTile(p.x, p.y);
      if (!tile) return;
      e.preventDefault();
      ensureAudio();
      pointerId = e.pointerId;
      canvas.setPointerCapture(pointerId);
      selected = tile;
      const local = screenToLocal(p.x, p.y, tile);
      dragOffset.x = local.x;
      dragOffset.y = local.y;
      tile.isDragging = true;
      tile.unlock();
      tile.targetLift = SPEC.tile.grabLift;
      tile.targetScale = 1.035;
      tile.vx = 0;
      tile.vy = 0;
      tile.angularVelocity = 0;
      pointerStart = { x: p.x, y: p.y, t: performance.now() };
      lastPointer = { x: p.x, y: p.y, t: performance.now() };
      bringToFront(tile);
      updateReadout();
      canvas.classList.add('is-grabbing');
    }

    function bringToFront(tile) {
      const idx = tiles.indexOf(tile);
      if (idx < 0) return;
      tiles.splice(idx, 1);
      tiles.push(tile);
    }

    function moveInteraction(e) {
      if (e.pointerId !== pointerId || !selected) return;
      e.preventDefault();
      const p = getPointerPos(e);
      const now = performance.now();
      const dt = Math.max(16, now - lastPointer.t);
      const dx = p.x - lastPointer.x;
      const dy = p.y - lastPointer.y;

      const cos = Math.cos(selected.rotation);
      const sin = Math.sin(selected.rotation);
      selected.x = p.x - (dragOffset.x * cos - dragOffset.y * sin);
      selected.y = p.y - (dragOffset.x * sin + dragOffset.y * cos);
      selected.x = clamp(selected.x, selected.tileH * 0.28, width - selected.tileH * 0.28);
      selected.y = clamp(selected.y, selected.tileH * 0.36, height - selected.tileH * 0.36);
      selected.vx = dx * (16 / dt);
      selected.vy = dy * (16 / dt);
      // Carrying a tile should feel like holding a solid game piece, not like dragging
      // a swinging object. Movement no longer feeds rotational velocity. The tile keeps
      // its current orientation until the player intentionally taps/clicks to rotate it,
      // or until it snaps into a matching board slot.
      selected.angularVelocity = 0;
      selected.targetRotation = selected.rotation;
      lastPointer = { x: p.x, y: p.y, t: now };
      updatePotentialCellPulse(selected);
    }

    function endInteraction(e) {
      if (e.pointerId !== pointerId) return;
      if (canvas.hasPointerCapture(pointerId)) canvas.releasePointerCapture(pointerId);
      const p = getPointerPos(e);
      const dt = performance.now() - pointerStart.t;
      const dist = Math.hypot(p.x - pointerStart.x, p.y - pointerStart.y);
      const tile = selected;
      pointerId = null;
      canvas.classList.remove('is-grabbing');
      if (!tile) return;
      tile.isDragging = false;
      tile.targetLift = 0;
      tile.targetScale = 1;
      tile.angularVelocity = 0;

      if (dt <= SPEC.physics.tapTimeMs && dist <= SPEC.physics.tapDistancePx) {
        tile.cycleFace();
        updateReadout();
        return;
      }
      attemptSnap(tile);
      updateReadout();
    }

    function cancelInteraction(e) {
      if (e.pointerId !== pointerId) return;
      if (selected) {
        selected.isDragging = false;
        selected.targetLift = 0;
        selected.targetScale = 1;
      }
      pointerId = null;
      canvas.classList.remove('is-grabbing');
    }

    function updatePotentialCellPulse(tile) {
      const p = findBestPlacement(tile, false);
      cells.forEach(c => c.pulse = 0);
      if (!p) return;
      p.cells.forEach(id => {
        const cell = cells.find(c => c.id === id);
        if (cell) cell.pulse = 1;
      });
    }

    function isPlacementFree(place, tile) {
      return place.cells.every(id => {
        const cell = cells.find(c => c.id === id);
        return cell && (cell.occupiedBy === null || cell.occupiedBy === tile.id);
      });
    }

    function faceMatchesPlacement(tile, place) {
      return tile.face.top === place.glyphs[0] && tile.face.bottom === place.glyphs[1];
    }

    function findBestPlacement(tile, requireExact) {
      let best = null;
      let bestScore = Infinity;
      for (const place of placements) {
        if (!isPlacementFree(place, tile)) continue;
        const exact = faceMatchesPlacement(tile, place);
        if (requireExact && !exact) continue;
        const dist = Math.hypot(place.x - tile.x, place.y - tile.y);
        const maxDist = Math.max(board.cell, tile.tileW) * SPEC.physics.snapDistanceFactor;
        if (dist > maxDist) continue;
        const angleDelta = Math.abs(normAngle(place.angle - nearestRightAngle(tile.rotation)));
        if (requireExact && angleDelta > SPEC.physics.snapAngleTolerance) continue;
        const score = dist + angleDelta * 25 + (exact ? 0 : 1000);
        if (score < bestScore) {
          best = Object.assign({ isExact: exact }, place);
          bestScore = score;
        }
      }
      return best;
    }

    function attemptSnap(tile) {
      const place = findBestPlacement(tile, true);
      if (!place) {
        tile.targetRotation = nearestRightAngle(tile.rotation);
        playTick(190, 0.035, 0.018);
        showStatus('No two-slot match yet');
        return;
      }
      tile.isLocked = true;
      tile.lockedPlacementId = place.id;
      tile.lockedCells = place.cells.slice();
      tile.vx = 0;
      tile.vy = 0;
      tile.angularVelocity = 0;
      tile.targetRotation = place.angle;
      tile.flash = 1;
      assignCellOccupancy();
      place.cells.forEach(id => {
        const cell = cells.find(c => c.id === id);
        if (cell) cell.pulse = 1;
      });
      playFlipSound();
      showStatus('Clicked into the card');
      checkWin();
    }

    function checkWin() {
      if (gameWon) return;
      const filled = cells.filter(c => c.occupiedBy !== null).length;
      if (filled === cells.length) {
        gameWon = true;
        setTimeout(() => {
          playWinSound();
          triggerConfetti();
          winOverlay.classList.add('show');
          showStatus('Pattern complete');
        }, 140);
      }
    }

    function resetGame() {
      gameWon = false;
      winOverlay.classList.remove('show');
      confettiContainer.innerHTML = '';
      generateValidatedPuzzle();
      tiles = tileSeeds.map(t => new Tile(t));
      layout();
      tiles.forEach(tile => { tile.x = tile.homeX; tile.y = tile.homeY; });
      selected = tiles[0] || null;
      assignCellOccupancy();
      drawPatternCard();
      showStatus('New card');
      updateReadout();
    }

    function ensureAudio() {
      if (!audioUnlocked) unlockAudio();
      if (audioCtx) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      flipSound.play().then(() => {
        flipSound.pause();
        flipSound.currentTime = 0;
        winSound.play().then(() => {
          winSound.pause();
          winSound.currentTime = 0;
          audioUnlocked = true;
        }).catch(() => {});
      }).catch(() => {});
    }

    function playSound(sound) {
      if (!sound || !audioUnlocked) return;
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function playFlipSound() {
      playSound(flipSound);
    }

    function playWinSound() {
      playSound(winSound);
    }

    function triggerConfetti() {
      confettiContainer.innerHTML = '';
      const colors = ['#ff5733', '#33ff57', '#3357ff', '#ff33a1', '#a133ff', '#33fff6'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = `${Math.random() * 100}vw`;
        confetti.style.top = `${Math.random() * -50}vh`;
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
        confettiContainer.appendChild(confetti);
      }
    }

    function playTick(freq, dur, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(vol, now + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    }

    function showStatus(text) {
      statusEl.textContent = text;
      statusEl.classList.add('show');
      if (lastStatusTimeout) clearTimeout(lastStatusTimeout);
      lastStatusTimeout = setTimeout(() => statusEl.classList.remove('show'), 1050);
    }

    function loop() {
      tiles.forEach(tile => tile.update());
      cells.forEach(c => c.pulse *= 0.88);
      drawBackground();
      drawBuildBoard();
      drawGhostPlacement();
      tiles.forEach(drawTile);
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', layout);
    canvas.addEventListener('pointerdown', beginInteraction);
    canvas.addEventListener('pointermove', moveInteraction);
    canvas.addEventListener('pointerup', endInteraction);
    canvas.addEventListener('pointercancel', cancelInteraction);
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    newGameBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      ensureAudio();
      resetGame();
    });
    newGameBtn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
    });
    playAgainBtn.addEventListener('click', () => {
      ensureAudio();
      resetGame();
    });
    window.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r') resetGame();
      if (e.key === ' ' && selected) {
        e.preventDefault();
        selected.cycleFace();
        updateReadout();
      }
    });

    init();
  </script>
</body>
</html>
