<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yes or No</title>
  <link rel="stylesheet" href="../_ios_compat.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #eff6ff 0%, #ecfdf5 52%, #fef9c3 100%);
      color: #172554;
      padding: calc(0.6rem + env(safe-area-inset-top)) 1rem calc(0.8rem + env(safe-area-inset-bottom));
      touch-action: manipulation;
      overflow: hidden;
    }

    header {
      flex: 0 0 auto;
      width: min(100%, 760px);
      margin: 0 auto 0.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.7rem;
    }

    .back-btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      color: #334155;
      font-size: clamp(0.86rem, 3vw, 1rem);
      font-weight: 800;
      text-decoration: none;
      padding: 0.55rem 0.9rem;
      white-space: nowrap;
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
      text-align: center;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    h1 {
      flex: 0 0 auto;
      color: #1d4ed8;
      font-size: clamp(1.5rem, 5vh, 2.8rem);
      line-height: 1;
      margin-bottom: 0.15rem;
      text-shadow: 1px 2px 0 rgba(15,23,42,0.08);
    }

    .subtitle {
      flex: 0 0 auto;
      color: #475569;
      font-size: clamp(0.85rem, 2.2vh, 1.1rem);
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    .question-card {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      background: #fff;
      border: 3px solid rgba(191,219,254,0.95);
      border-radius: 26px;
      box-shadow: 0 18px 42px rgba(15,23,42,0.14);
    }

    .image-wrap {
      flex: 1 1 auto;
      min-height: 0;
      background: linear-gradient(180deg, #fefce8, #eff6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      padding: clamp(0.35rem, 2vw, 0.75rem);
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .question-text {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.5rem, 1.6vh, 0.85rem) 1rem;
      background: #eff6ff;
      border-top: 3px solid #bfdbfe;
      color: #1e3a8a;
      font-size: clamp(1.25rem, 3.4vh, 2rem);
      font-weight: 900;
      line-height: 1.16;
    }

    .answer-grid {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.7rem, 3vw, 1rem);
      margin: clamp(0.6rem, 1.8vh, 0.9rem) auto 0.4rem;
    }

    .answer-btn {
      min-height: clamp(64px, 11vh, 128px);
      border: 4px solid transparent;
      border-radius: 28px;
      color: #fff;
      cursor: pointer;
      font-size: clamp(1.8rem, 6vh, 3.6rem);
      font-weight: 950;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 24px rgba(15,23,42,0.18);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .answer-btn:focus-visible {
      outline: 4px solid #fbbf24;
      outline-offset: 4px;
    }

    .answer-btn:active,
    .answer-btn.pressed {
      transform: scale(0.96);
      filter: brightness(0.98);
      box-shadow: 0 7px 16px rgba(15,23,42,0.18);
    }

    .answer-btn.yes { background: linear-gradient(145deg, #22c55e, #15803d); }
    .answer-btn.no  { background: linear-gradient(145deg, #60a5fa, #2563eb); }

    .answer-btn.correct {
      animation: pop 0.34s ease;
      border-color: #fef08a;
    }

    .answer-btn.wrong {
      animation: shake 0.34s ease;
      border-color: #fecaca;
    }

    @keyframes pop {
      0% { transform: scale(0.9); }
      55% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .feedback {
      flex: 0 0 auto;
      min-height: 1.9rem;
      font-size: clamp(0.95rem, 2.2vh, 1.3rem);
      font-weight: 900;
    }

    .feedback.correct { color: #15803d; }
    .feedback.wrong { color: #dc2626; }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1001;
      overflow: hidden;
    }

    .win-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .win-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .win-card {
      width: min(92vw, 360px);
      background: #fff;
      border-radius: 28px;
      padding: 1.6rem;
      text-align: center;
      box-shadow: 0 26px 70px rgba(0,0,0,0.28);
      animation: cardPop 0.35s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes cardPop {
      from { transform: scale(0.72); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .win-emoji { font-size: 3rem; }
    .win-title {
      color: #1e3a8a;
      font-size: clamp(1.45rem, 6vw, 2rem);
      font-weight: 950;
      margin: 0.2rem 0 0.35rem;
    }
    .win-message {
      color: #475569;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .win-actions {
      display: grid;
      gap: 0.7rem;
    }

    .play-btn,
    .menu-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
    }

    .play-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
    }

    .menu-btn {
      background: #e0f2fe;
      color: #1e3a8a;
      border: 2px solid #bfdbfe;
    }

    @media (max-width: 560px) {
      body { padding-left: 0.7rem; padding-right: 0.7rem; }
      header { gap: 0.45rem; }
      .back-btn { padding-inline: 0.68rem; }
      .question-card { border-radius: 22px; }
      .answer-grid { gap: 0.65rem; }
      .answer-btn { border-radius: 22px; }
    }

    @media (max-height: 600px) {
      h1 { font-size: clamp(1.3rem, 4.5vh, 2rem); }
      .subtitle { font-size: 0.85rem; margin-bottom: 0.3rem; }
      .question-text { font-size: clamp(1.1rem, 3.2vh, 1.5rem); }
    }
  </style>
</head>
<body>
  <header>
    <a href="../index.html#map" class="back-btn">&larr; All Games</a>
  </header>

  <main>
    <h1>Yes or No</h1>
    <p class="subtitle">Look at the picture. Tap the best answer.</p>

    <section class="question-card" aria-live="polite">
      <div class="image-wrap">
        <img id="question-img" src="" alt="">
      </div>
      <div class="question-text" id="question-text"></div>
    </section>

    <div class="answer-grid" aria-label="Answer choices">
      <button class="answer-btn yes" id="yes-btn" type="button">Yes</button>
      <button class="answer-btn no" id="no-btn" type="button">No</button>
    </div>

    <div class="feedback" id="feedback" aria-live="polite"></div>
  </main>

  <div class="confetti-layer" id="confetti-layer"></div>

  <div class="win-overlay" id="win-overlay" role="dialog" aria-modal="true" aria-labelledby="win-title">
    <div class="win-card">
      <div class="win-emoji">★</div>
      <div class="win-title" id="win-title">You did it!</div>
      <div class="win-message">You answered every question. Great looking and listening!</div>
      <div class="win-actions">
        <button class="play-btn" id="play-again-btn" type="button">Play Again</button>
        <a class="menu-btn" href="../index.html#map">Main Menu</a>
      </div>
    </div>
  </div>

  <audio id="flip-sound" src="../sounds/flip.mp3" preload="auto" playsinline></audio>
  <audio id="correct-sound" src="../sounds/correct.mp3" preload="auto" playsinline></audio>
  <audio id="question-sound" preload="auto" playsinline></audio>

  <script>
    const ALL_QUESTIONS = [
      { text: 'Is this a dolphin?', image: 'q01.png', alt: 'A dolphin jumping out of the ocean', answer: 'yes' },
      { text: 'Is this a lion?', image: 'q02.png', alt: 'A friendly tiger standing in grass', answer: 'no' },
      { text: 'Is this a cat?', image: 'q03.png', alt: 'A cat sitting and looking forward', answer: 'yes' },
      { text: 'Is this a dog?', image: 'q04.png', alt: 'A rabbit sitting in grass', answer: 'no' },
      { text: 'Is this an apple?', image: 'q05.png', alt: 'A red apple', answer: 'yes' },
      { text: 'Is this a banana?', image: 'q06.png', alt: 'An orange', answer: 'no' },
      { text: 'Is this a car?', image: 'q07.png', alt: 'A small car', answer: 'yes' },
      { text: 'Is this a bus?', image: 'q08.png', alt: 'A train on tracks', answer: 'no' },
      { text: 'Is this a spoon?', image: 'q09.png', alt: 'A spoon', answer: 'yes' },
      { text: 'Is this a toothbrush?', image: 'q10.png', alt: 'A comb', answer: 'no' },
      { text: 'Is this a shoe?', image: 'q11.png', alt: 'A single shoe', answer: 'yes' },
      { text: 'Is this a hat?', image: 'q12.png', alt: 'A wool scarf', answer: 'no' },
      { text: 'Is this a ball?', image: 'q13.png', alt: 'A colorful ball', answer: 'yes' },
      { text: 'Is this a book?', image: 'q14.png', alt: 'A single crayon', answer: 'no' },
      { text: 'Is this a fish?', image: 'q15.png', alt: 'A fish in water', answer: 'yes' },
      { text: 'Is this a bird?', image: 'q16.png', alt: 'A butterfly', answer: 'no' },
      { text: 'Is this a cow?', image: 'q17.png', alt: 'A cow standing in a field', answer: 'yes' },
      { text: 'Is this a horse?', image: 'q18.png', alt: 'A pink pig', answer: 'no' },
      { text: 'Is this a chair?', image: 'q19.png', alt: 'A wooden chair', answer: 'yes' },
      { text: 'Is this a bed?', image: 'q20.png', alt: 'A bathtub', answer: 'no' },
      { text: 'Is she sleeping?', image: 'q21.png', alt: 'A girl sleeping in bed', answer: 'yes' },
      { text: 'Is he eating?', image: 'q22.png', alt: 'A boy eating food at a table', answer: 'yes' },
      { text: 'Is he jumping?', image: 'q23.png', alt: 'A boy jumping in the air', answer: 'yes' },
      { text: 'Is she sitting?', image: 'q24.png', alt: 'A girl standing up', answer: 'no' },
      { text: 'Are they walking?', image: 'q25.png', alt: 'Two children walking in a park', answer: 'yes' },
      { text: 'Are they running?', image: 'q26.png', alt: 'Two children standing still', answer: 'no' },
      { text: 'Is the baby crawling?', image: 'q27.png', alt: 'A baby crawling on the floor', answer: 'yes' },
      { text: 'Is the boy swimming?', image: 'q28.png', alt: 'A boy standing on dry grass, no water', answer: 'no' },
      { text: 'Is the girl brushing her teeth?', image: 'q29.png', alt: 'A girl brushing her teeth', answer: 'yes' },
      { text: 'Is the boy washing his hands?', image: 'q30.png', alt: 'A boy washing his hands at a sink', answer: 'yes' },
      { text: 'Is the dog sleeping?', image: 'q31.png', alt: 'A dog sleeping in a basket', answer: 'yes' },
      { text: 'Is the cat running?', image: 'q32.png', alt: 'A cat curled up sleeping', answer: 'no' },
      { text: 'Is the bird flying?', image: 'q33.png', alt: 'A bird flying in the sky', answer: 'yes' },
      { text: 'Is the fish flying?', image: 'q34.png', alt: 'A fish swimming underwater', answer: 'no' },
      { text: 'Is the monkey climbing?', image: 'q35.png', alt: 'A monkey climbing a tree', answer: 'yes' },
      { text: 'Is the penguin climbing?', image: 'q36.png', alt: 'A penguin standing on flat ice', answer: 'no' },
      { text: 'Is the child drawing?', image: 'q37.png', alt: 'A child drawing with crayons', answer: 'yes' },
      { text: 'Is the child reading?', image: 'q38.png', alt: 'A child reading an open book', answer: 'yes' },
      { text: 'Is the boy kicking the ball?', image: 'q39.png', alt: 'A boy kicking a soccer ball', answer: 'yes' },
      { text: 'Is the girl throwing the ball?', image: 'q40.png', alt: 'A girl standing still holding a ball', answer: 'no' },
      { text: 'Is the sun shining?', image: 'q41.png', alt: 'A bright sun in a blue sky', answer: 'yes' },
      { text: 'Is it raining?', image: 'q42.png', alt: 'A clear sunny day, no rain', answer: 'no' },
      { text: 'Is the door open?', image: 'q43.png', alt: 'An open door', answer: 'yes' },
      { text: 'Is the window closed?', image: 'q44.png', alt: 'A wide open window', answer: 'no' },
      { text: 'Is the cup empty?', image: 'q45.png', alt: 'An empty cup', answer: 'yes' },
      { text: 'Is the bowl full?', image: 'q46.png', alt: 'An empty bowl', answer: 'no' },
      { text: 'Is the light on?', image: 'q47.png', alt: 'A lamp glowing brightly', answer: 'yes' },
      { text: 'Is the candle lit?', image: 'q48.png', alt: 'An unlit candle with no flame', answer: 'no' },
      { text: 'Is the child wearing glasses?', image: 'q49.png', alt: 'A child wearing glasses', answer: 'yes' },
      { text: 'Is the child wearing a hat?', image: 'q50.png', alt: 'A child with bare head, no hat', answer: 'no' },
    ];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let QUESTIONS = shuffle(ALL_QUESTIONS);
    const TOTAL = QUESTIONS.length;
    const flipSound = document.getElementById('flip-sound');
    const correctSound = document.getElementById('correct-sound');
    const questionSound = document.getElementById('question-sound');
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const feedback = document.getElementById('feedback');
    const winOverlay = document.getElementById('win-overlay');
    const confettiLayer = document.getElementById('confetti-layer');

    let current = 0;
    let locked = false;

    function playSound(sound) {
      if (!sound) return;
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function questionSoundSrc(text) {
      return `sounds/${text.replace(/ /g, '_').replace(/\?/g, '_')}.mp3`;
    }

    function playQuestionSound() {
      const q = QUESTIONS[current];
      if (!q) return;
      questionSound.src = questionSoundSrc(q.text);
      questionSound.currentTime = 0;
      questionSound.play().catch(() => {});
    }

    function loadSoundsOnce() {
      flipSound.load();
      correctSound.load();
      playQuestionSound();
      window.removeEventListener('pointerdown', loadSoundsOnce);
      window.removeEventListener('keydown', loadSoundsOnce);
      window.removeEventListener('touchstart', loadSoundsOnce);
    }

    function renderQuestion() {
      locked = false;
      const q = QUESTIONS[current];
      document.getElementById('question-text').textContent = q.text;
      const img = document.getElementById('question-img');
      img.src = `images/${q.image}`;
      img.alt = q.alt;
      feedback.textContent = '';
      feedback.className = 'feedback';
      yesBtn.classList.remove('correct', 'wrong', 'pressed');
      noBtn.classList.remove('correct', 'wrong', 'pressed');
      yesBtn.disabled = false;
      noBtn.disabled = false;
      playQuestionSound();
    }

    function handleAnswer(choice, btn) {
      if (locked) return;
      locked = true;
      yesBtn.disabled = true;
      noBtn.disabled = true;
      btn.classList.add('pressed');
      playSound(flipSound);

      const isCorrect = choice === QUESTIONS[current].answer;
      if (isCorrect) {
        btn.classList.add('correct');
        feedback.textContent = 'Yes, that is right!';
        feedback.className = 'feedback correct';
        playSound(correctSound);
        launchConfetti(32);
        setTimeout(() => {
          current += 1;
          if (current >= TOTAL) {
            showWin();
          } else {
            renderQuestion();
          }
        }, 1150);
      } else {
        btn.classList.add('wrong');
        feedback.textContent = 'Not quite. Try the other button.';
        feedback.className = 'feedback wrong';
        setTimeout(() => {
          btn.classList.remove('wrong', 'pressed');
          yesBtn.disabled = false;
          noBtn.disabled = false;
          locked = false;
          feedback.textContent = '';
          feedback.className = 'feedback';
        }, 850);
      }
    }

    function showWin() {
      playSound(correctSound);
      launchConfetti(90);
      winOverlay.classList.add('show');
    }

    function launchConfetti(count) {
      confettiLayer.innerHTML = '';
      const colors = ['#22c55e', '#60a5fa', '#fbbf24', '#fb7185', '#a78bfa', '#34d399'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('span');
        const size = 7 + Math.random() * 9;
        piece.style.cssText = `
          position:absolute;
          left:${Math.random() * 100}%;
          top:-22px;
          width:${size}px;
          height:${size}px;
          border-radius:${Math.random() > 0.5 ? '50%' : '3px'};
          background:${colors[Math.floor(Math.random() * colors.length)]};
          opacity:0.95;
          transform:rotate(${Math.random() * 180}deg);
          animation:confettiFall ${1.3 + Math.random() * 1.8}s ease-in ${Math.random() * 0.35}s forwards;
        `;
        confettiLayer.appendChild(piece);
      }
    }

    function restartGame() {
      current = 0;
      QUESTIONS = shuffle(ALL_QUESTIONS);
      winOverlay.classList.remove('show');
      confettiLayer.innerHTML = '';
      renderQuestion();
    }

    const style = document.createElement('style');
    style.textContent = `@keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(620deg); opacity: 0; }
    }`;
    document.head.appendChild(style);

    yesBtn.addEventListener('click', () => handleAnswer('yes', yesBtn));
    noBtn.addEventListener('click', () => handleAnswer('no', noBtn));
    document.querySelector('.question-card').addEventListener('click', playQuestionSound);
    document.getElementById('play-again-btn').addEventListener('click', restartGame);
    window.addEventListener('pointerdown', loadSoundsOnce, { once: true });
    window.addEventListener('touchstart', loadSoundsOnce, { once: true });
    window.addEventListener('keydown', loadSoundsOnce, { once: true });

    renderQuestion();
  </script>
</body>
</html>
