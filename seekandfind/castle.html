<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Castle Hunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Link to shared stylesheet -->
    <link rel="stylesheet" href="../style/style.css">
    <style>

        body {
            height: auto;
            overflow-y: auto;
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }
        /* Custom styles */
        .item-hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            border-radius: 50%;
            background: transparent;
            transition: opacity 0.4s, background 0.15s;
        }
        .item-hotspot:hover { background: rgba(255,255,255,0.2); }
        .item-hotspot.found  { opacity: 0; pointer-events: none; }
        .target-card {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: opacity 0.3s;
        }
        .target-card.found { opacity: 0.35; }
        .target-card.found .target-crop { filter: grayscale(1); outline: 3px solid #22c55e; }
        .target-crop {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background-image: url('images/castle.png');
            background-repeat: no-repeat;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .target-label {
            font-size: 0.72rem; font-weight: 700; color: #374151;
            text-transform: capitalize; letter-spacing: 0.03em;
        }
        /* Win overlay styles from the original HTML */
        .win-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
        .win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .win-message {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
        }
        /* Standardized shake animation */
        @keyframes gameShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .game-shake {
            animation: gameShake 0.3s ease-in-out;
        }

        #game-container {
            position: relative;
            isolation: isolate;
        }

        #background-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100% !important;
            object-fit: fill;
            z-index: 1;
        }

        #emoji-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
        }
    </style>
    <link rel="stylesheet" href="../_ios_compat.css">
</head>

<a href="../index.html" style="position:fixed;top:max(10px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));z-index:9999;background:rgba(255,255,255,0.92);color:#111;padding:8px 12px;border-radius:10px;text-decoration:none;font-weight:700;border:1px solid #d1d5db;">&larr; All Games</a>

    <main class="w-full max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-2 sm:p-4 md:p-6">
        <header class="flex flex-wrap items-center justify-between gap-4 mb-2">
            <!-- Link to the seekandfind index -->
            <a href="index.html" class="px-4 py-2 bg-gray-200 text-gray-800 font-semibold rounded-lg shadow-sm hover:bg-gray-300 transition">&larr; Back to Seek & Find</a>
        </header>
        
        <h1 class="text-xl sm:text-2xl font-bold text-gray-800 text-center mb-2">Castle Hunt</h1>

<div id="game-container" class="relative w-full max-w-full bg-gray-200 rounded-lg overflow-hidden border">
            <img id="background-img" src="images/castle.png" alt="Castle Background" class="absolute top-0 left-0 w-full h-full object-cover" onerror="this.style.display='none';document.getElementById('game-container').style.background='linear-gradient(135deg,#dbeafe,#bfdbfe)'">
            <!-- Emoji layer is where the JS will add emojis -->
            <div id="emoji-layer"></div>
            <!-- Win overlay -->
            <div id="win-overlay" class="win-overlay">
                <div class="win-message">Great Job!</div>
                <div class="mt-8 flex flex-col sm:flex-row gap-4">
                    <button id="play-again-btn" class="px-8 py-4 bg-emerald-600 text-white font-bold text-lg rounded-lg shadow-md hover:bg-emerald-700 transition">Play Again</button>
                    <a href="index.html" class="px-8 py-4 bg-gray-200 text-gray-800 font-semibold text-lg rounded-lg shadow-sm hover:bg-gray-300 transition text-center">Back to Menu</a>
                </div>
            </div>
        </div>

        <div id="instructions" class="mt-6 text-center">
            <h2 class="text-xl font-bold text-gray-800">Find these things:</h2>
            <!-- Targets layer is where JS will add the targets -->
            <div id="targets" class="flex justify-center flex-wrap gap-4 mt-3"></div>
        </div>
    </main>

    <!-- Audio Elements pointing to shared sounds folder -->
    <audio id="flip-sound" src="../sounds/flip.mp3" preload="auto"></audio>
    <audio id="win-sound" src="../sounds/win.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const emojiLayer = document.getElementById('emoji-layer');
            const targetsContainer = document.getElementById('targets');
            const winOverlay = document.getElementById('win-overlay');
            const playAgainBtn = document.getElementById('play-again-btn');
            const mainEl = document.querySelector('main');
            const bgImg = document.getElementById('background-img');
            const gameContainer = document.getElementById('game-container');

            // --- Audio Elements ---
            const flipSound = document.getElementById('flip-sound');
            const winSound = document.getElementById('win-sound');
            let audioUnlocked = false;

            // --- Game Data ---
            const items = [
                { key:"wizard"          , label:"wizard"          , top:"75.0%", left:"48.9%", size:92  },
                { key:"door"            , label:"door"            , top:"65.6%", left:"59.8%", size:125 },
                { key:"dragon"          , label:"dragon"          , top:"16.0%", left:"79.1%", size:204 },
                { key:"ball"            , label:"ball"            , top:"88.7%", left:"32.6%", size:63  },
                { key:"scroll"          , label:"scroll"          , top:"90.9%", left:"41.4%", size:51  },
                { key:"chicken"         , label:"chicken"         , top:"84.9%", left:"52.4%", size:75  },
                { key:"knight_on_horse" , label:"knight on horse" , top:"76.4%", left:"29.1%", size:137 },
                { key:"knight_on_ground", label:"knight on ground", top:"74.4%", left:"40.6%", size:76  },
                { key:"trees"           , label:"trees"           , top:"59.3%", left:"90.7%", size:179 },
                { key:"tall_mountain"   , label:"tall mountain"   , top:"35.5%", left:"92.8%", size:124 },
            ];

            // --- Game State ---
            let currentTargets = [];
            let foundCount = 0;

            function unlockAudio() {
                if (audioUnlocked) return;
                flipSound.play().then(() => {
                    flipSound.pause();
                    winSound.play().then(() => winSound.pause()).catch(() => {});
                    audioUnlocked = true;
                }).catch(() => {});
            }
            function playSound(sound) {
                if (sound && audioUnlocked) { sound.currentTime = 0; sound.play().catch(()=>{}); }
            }
            function triggerHapticFeedback() { if (navigator.vibrate) navigator.vibrate(100); }
            function pct(s) { return parseFloat(s); }

            function startRound() {
                winOverlay.classList.remove('show');
                emojiLayer.innerHTML = '';
                targetsContainer.innerHTML = '';
                foundCount = 0;

                currentTargets = [];
                let pool = [...items];
                while (currentTargets.length < 3) {
                    const i = Math.floor(Math.random() * pool.length);
                    currentTargets.push(pool.splice(i, 1)[0]);
                }

                currentTargets.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'target-card';
                    card.dataset.key = item.key;
                    const crop = document.createElement('div');
                    crop.className = 'target-crop';
                    const cW = document.getElementById('game-container').offsetWidth;
                    const cH = document.getElementById('game-container').offsetHeight;
                    const thumbW = 70, thumbH = 70;
                    const bgW = thumbW * cW / item.size;
                    const bgH = thumbH * cH / item.size;
                    crop.style.backgroundSize = `${bgW}px ${bgH}px`;
                    crop.style.backgroundPosition = `${-(pct(item.left)/100*bgW)+thumbW/2}px ${-(pct(item.top)/100*bgH)+thumbH/2}px`;
                    const lbl = document.createElement('div');
                    lbl.className = 'target-label';
                    lbl.textContent = item.label;
                    card.appendChild(crop); card.appendChild(lbl);
                    targetsContainer.appendChild(card);
                });

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item-hotspot';
                    div.dataset.key = item.key;
                    div.style.top = item.top; div.style.left = item.left;
                    div.style.width = item.size + 'px'; div.style.height = item.size + 'px';
                    div.addEventListener('click', () => {
                        if (!audioUnlocked) unlockAudio();
                        const isTarget = currentTargets.some(t => t.key === item.key);
                        if (isTarget) {
                            const cardEl = targetsContainer.querySelector(`[data-key="${item.key}"]`);
                            if (cardEl && !cardEl.classList.contains('found')) {
                                playSound(flipSound);
                                div.classList.add('found');
                                cardEl.classList.add('found');
                                foundCount++;
                                if (foundCount === currentTargets.length) {
                                    playSound(winSound);
                                    setTimeout(() => winOverlay.classList.add('show'), 500);
                                }
                            }
                        } else {
                            mainEl.classList.add('game-shake');
                            triggerHapticFeedback();
                            setTimeout(() => mainEl.classList.remove('game-shake'), 800);
                        }
                    });
                    emojiLayer.appendChild(div);
                });
            }

            playAgainBtn.addEventListener('click', startRound);
            function fitContainer() {
                if (bgImg.naturalWidth && bgImg.naturalHeight) {
                    gameContainer.style.height = Math.round(gameContainer.offsetWidth * bgImg.naturalHeight / bgImg.naturalWidth) + 'px';
                }
            }
            window.addEventListener('resize', fitContainer);
            if (bgImg.complete && bgImg.naturalWidth) {
                fitContainer(); startRound();
            } else {
                bgImg.addEventListener('load', () => { fitContainer(); startRound(); });
            }

            // --- Position Debug (?pos in URL) ---
            if (new URLSearchParams(location.search).has('pos')) {
                const dbgStyle = document.createElement('style');
                dbgStyle.textContent = '.item-hotspot { border: 3px solid rgba(255,80,0,0.85) !important; background: rgba(255,80,0,0.12) !important; }';
                document.head.appendChild(dbgStyle);
                const hud = document.createElement('div');
                hud.style.cssText = 'position:fixed;top:4px;right:4px;z-index:9999;background:rgba(0,0,0,0.85);color:#0f0;font:12px monospace;padding:8px 10px;border-radius:6px;max-height:240px;overflow-y:auto;width:200px;';
                hud.innerHTML = '<b style="color:#fff">Debug: click scene</b><br>';
                document.body.appendChild(hud);
                document.getElementById('game-container').addEventListener('click', e => {
                    const r = document.getElementById('game-container').getBoundingClientRect();
                    const x = ((e.clientX - r.left) / r.width * 100).toFixed(1);
                    const y = ((e.clientY - r.top) / r.height * 100).toFixed(1);
                    const d = document.createElement('div');
                    d.textContent = `top:"${y}%", left:"${x}%"`;
                    hud.appendChild(d);
                    hud.scrollTop = hud.scrollHeight;
                }, true);
            }
        });
    </script>
</body>
</html>
