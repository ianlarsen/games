<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STORY SYSTEM V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --kaypro-green: #33ff33; --kaypro-dim: #125512; --kaypro-bg: #0a0a0a; }
        body { background-color: #000; color: var(--kaypro-green); font-family: 'VT323', monospace; font-size: 1.4rem; margin: 0; display: flex; height: 100vh; overflow: hidden; text-transform: uppercase; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none; }
        .crt-container { flex: 1; display: flex; padding: 20px; gap: 20px; text-shadow: 0 0 5px var(--kaypro-green); }
        #editor-panel { flex: 2; border: 2px solid var(--kaypro-green); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; z-index: 20; }
        #tree-panel { flex: 1; border: 2px solid var(--kaypro-green); padding: 20px; background: var(--kaypro-bg); overflow-y: auto; z-index: 20; }
        h1, h2 { border-bottom: 1px solid var(--kaypro-green); margin-top: 0; }
        label { display: block; margin: 10px 0 5px; color: #fff; }
        
        /* THE FIXED DROPDOWN STYLING */
        textarea, input, select { 
            background: #000; 
            border: 1px solid var(--kaypro-dim); 
            color: var(--kaypro-green); 
            font-family: 'VT323', monospace; 
            font-size: 1.2rem; 
            padding: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none;
        }
        select option {
            background: #000;
            color: var(--kaypro-green);
        }
        
        textarea:focus, input:focus, select:focus { border-color: var(--kaypro-green); box-shadow: 0 0 10px var(--kaypro-dim); }
        #story-title-input { font-size: 2rem; border: none; border-bottom: 1px solid var(--kaypro-green); margin-bottom: 10px; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: var(--kaypro-green); color: #000; border: none; font-family: 'VT323', monospace; font-size: 1.2rem; padding: 10px 20px; cursor: pointer; min-width: 150px; }
        button.export-btn { background: #fff; }
        .node-item { cursor: pointer; padding: 5px; margin-bottom: 5px; border-bottom: 1px solid var(--kaypro-dim); }
        .status-tag { float: right; font-size: 0.8rem; padding: 0 5px; border: 1px solid; }
        .todo { color: #ff3333; border-color: #ff3333; }
        .win { color: #33ffff; border-color: #33ffff; }
        .die { color: #ff3333; border-color: #ff3333; }
        .current-node-highlight { color: #fff; background: var(--kaypro-dim); }
    </style>
</head>
<body>

<div class="crt-container">
    <div id="editor-panel">
        <h1>STORY SYSTEM V1.0</h1>
        <label>STORY FILENAME:</label>
        <input type="text" id="story-title-input" value="MY NEW STORY">
        <div id="ui-current-id" style="margin: 10px 0; color: #aaa;">EDITING: START</div>
        <textarea id="story-text" rows="8" placeholder="Narrative..."></textarea>
        <label>NODE TYPE:</label>
        <select id="node-type" onchange="toggleChoices(this.value)">
            <option value="neutral">NEUTRAL (STORY CONTINUES)</option>
            <option value="win">WIN (VICTORY SCREEN)</option>
            <option value="die">DIE (GAME OVER SCREEN)</option>
        </select>
        <div id="choices-area">
            <label>BRANCHES:</label>
            <input type="text" id="c1" placeholder="Choice 1">
            <input type="text" id="c2" placeholder="Choice 2">
            <input type="text" id="c3" placeholder="Choice 3">
        </div>
        <div class="btn-group">
            <button onclick="saveNode()">SAVE & ADVANCE</button>
            <button class="export-btn" onclick="exportGame()">EXPORT .HTML</button>
            <button style="background:#ff3333" onclick="clearStorage()">WIPE ALL</button>
        </div>
    </div>
    <div id="tree-panel">
        <h2>STORY TREE</h2>
        <div id="node-list"></div>
    </div>
</div>

<script>
    let storyData = JSON.parse(localStorage.getItem('savedStory')) || { "START": { text: "", type: "neutral", choices: [] } };
    let storyTitle = localStorage.getItem('savedTitle') || "MY NEW STORY";
    let activeNodeId = "START";

    document.getElementById('story-title-input').value = storyTitle;

    function toggleChoices(val) { 
        document.getElementById('choices-area').style.display = (val === 'neutral') ? 'block' : 'none'; 
    }

    function saveNode() {
        const text = document.getElementById('story-text').value;
        const type = document.getElementById('node-type').value;
        let choices = [];
        let nextNodeToEdit = null;

        if (type === 'neutral') {
            ['c1', 'c2', 'c3'].forEach((id, i) => {
                const val = document.getElementById(id).value.trim();
                if (val !== "") {
                    const newId = `${activeNodeId}_B${i + 1}`;
                    choices.push({ text: val, nextId: newId });
                    if (!storyData[newId]) storyData[newId] = { text: "", type: "neutral", choices: [] };
                    if (!nextNodeToEdit) nextNodeToEdit = newId;
                }
            });
        }

        storyData[activeNodeId] = { text, type, choices };
        storyTitle = document.getElementById('story-title-input').value;
        
        localStorage.setItem('savedStory', JSON.stringify(storyData));
        localStorage.setItem('savedTitle', storyTitle);
        
        renderTree();
        if (type === 'neutral' && nextNodeToEdit) {
            loadNode(nextNodeToEdit);
        } else {
            alert("Node Saved.");
        }
    }

    function renderTree() {
        const list = document.getElementById('node-list');
        list.innerHTML = "";
        Object.keys(storyData).forEach(id => {
            const node = storyData[id];
            const div = document.createElement('div');
            div.className = `node-item ${id === activeNodeId ? 'current-node-highlight' : ''}`;
            let status = (node.text === "" && node.type === "neutral") ? '<span class="status-tag todo">TODO</span>' : (node.type !== 'neutral' ? `<span class="status-tag ${node.type}">${node.type}</span>` : '');
            div.innerHTML = `${id} ${status}`;
            div.onclick = () => loadNode(id);
            list.appendChild(div);
        });
    }

    function loadNode(id) {
        activeNodeId = id;
        const node = storyData[id];
        document.getElementById('ui-current-id').innerText = `EDITING: ${id}`;
        document.getElementById('story-text').value = node.text;
        document.getElementById('node-type').value = node.type;
        ['c1', 'c2', 'c3'].forEach((el, i) => { 
            document.getElementById(el).value = (node.choices && node.choices[i]) ? node.choices[i].text : ""; 
        });
        toggleChoices(node.type);
        renderTree();
        document.getElementById('story-text').focus();
    }

    function clearStorage() { if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); } }

    function exportGame() {
        const jsonContent = JSON.stringify(storyData);
        const playerHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>${storyTitle}</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #33ff33; font-family: 'VT323', monospace; margin: 0; text-transform: uppercase; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none; }
        #screen { width: 90%; max-width: 700px; border: 2px solid #33ff33; padding: 30px; position: relative; text-shadow: 0 0 5px #33ff33; }
        .text { font-size: 1.8rem; min-height: 120px; margin-bottom: 20px; line-height: 1.2; }
        .choice { cursor: pointer; display: block; margin: 10px 0; font-size: 1.5rem; color: #33ff33; }
        .choice:hover { background: #125512; }
        .cursor { display: inline-block; width: 12px; height: 24px; background: #33ff33; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="screen">
        <div id="output" class="text"></div>
        <div id="options"></div>
    </div>
    <script>
        const story = ${jsonContent};
        function type(txt, i, callback) {
            if (i < txt.length) {
                document.getElementById("output").innerHTML = txt.substring(0, i+1) + '<span class="cursor"></span>';
                setTimeout(() => type(txt, i + 1, callback), 35);
            } else if (callback) callback();
        }
        function play(id) {
            const node = story[id];
            document.getElementById('options').innerHTML = '';
            type(node.text || "...", 0, () => {
                document.getElementById("output").innerHTML = node.text;
                if (node.type === 'neutral') {
                    node.choices.forEach(c => {
                        const d = document.createElement('div');
                        d.className = 'choice';
                        d.innerText = '> ' + c.text;
                        d.onclick = () => play(c.nextId);
                        document.getElementById('options').appendChild(d);
                    });
                } else {
                    const status = document.createElement('div');
                    status.style.color = node.type === 'win' ? '#33ffff' : '#ff3333';
                    status.style.fontSize = '2rem';
                    status.innerText = node.type === 'win' ? 'MISSION SUCCESS' : 'MISSION FAILURE';
                    document.getElementById('options').appendChild(status);
                    const r = document.createElement('div');
                    r.className = 'choice';
                    r.innerText = '> REBOOT SYSTEM';
                    r.onclick = () => play('START');
                    document.getElementById('options').appendChild(r);
                }
            });
        }
        play('START');
    <\/script>
</body>
</html>`;

        const blob = new Blob([playerHtml], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = storyTitle.toLowerCase().replace(/ /g, '_') + ".html";
        a.click();
    }

    renderTree();
</script>
</body>
</html>
