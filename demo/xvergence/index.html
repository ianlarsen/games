<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Category Detective Prototype</title>

<style>
  :root {
    --bg: #f6f1e8;
    --card: #ffffff;
    --ink: #202020;
    --muted: #6c6c6c;
    --blue: #2f6173;
    --blue-soft: #e8f3f6;
    --green: #2f8f5b;
    --red: #b84a4a;
    --line: #d9d0c4;
    --shadow: 0 10px 28px rgba(0,0,0,.09);
    --radius: 24px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 10% 0%, #ffffff 0, var(--bg) 45%, #ece0d0 100%);
    color: var(--ink);
  }

  .app {
    max-width: 1050px;
    margin: 0 auto;
    padding: 14px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .logo {
    width: 54px;
    height: 54px;
    border-radius: 18px;
    background: var(--blue);
    color: white;
    display: grid;
    place-items: center;
    font-size: 29px;
    box-shadow: var(--shadow);
    flex: 0 0 auto;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.35rem, 3.5vw, 2.15rem);
    line-height: 1.05;
  }

  .subtitle {
    margin: 4px 0 0;
    color: var(--muted);
    font-weight: 600;
    font-size: .98rem;
  }

  .panel {
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .progress-wrap {
    height: 14px;
    border-radius: 999px;
    background: #e3d9cc;
    border: 1px solid #d1c6b8;
    overflow: hidden;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--blue), #6b9dad);
    transition: width .3s ease;
  }

  .score {
    font-weight: 900;
    color: var(--blue);
    white-space: nowrap;
  }

  button {
    font: inherit;
  }

  .small-btn,
  .primary-btn,
  .secondary-btn,
  .choice-btn,
  .item-btn,
  .activity-card,
  .odd-card {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .small-btn {
    border: 1px solid var(--line);
    background: white;
    color: var(--blue);
    border-radius: 999px;
    padding: 9px 13px;
    font-weight: 850;
  }

  .game-card {
    min-height: 600px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: clamp(16px, 3vw, 30px);
    position: relative;
    overflow: hidden;
  }

  .prompt {
    font-size: clamp(1.55rem, 5vw, 2.35rem);
    line-height: 1.12;
    margin: 0 0 22px;
    letter-spacing: -.02em;
  }

  .activity-picker,
  .level-picker {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .activity-card {
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 24px;
    padding: 22px;
    min-height: 215px;
    text-align: left;
    box-shadow: 0 4px 0 #d8d0c2;
  }

  .activity-card:hover {
    border-color: #8fb8c4;
    background: var(--blue-soft);
  }

  .activity-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .activity-card strong {
    display: block;
    font-size: 1.35rem;
    margin-bottom: 8px;
  }

  .activity-card span {
    display: block;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.35;
    font-weight: 650;
  }

  .example-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 18px 0 24px;
  }

  .example-card {
    width: min(150px, 30vw);
    min-height: 132px;
    background: #fbfaf7;
    border: 2px solid #ddd5c8;
    border-radius: 22px;
    display: grid;
    place-items: center;
    padding: 12px;
  }

  .emoji {
    font-size: clamp(2.65rem, 9vw, 4.6rem);
    line-height: 1;
    text-align: center;
  }

  .label {
    margin-top: 8px;
    text-align: center;
    font-weight: 900;
    color: #3b3b3b;
  }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .choice-btn {
    border: 2px solid #d2cabb;
    background: #fff;
    border-radius: 20px;
    padding: 18px 14px;
    min-height: 78px;
    font-weight: 900;
    font-size: clamp(1.08rem, 3.6vw, 1.35rem);
    color: var(--ink);
    box-shadow: 0 3px 0 #d8d0c2;
  }

  .choice-btn:hover {
    background: var(--blue-soft);
    border-color: #8fb8c4;
  }

  .choice-btn.correct {
    background: #e9f8ef;
    border-color: var(--green);
  }

  .choice-btn.wrong {
    background: #fff0f0;
    border-color: var(--red);
    animation: shake .24s linear;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .item-btn {
    border: 2px solid #d2cabb;
    background: #fff;
    border-radius: 20px;
    min-height: 126px;
    padding: 10px;
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: 0 3px 0 #d8d0c2;
  }

  .item-btn:hover {
    background: #fbfaf7;
  }

  .item-btn.selected {
    background: #e9f8ef;
    border-color: var(--green);
  }

  .item-btn.wrong {
    background: #fff0f0;
    border-color: var(--red);
    animation: shake .24s linear;
  }

  .check {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--green);
    color: #fff;
    border-radius: 999px;
    font-size: .85rem;
    padding: 3px 7px;
    font-weight: 900;
  }

  .feedback {
    min-height: 56px;
    margin-top: 18px;
    border-radius: 18px;
    padding: 14px;
    background: #f5f1e9;
    border: 1px solid var(--line);
    font-weight: 800;
  }

  .feedback.empty {
    visibility: hidden;
  }

  .feedback.good {
    background: #e9f8ef;
    border-color: #b8e0c5;
    color: #215c3b;
  }

  .feedback.bad {
    background: #fff0f0;
    border-color: #efc2c2;
    color: #873333;
  }

  .footer-actions {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 18px;
  }

  .primary-btn {
    border: 0;
    background: var(--blue);
    color: white;
    border-radius: 999px;
    padding: 15px 22px;
    font-weight: 950;
    font-size: 1.05rem;
    box-shadow: 0 4px 0 #244957;
  }

  .secondary-btn {
    border: 2px solid var(--blue);
    background: white;
    color: var(--blue);
    border-radius: 999px;
    padding: 13px 20px;
    font-weight: 950;
    font-size: 1.05rem;
  }

  .worksheet-wrap {
    display: grid;
    place-items: center;
    margin-top: 6px;
  }

  .worksheet-card {
    width: min(760px, 100%);
    background: #fff;
    border: 7px solid #111;
    box-shadow: 0 8px 18px rgba(0,0,0,.08);
    padding: clamp(14px, 3vw, 24px);
  }

  .worksheet-title {
    text-align: center;
    font-size: clamp(1.35rem, 4vw, 2rem);
    font-weight: 950;
    margin: 0 0 20px;
  }

  .odd-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(12px, 2vw, 22px);
  }

  .odd-card {
    border: 4px solid transparent;
    background: #fff;
    min-height: 150px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    padding: 10px;
  }

  .odd-card:hover {
    border-color: #8fb8c4;
    background: #f7fbfc;
  }

  .odd-card.correct {
    border-color: var(--green);
    background: #e9f8ef;
  }

  .odd-card.wrong {
    border-color: var(--red);
    background: #fff0f0;
    animation: shake .24s linear;
  }

  .odd-card .emoji {
    font-size: clamp(3.2rem, 12vw, 5.8rem);
  }

  .confetti-piece {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 16px;
    opacity: .95;
    animation: confettiFall 900ms linear forwards;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(-20px) rotate(0deg);
    }
    100% {
      transform: translateY(105vh) rotate(540deg);
    }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    30% { transform: translateX(-4px); }
    70% { transform: translateX(4px); }
  }

  @media (max-width: 820px) {
    .activity-picker,
    .level-picker {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 700px) {
    .app {
      padding: 10px;
    }

    header {
      margin-bottom: 10px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      font-size: 25px;
    }

    h1 {
      font-size: 1.4rem;
    }

    .subtitle {
      font-size: .86rem;
    }

    .panel {
      padding: 10px;
      border-radius: 20px;
    }

    .topbar {
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .topbar .small-btn {
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .game-card {
      min-height: calc(100vh - 190px);
      padding: 14px;
      border-radius: 20px;
    }

    .prompt {
      margin-bottom: 16px;
    }

    .choices {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .choice-btn {
      min-height: 70px;
      padding: 15px 12px;
    }

    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .item-btn {
      min-height: 116px;
      border-radius: 18px;
      padding: 8px;
    }

    .label {
      font-size: .92rem;
    }

    .example-card {
      width: calc(33.333% - 12px);
      min-height: 112px;
      border-radius: 18px;
      padding: 8px;
    }

    .activity-card {
      min-height: auto;
      padding: 18px;
    }

    .activity-icon {
      font-size: 2.5rem;
    }

    .worksheet-card {
      border-width: 5px;
      padding: 12px;
    }

    .worksheet-title {
      margin-bottom: 14px;
    }

    .odd-grid {
      gap: 10px;
    }

    .odd-card {
      min-height: 128px;
      padding: 8px;
    }

    .footer-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
    }
  }

  @media (max-width: 390px) {
    .example-card {
      width: 100%;
      min-height: 96px;
    }

    .example-row {
      gap: 8px;
    }

    .item-btn,
    .odd-card {
      min-height: 108px;
    }

    .label {
      font-size: .86rem;
    }
  }
</style>
</head>

<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="logo">🧠</div>
      <div>
        <h1>Category Detective</h1>
        <p class="subtitle">Convergence · Divergence</p>
      </div>
    </div>
  </header>

  <section class="panel">
    <div class="topbar">
      <div class="progress-wrap">
        <div class="progress" id="progress"></div>
      </div>
      <div class="score">⭐ <span id="score">0</span></div>
      <button class="small-btn" id="restartBtn">Restart</button>
    </div>

    <main class="game-card" id="game" aria-live="polite"></main>
  </section>
</div>

<script>
const cleanCategories = [
  {
    name: "Animals",
    singular: "animal",
    items: [
      ["lion", "🦁"],
      ["bear", "🐻"],
      ["seal", "🦭"],
      ["dog", "🐶"],
      ["cat", "🐱"],
      ["frog", "🐸"]
    ]
  },
  {
    name: "Transportation",
    singular: "type of transportation",
    items: [
      ["car", "🚗"],
      ["bus", "🚌"],
      ["bike", "🚲"],
      ["train", "🚆"],
      ["airplane", "✈️"],
      ["boat", "⛵"]
    ]
  },
  {
    name: "Food",
    singular: "food",
    items: [
      ["apple", "🍎"],
      ["pizza", "🍕"],
      ["taco", "🌮"],
      ["sandwich", "🥪"],
      ["carrot", "🥕"],
      ["grapes", "🍇"]
    ]
  },
  {
    name: "Clothing",
    singular: "piece of clothing",
    items: [
      ["shirt", "👕"],
      ["shoe", "👟"],
      ["pants", "👖"],
      ["hat", "🧢"],
      ["dress", "👗"],
      ["sock", "🧦"]
    ]
  },
  {
    name: "Shapes",
    singular: "shape",
    items: [
      ["circle", "🟢"],
      ["square", "🟥"],
      ["triangle", "🔺"],
      ["diamond", "🔷"],
      ["heart", "💚"],
      ["star", "⭐"]
    ]
  }
];

const allItems = cleanCategories.flatMap(category =>
  category.items.map(item => ({
    label: item[0],
    emoji: item[1],
    category: category.name,
    singular: category.singular
  }))
);

let state = {
  activity: null,
  divergenceLevel: null,
  round: 0,
  totalRounds: 8,
  score: 0,
  currentCategory: null,
  promptItems: [],
  gridItems: [],
  selectedIndexes: [],
  oddItems: [],
  oddAnswerIndex: null,
  locked: false,
  roundComplete: false
};

const game = document.getElementById("game");
const progress = document.getElementById("progress");
const score = document.getElementById("score");

document.getElementById("restartBtn").addEventListener("click", showActivityPicker);

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function sample(array, count) {
  return shuffle(array).slice(0, count);
}

function titleCase(text) {
  return text.replace(/\b\w/g, letter => letter.toUpperCase());
}

function itemHTML(item) {
  return `
    <div>
      <div class="emoji">${item.emoji}</div>
      <div class="label">${titleCase(item.label)}</div>
    </div>
  `;
}

function updateTop() {
  score.textContent = state.score;

  if (!state.activity) {
    progress.style.width = "0%";
    return;
  }

  const percent = ((state.round - 1) / state.totalRounds) * 100;
  progress.style.width = `${percent}%`;
}

function resetState() {
  state = {
    activity: null,
    divergenceLevel: null,
    round: 0,
    totalRounds: 8,
    score: 0,
    currentCategory: null,
    promptItems: [],
    gridItems: [],
    selectedIndexes: [],
    oddItems: [],
    oddAnswerIndex: null,
    locked: false,
    roundComplete: false
  };
}

function showActivityPicker() {
  resetState();
  updateTop();

  game.innerHTML = `
    <h2 class="prompt">Which activity are you doing?</h2>

    <div class="activity-picker">
      <button class="activity-card" id="chooseConvergence">
        <div class="activity-icon">🔎</div>
        <strong>Convergence</strong>
        <span>See several items and identify the shared category.</span>
      </button>

      <button class="activity-card" id="chooseDivergence">
        <div class="activity-icon">🧩</div>
        <strong>Divergence</strong>
        <span>Find items in a category, then move up to what does not belong.</span>
      </button>
    </div>
  `;

  document.getElementById("chooseConvergence").addEventListener("click", startConvergence);
  document.getElementById("chooseDivergence").addEventListener("click", showDivergenceLevelPicker);
}

function showDivergenceLevelPicker() {
  state.activity = "divergence";
  state.divergenceLevel = null;
  state.round = 0;
  state.score = 0;
  updateTop();

  game.innerHTML = `
    <h2 class="prompt">Choose a divergence level.</h2>

    <div class="level-picker">
      <button class="activity-card" id="chooseDivergenceLevel1">
        <div class="activity-icon">🧩</div>
        <strong>Level 1</strong>
        <span>Find all items in the category.</span>
      </button>

      <button class="activity-card" id="chooseDivergenceLevel2">
        <div class="activity-icon">🚫</div>
        <strong>Level 2</strong>
        <span>Choose the one that does not belong.</span>
      </button>
    </div>

    <div class="footer-actions">
      <button class="secondary-btn" id="backToMenuBtn">Return to menu</button>
    </div>
  `;

  document.getElementById("chooseDivergenceLevel1").addEventListener("click", () => startDivergence(1));
  document.getElementById("chooseDivergenceLevel2").addEventListener("click", () => startDivergence(2));
  document.getElementById("backToMenuBtn").addEventListener("click", showActivityPicker);
}

function startConvergence() {
  state.activity = "convergence";
  state.divergenceLevel = null;
  state.round = 0;
  state.score = 0;
  nextRound();
}

function startDivergence(level) {
  state.activity = "divergence";
  state.divergenceLevel = level;
  state.round = 0;
  state.score = 0;
  nextRound();
}

function nextRound() {
  state.round++;
  state.locked = false;
  state.roundComplete = false;
  state.selectedIndexes = [];
  state.oddItems = [];
  state.oddAnswerIndex = null;

  if (state.round > state.totalRounds) {
    showEndScreen();
    return;
  }

  state.currentCategory = cleanCategories[(state.round - 1) % cleanCategories.length];

  if (state.activity === "convergence") {
    setupConvergenceRound();
    renderConvergenceRound();
  }

  if (state.activity === "divergence" && state.divergenceLevel === 1) {
    setupDivergenceRound();
    renderDivergenceRound();
  }

  if (state.activity === "divergence" && state.divergenceLevel === 2) {
    setupOddOneOutRound();
    renderOddOneOutRound();
  }

  updateTop();
}

function advanceAfterCorrect() {
  setTimeout(() => {
    nextRound();
  }, 1000);
}

/* ---------------- CONVERGENCE ---------------- */

function setupConvergenceRound() {
  state.promptItems = sample(state.currentCategory.items, 3).map(item => ({
    label: item[0],
    emoji: item[1],
    category: state.currentCategory.name,
    singular: state.currentCategory.singular
  }));
}

function renderConvergenceRound() {
  const wrongCategories = sample(
    cleanCategories.filter(c => c.name !== state.currentCategory.name),
    3
  ).map(c => c.name);

  const choices = shuffle([
    state.currentCategory.name,
    ...wrongCategories
  ]);

  game.innerHTML = `
    <h2 class="prompt">What category do these belong to?</h2>

    <div class="example-row">
      ${state.promptItems.map(item => `
        <div class="example-card">${itemHTML(item)}</div>
      `).join("")}
    </div>

    <div class="choices">
      ${choices.map(choice => `
        <button class="choice-btn" data-choice="${choice}">
          ${choice}
        </button>
      `).join("")}
    </div>

    <div class="feedback empty" id="feedback"></div>

    <div class="footer-actions">
      <button class="secondary-btn" id="backToMenuBtn">Return to menu</button>
    </div>
  `;

  document.querySelectorAll(".choice-btn").forEach(button => {
    button.addEventListener("click", () => checkConvergenceAnswer(button));
  });

  document.getElementById("backToMenuBtn").addEventListener("click", showActivityPicker);
}

function checkConvergenceAnswer(button) {
  if (state.locked) return;

  const answer = button.dataset.choice;
  const feedback = document.getElementById("feedback");

  if (answer === state.currentCategory.name) {
    state.locked = true;
    state.roundComplete = true;
    state.score++;
    score.textContent = state.score;

    button.classList.add("correct");
    feedback.className = "feedback good";
    feedback.innerHTML = `Correct.`;

    launchConfetti();
    advanceAfterCorrect();
  } else {
    button.classList.add("wrong");
    feedback.className = "feedback bad";
    feedback.innerHTML = `Try again.`;

    setTimeout(() => {
      button.classList.remove("wrong");
      feedback.className = "feedback empty";
      feedback.innerHTML = "";
    }, 700);
  }
}

/* ---------------- DIVERGENCE LEVEL 1 ---------------- */

function setupDivergenceRound() {
  const targetItems = state.currentCategory.items.map(item => ({
    label: item[0],
    emoji: item[1],
    category: state.currentCategory.name,
    singular: state.currentCategory.singular,
    target: true
  }));

  const wrongItems = sample(
    allItems.filter(item => item.category !== state.currentCategory.name),
    6
  ).map(item => ({
    ...item,
    target: false
  }));

  state.gridItems = shuffle([...targetItems, ...wrongItems]);
}

function renderDivergenceRound() {
  const totalTargets = state.currentCategory.items.length;

  game.innerHTML = `
    <h2 class="prompt">Find all ${totalTargets} ${state.currentCategory.name}.</h2>

    <div class="grid">
      ${state.gridItems.map((item, index) => {
        const selected = state.selectedIndexes.includes(index);
        return `
          <button class="item-btn ${selected ? "selected" : ""}" data-index="${index}">
            ${selected ? `<div class="check">✓</div>` : ""}
            ${itemHTML(item)}
          </button>
        `;
      }).join("")}
    </div>

    <div class="feedback ${state.roundComplete ? "good" : "empty"}" id="feedback">
      ${state.roundComplete ? `Correct.` : ""}
    </div>

    <div class="footer-actions">
      <button class="secondary-btn" id="backToMenuBtn">Return to menu</button>
    </div>
  `;

  document.querySelectorAll(".item-btn").forEach(button => {
    button.addEventListener("click", () => checkDivergenceItem(button));
  });

  document.getElementById("backToMenuBtn").addEventListener("click", showActivityPicker);
}

function checkDivergenceItem(button) {
  if (state.roundComplete) return;

  const index = Number(button.dataset.index);
  const item = state.gridItems[index];
  const feedback = document.getElementById("feedback");

  if (state.selectedIndexes.includes(index)) return;

  if (item.category === state.currentCategory.name) {
    state.selectedIndexes.push(index);

    const totalTargets = state.currentCategory.items.length;

    if (state.selectedIndexes.length === totalTargets) {
      state.roundComplete = true;
      state.score++;
      score.textContent = state.score;
      renderDivergenceRound();
      launchConfetti();
      advanceAfterCorrect();
    } else {
      renderDivergenceRound();
    }
  } else {
    button.classList.add("wrong");
    feedback.className = "feedback bad";
    feedback.innerHTML = `Try again.`;

    setTimeout(() => {
      button.classList.remove("wrong");
      feedback.className = "feedback empty";
      feedback.innerHTML = "";
    }, 700);
  }
}

/* ---------------- DIVERGENCE LEVEL 2 ---------------- */

function setupOddOneOutRound() {
  const categoryItems = sample(state.currentCategory.items, 3).map(item => ({
    label: item[0],
    emoji: item[1],
    category: state.currentCategory.name,
    singular: state.currentCategory.singular,
    target: false
  }));

  const outlierCategory = sample(
    cleanCategories.filter(category => category.name !== state.currentCategory.name),
    1
  )[0];

  const outlierItemRaw = sample(outlierCategory.items, 1)[0];

  const outlierItem = {
    label: outlierItemRaw[0],
    emoji: outlierItemRaw[1],
    category: outlierCategory.name,
    singular: outlierCategory.singular,
    target: true
  };

  const mixed = shuffle([...categoryItems, outlierItem]);

  state.oddItems = mixed;
  state.oddAnswerIndex = mixed.findIndex(item => item.target === true);
}

function renderOddOneOutRound() {
  game.innerHTML = `
    <h2 class="prompt">Choose the one that does not belong.</h2>

    <div class="worksheet-wrap">
      <section class="worksheet-card">
        <h3 class="worksheet-title">Which one doesn't belong? Why?</h3>

        <div class="odd-grid">
          ${state.oddItems.map((item, index) => {
            const isCorrect = state.roundComplete && index === state.oddAnswerIndex;
            return `
              <button class="odd-card ${isCorrect ? "correct" : ""}" data-index="${index}">
                ${itemHTML(item)}
              </button>
            `;
          }).join("")}
        </div>
      </section>
    </div>

    <div class="feedback ${state.roundComplete ? "good" : "empty"}" id="feedback">
      ${state.roundComplete ? `Correct.` : ""}
    </div>

    <div class="footer-actions">
      <button class="secondary-btn" id="backToMenuBtn">Return to menu</button>
    </div>
  `;

  document.querySelectorAll(".odd-card").forEach(button => {
    button.addEventListener("click", () => checkOddOneOutAnswer(button));
  });

  document.getElementById("backToMenuBtn").addEventListener("click", showActivityPicker);
}

function checkOddOneOutAnswer(button) {
  if (state.roundComplete) return;

  const index = Number(button.dataset.index);
  const feedback = document.getElementById("feedback");

  if (index === state.oddAnswerIndex) {
    state.roundComplete = true;
    state.locked = true;
    state.score++;
    score.textContent = state.score;

    renderOddOneOutRound();
    launchConfetti();
    advanceAfterCorrect();
  } else {
    button.classList.add("wrong");
    feedback.className = "feedback bad";
    feedback.innerHTML = `Try again.`;

    setTimeout(() => {
      button.classList.remove("wrong");
      feedback.className = "feedback empty";
      feedback.innerHTML = "";
    }, 700);
  }
}

/* ---------------- END / CONFETTI ---------------- */

function showEndScreen() {
  progress.style.width = "100%";

  game.innerHTML = `
    <h2 class="prompt">Finished!</h2>

    <div class="feedback good">
      Score: <strong>${state.score}</strong> out of <strong>${state.totalRounds}</strong>
    </div>

    <div class="footer-actions">
      <button class="secondary-btn" id="backToMenuBtn">Return to menu</button>
      <button class="primary-btn" id="playAgainBtn">Play again</button>
    </div>
  `;

  document.getElementById("backToMenuBtn").addEventListener("click", showActivityPicker);
  document.getElementById("playAgainBtn").addEventListener("click", () => {
    if (state.activity === "convergence") startConvergence();
    if (state.activity === "divergence") startDivergence(state.divergenceLevel);
  });
}

function launchConfetti() {
  const colors = ["#2f6173", "#2f8f5b", "#d9a431", "#b85c9e", "#e66b4d", "#6a7fd1"];

  for (let i = 0; i < 44; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = `${Math.random() * 100}%`;
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = `${Math.random() * 120}ms`;
    piece.style.transform = `rotate(${Math.random() * 180}deg)`;

    document.body.appendChild(piece);

    setTimeout(() => {
      piece.remove();
    }, 1200);
  }
}

showActivityPicker();
</script>
