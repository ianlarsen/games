<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pick-a-Pic</title>
<style>
  :root {
    --bg: #fff7dc;
    --card: #ffffff;
    --ink: #243047;
    --accent: #ffb703;
    --good: #4caf50;
    --bad: #ff5c5c;
    --blue: #219ebc;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #fff3b0, var(--bg));
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 520px;
    padding: 18px;
  }

  header {
    text-align: center;
    margin-bottom: 12px;
  }

  h1 {
    margin: 0;
    font-size: 2.4rem;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1rem;
    opacity: 0.8;
  }

  .card {
    background: var(--card);
    border-radius: 28px;
    padding: 18px;
    box-shadow: 0 10px 0 #e0c56a, 0 16px 28px rgba(0,0,0,0.12);
    border: 4px solid #ffe08a;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
    font-weight: 800;
  }

  .pill {
    background: #f0f9ff;
    border: 3px solid #bdeaff;
    padding: 8px 12px;
    border-radius: 999px;
  }

  .question {
    text-align: center;
    font-size: clamp(1.7rem, 7vw, 2.5rem);
    font-weight: 900;
    line-height: 1.1;
    margin: 14px 0 18px;
  }

  .word {
    color: var(--blue);
    text-decoration: underline;
  }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  button.choice {
    aspect-ratio: 1 / 1;
    border-radius: 26px;
    border: 4px solid #d9e8ee;
    background: #fff;
    font-size: clamp(3.2rem, 18vw, 5.5rem);
    cursor: pointer;
    box-shadow: 0 7px 0 #c8d8df;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  button.choice:active {
    transform: translateY(5px);
    box-shadow: 0 2px 0 #c8d8df;
  }

  button.correct {
    border-color: var(--good);
    background: #eaffea;
  }

  button.wrong {
    border-color: var(--bad);
    background: #ffecec;
  }

  .feedback {
    min-height: 42px;
    margin-top: 16px;
    font-size: 1.35rem;
    font-weight: 900;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .controls button {
    flex: 1;
    border: 0;
    border-radius: 18px;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 900;
    background: var(--accent);
    color: var(--ink);
    box-shadow: 0 5px 0 #d99100;
  }

  .controls button:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #d99100;
  }

  .pop {
    animation: pop 0.35s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.18) rotate(-3deg); }
    100% { transform: scale(1); }
  }

  .done {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 800;
  }
</style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Pick-a-Pic</h1>
      <div class="subtitle">Tap the picture that matches the word.</div>
    </header>

    <section class="card">
      <div class="topbar">
        <div class="pill" id="round">1 / 10</div>
        <div class="pill" id="score">⭐ 0</div>
      </div>

      <div class="question" id="question"></div>

      <div class="choices" id="choices"></div>

      <div class="feedback" id="feedback"></div>

      <div class="controls">
        <button id="nextBtn">Next</button>
        <button id="restartBtn">Restart</button>
      </div>
    </section>
  </main>

<script>
const questions = [
  {
    prompt: "Which picture is heavy?",
    word: "heavy",
    answer: "🛏️",
    choices: ["❄️", "✉️", "🎈", "🛏️"]
  },
  {
    prompt: "Which picture is light?",
    word: "light",
    answer: "🪶",
    choices: ["🗄️", "🪶", "🚗", "🚜"]
  },
  {
    prompt: "Which picture is new?",
    word: "new",
    answer: "🎁",
    choices: ["☎️", "🪆", "🎁", "📰"]
  },
  {
    prompt: "Which picture is old?",
    word: "old",
    answer: "☎️",
    choices: ["🍌", "🎁", "👦", "☎️"]
  },
  {
    prompt: "Which picture is cold?",
    word: "cold",
    answer: "🍦",
    choices: ["☕", "☀️", "🍦", "🍲"]
  },
  {
    prompt: "Which picture is hot?",
    word: "hot",
    answer: "🔥",
    choices: ["🥤", "🧃", "👕", "🔥"]
  },
  {
    prompt: "Which picture is fast?",
    word: "fast",
    answer: "🚀",
    choices: ["🐌", "🚀", "🎈", "🐧"]
  },
  {
    prompt: "Which picture is slow?",
    word: "slow",
    answer: "🐢",
    choices: ["⚽", "🐝", "⛷️", "🐢"]
  },
  {
    prompt: "Which picture is quiet?",
    word: "quiet",
    answer: "🐭",
    choices: ["🧨", "🎵", "🐭", "🥁"]
  },
  {
    prompt: "Which picture is loud?",
    word: "loud",
    answer: "⛈️",
    choices: ["🧘", "🔥", "🌊", "⛈️"]
  }
];

let index = 0;
let score = 0;
let locked = false;

const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const feedbackEl = document.getElementById("feedback");
const roundEl = document.getElementById("round");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const voice = new SpeechSynthesisUtterance(text);
  voice.rate = 0.9;
  speechSynthesis.speak(voice);
}

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function renderQuestion() {
  locked = false;
  feedbackEl.textContent = "";

  const q = questions[index];
  roundEl.textContent = `${index + 1} / ${questions.length}`;
  scoreEl.textContent = `⭐ ${score}`;

  questionEl.innerHTML = q.prompt.replace(
    q.word,
    `<span class="word">${q.word}</span>`
  );

  choicesEl.innerHTML = "";

  shuffle(q.choices).forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.setAttribute("aria-label", choice);
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });

  speak(q.prompt);
}

function checkAnswer(button, choice) {
  if (locked) return;

  const q = questions[index];

  if (choice === q.answer) {
    locked = true;
    score++;
    button.classList.add("correct", "pop");
    feedbackEl.textContent = "Pop! You got it!";
    scoreEl.textContent = `⭐ ${score}`;
    speak("Pop! You got it!");
  } else {
    button.classList.add("wrong");
    feedbackEl.textContent = "Try again!";
    speak("Try again");
  }
}

function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    renderQuestion();
  } else {
    showDone();
  }
}

function showDone() {
  questionEl.textContent = "Great job!";
  choicesEl.innerHTML = `<div class="done">You got ${score} out of ${questions.length}! 🎉</div>`;
  feedbackEl.textContent = "";
  roundEl.textContent = "Done";
  speak(`Great job! You got ${score} out of ${questions.length}.`);
}

function restartGame() {
  index = 0;
  score = 0;
  renderQuestion();
}

nextBtn.onclick = nextQuestion;
restartBtn.onclick = restartGame;

renderQuestion();
</script>
</body>
</html>
