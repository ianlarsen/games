<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pip & Gantry - Stabilized Animation Edition</title>

  <style>
    /* --- STAGE & BACKGROUND --- */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      padding: 10px;
    }

    .stage-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- RESPONSIVE HARDFRAMED VIEWPORT --- */
    .viewport-box {
      width: 100%;
      aspect-ratio: 6 / 4;
      overflow: hidden;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      background: #87CEEB;
      touch-action: none;
    }

    #camera-rig {
      width: 100%;
      height: 100%;
      transform-origin: 0% 0%;
      transform: translate(0%, 0%) scale(1);
    }

    .viewport-box.zoom-pip #camera-rig {
      transform: translate(-40%, -122.5%) scale(3.2) !important;
    }

    .viewport-box.zoom-gantry #camera-rig {
      transform: translate(-168%, -82.5%) scale(3.2) !important;
    }

    .viewport-box.zoom-worm #camera-rig {
      transform: translate(-104%, -165%) scale(3.2) !important;
    }

    svg {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #87CEEB, #e0f6ff);
      display: block;
    }

    /* --- BALANCED IDLE BREATHING --- */
    .puppet-group {
      animation: idleBreathe 4.5s infinite ease-in-out;
    }

    #puppet-pip {
      transform-origin: 180px 280px;
      animation-delay: 0s;
    }

    #puppet-gantry {
      transform-origin: 420px 280px;
      animation-delay: -1s;
    }

    @keyframes idleBreathe {
      0%, 100% {
        transform: scale(1, 1) translateY(0);
      }

      50% {
        transform: scale(1.015, 0.985) translateY(0.4px);
      }
    }

    /* --- TALKING EFFECTS --- */
    .talking-body {
      animation: talkStretch 0.26s infinite alternate ease-in-out !important;
    }

    @keyframes talkStretch {
      0% {
        transform: scale(0.95, 1.12) translateY(-1px);
      }

      100% {
        transform: scale(1.04, 0.92) translateY(0.375px);
      }
    }

    .talking-mouth {
      animation: talkMouth 0.17s infinite alternate ease-in-out;
      transform-origin: center;
    }

    @keyframes talkMouth {
      0% {
        transform: scaleY(0.2);
      }

      100% {
        transform: scaleY(2.3);
      }
    }

    /* --- BLINKING ANIMATIONS --- */
    .blink-active {
      animation: blinkTwice 0.8s ease-in-out forwards;
    }

    @keyframes blinkTwice {
      0%, 20%, 50%, 80%, 100% {
        transform: scaleY(1);
      }

      10% {
        transform: scaleY(0.05);
      }

      65% {
        transform: scaleY(0.05);
      }
    }

    /* --- ONE-SHOT WORM POPUP --- */
    .worm-active #worm-body {
      animation: wormPopUp 3.5s ease-in-out forwards;
    }

    .worm-active #worm-eyes {
      animation: wormLookAround 3.5s ease-in-out forwards;
    }

    .worm-active #dirt-mound {
      animation: dirtAppear 3.5s ease-in-out forwards;
    }

    @keyframes wormPopUp {
      0% {
        transform: translateY(65px);
      }

      15% {
        transform: translateY(0);
      }

      30% {
        transform: rotate(-15deg) translateY(0);
      }

      50% {
        transform: rotate(15deg) translateY(0);
      }

      70% {
        transform: rotate(0deg) translateY(0);
      }

      85%, 100% {
        transform: translateY(65px);
      }
    }

    .look-around-active #worm-eyes {
      animation: wormLookAround 0.8s ease-in-out forwards;
    }

    @keyframes wormLookAround {
      0%, 100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    @keyframes dirtAppear {
      0%, 100% {
        transform: scale(0);
        opacity: 0;
      }

      8%, 88% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* --- PERSISTENT X-KEY CONTROL STATES --- */
    .worm-up #worm-body {
      transform: translateY(0px) !important;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.18);
    }

    .worm-up #dirt-mound {
      transform: scale(1) !important;
      opacity: 1 !important;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .worm-descending #worm-body {
      transform: translateY(65px) !important;
      transition: transform 0.45s ease-in;
    }

    .worm-descending #dirt-mound {
      transform: scale(0) !important;
      opacity: 0 !important;
      transition: transform 0.45s ease-in, opacity 0.45s ease-in;
    }

    /* --- BIRD FLIGHT --- */
    .bird-active #bird-group {
      animation: birdFlyAcross 4.0s linear forwards;
    }

    .bird-active .wing-top {
      animation: flapTopBack 0.18s infinite alternate ease-in-out;
      transform-origin: 18px 12px;
    }

    .bird-active .wing-bottom {
      animation: flapBottomBack 0.18s infinite alternate ease-in-out;
      transform-origin: 18px 20px;
    }

    @keyframes birdFlyAcross {
      0% {
        transform: translateX(650px);
      }

      100% {
        transform: translateX(-50px);
      }
    }

    @keyframes flapTopBack {
      0% {
        transform: rotate(-25deg);
      }

      100% {
        transform: rotate(45deg);
      }
    }

    @keyframes flapBottomBack {
      0% {
        transform: rotate(25deg);
      }

      100% {
        transform: rotate(-45deg);
      }
    }

    /* --- HYBRID INTERACTIVE CONTROL DECK --- */
    .control-deck {
      width: 100%;
      margin-top: 15px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .btn {
      background: #2a2a40;
      color: #ffffff;
      border: 2px solid #3d3d5c;
      border-radius: 8px;
      padding: 10px 4px;
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn span.key {
      font-size: 13px;
      margin-bottom: 2px;
      text-transform: uppercase;
      padding: 1px 5px;
      background: #121224;
      border-radius: 4px;
      border-bottom: 2px solid #000;
    }

    .btn-pip {
      border-color: #00ffff;
      color: #e0ffff;
    }

    .btn-gantry {
      border-color: #FFEB3B;
      color: #fffee0;
    }

    .btn-worm {
      border-color: #FF8DA1;
      color: #ffeef1;
    }

    .btn-bird {
      border-color: #ffffff;
      color: #ffffff;
    }

    .btn.active,
    .btn:active {
      background: #3e3e5c;
    }

    .btn-pip.active,
    .btn-pip:active {
      background: #004444;
    }

    .btn-gantry.active,
    .btn-gantry:active {
      background: #444411;
    }

    .btn-worm.active,
    .btn-worm:active {
      background: #44222a;
    }

    @media (min-width: 768px) {
      .control-deck {
        grid-template-columns: repeat(4, 1fr);
      }

      .btn span.key {
        display: inline-block;
      }
    }

    @media (max-width: 500px) {
      .control-deck {
        grid-template-columns: repeat(2, 1fr);
      }

      .btn {
        padding: 12px 4px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="stage-container">
    <div id="viewport" class="viewport-box">
      <div id="camera-rig">
        <svg id="stage" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet">

          <defs>
            <clipPath id="grass-cutout">
              <rect x="0" y="0" width="600" height="340" />
            </clipPath>
          </defs>

          <!-- CLOUDS -->
          <g fill="#ffffff" opacity="0.85">
            <circle cx="100" cy="80" r="30" />
            <circle cx="140" cy="70" r="40" />
            <circle cx="180" cy="80" r="25" />

            <circle cx="440" cy="100" r="25" />
            <circle cx="480" cy="90" r="35" />
            <circle cx="515" cy="100" r="20" />
          </g>

          <!-- BIRD -->
          <g id="bird-scene">
            <g id="bird-group" style="transform: translateX(650px);">
              <g transform="translate(0, 65)">
                <path class="wing-top" d="M 18,12 L 28,1 Q 20,-2 14,6 Z" fill="#000000" stroke="#000000" stroke-width="1" />
                <path class="wing-bottom" d="M 18,20 L 28,31 Q 20,34 14,26 Z" fill="#000000" stroke="#000000" stroke-width="1" />
                <ellipse cx="20" cy="16" rx="18" ry="9" fill="#000000" />
                <polygon points="2,13 -10,16 2,19" fill="#FF9800" stroke="#000000" stroke-width="1" />
                <circle cx="10" cy="13" r="2" fill="#FFFFFF" />
                <circle cx="9.5" cy="13" r="0.8" fill="#000000" />
              </g>
            </g>
          </g>

          <!-- GROUND -->
          <rect x="0" y="280" width="600" height="120" fill="#4CAF50" />
          <line x1="0" y1="280" x2="600" y2="280" stroke="#388E3C" stroke-width="6" />

          <!-- WORM -->
          <g id="worm-scene" clip-path="url(#grass-cutout)">
            <g id="worm-body" style="transform-origin: 300px 315px; transform: translateY(65px);">
              <rect x="288" y="285" width="24" height="60" rx="10" fill="#FF8DA1" stroke="#000000" stroke-width="4" />

              <line x1="290" y1="312" x2="310" y2="312" stroke="#E0637B" stroke-width="3" />
              <line x1="290" y1="322" x2="310" y2="322" stroke="#E0637B" stroke-width="3" />

              <g id="worm-eyes" style="transform-origin: 300px 295px;">
                <circle cx="295" cy="295" r="2.5" fill="#000000" />
                <circle cx="305" cy="295" r="2.5" fill="#000000" />
              </g>

              <ellipse id="mouth-worm" cx="300" cy="303" rx="3" ry="1" fill="#000000" style="transform-origin: 300px 303px;" />
            </g>

            <g id="dirt-mound" style="transform-origin: 300px 340px; transform: scale(0); opacity: 0;">
              <path d="M 265,342 Q 300,320 335,342 Z" fill="#795548" stroke="#000000" stroke-width="4" />
              <circle cx="282" cy="337" r="4" fill="#5D4037" />
              <circle cx="318" cy="338" r="3" fill="#5D4037" />
              <circle cx="300" cy="331" r="4.5" fill="#5D4037" />
            </g>
          </g>

          <!-- PIP -->
          <g id="puppet-pip" class="puppet-group">
            <rect x="150" y="220" width="60" height="60" rx="12" fill="#00ffff" stroke="#000000" stroke-width="5" />

            <g class="face">
              <g id="eyes-pip" style="transform-origin: 180px 245px;">
                <circle cx="170" cy="245" r="6" fill="#000000" />
                <circle cx="171.5" cy="243.5" r="2" fill="#ffffff" />

                <circle cx="190" cy="245" r="6" fill="#000000" />
                <circle cx="191.5" cy="243.5" r="2" fill="#ffffff" />
              </g>

              <circle cx="162" cy="254" r="3" fill="#ff007f" opacity="0.5" />
              <circle cx="198" cy="254" r="3" fill="#ff007f" opacity="0.5" />

              <ellipse id="mouth-pip" cx="180" cy="256" rx="6" ry="2" fill="#000000" style="transform-origin: 180px 256px;" />
            </g>
          </g>

          <!-- GANTRY -->
          <g id="puppet-gantry" class="puppet-group">
            <rect x="390" y="160" width="60" height="120" rx="12" fill="#FFEB3B" stroke="#000000" stroke-width="5" />

            <g class="face">
              <g id="eyes-gantry" style="transform-origin: 420px 195px;">
                <circle cx="410" cy="195" r="6" fill="#000000" />
                <circle cx="411.5" cy="193.5" r="2" fill="#ffffff" />

                <circle cx="430" cy="195" r="6" fill="#000000" />
                <circle cx="431.5" cy="193.5" r="2" fill="#ffffff" />
              </g>

              <circle cx="402" cy="204" r="3" fill="#ff5722" opacity="0.5" />
              <circle cx="438" cy="204" r="3" fill="#ff5722" opacity="0.5" />

              <ellipse id="mouth-gantry" cx="420" cy="208" rx="6" ry="2" fill="#000000" style="transform-origin: 420px 208px;" />
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="control-deck">
      <div class="btn btn-pip" id="ctrl-pip">
        <span class="key">A</span>
        Pip Close-up
      </div>

      <div class="btn btn-gantry" id="ctrl-gantry">
        <span class="key">D</span>
        Gantry Close-up
      </div>

      <div class="btn btn-worm" id="ctrl-worm">
        <span class="key">X</span>
        Worm Monologue
      </div>

      <div class="btn btn-bird" id="ctrl-actions">
        <span class="key">W / F</span>
        Mix Event
      </div>
    </div>
  </div>

  <script>
    const viewport = document.getElementById('viewport');
    const wormScene = document.getElementById('worm-scene');
    const birdScene = document.getElementById('bird-scene');

    const puppetPip = document.getElementById('puppet-pip');
    const mouthPip = document.getElementById('mouth-pip');
    const eyesPip = document.getElementById('eyes-pip');

    const puppetGantry = document.getElementById('puppet-gantry');
    const mouthGantry = document.getElementById('mouth-gantry');
    const eyesGantry = document.getElementById('eyes-gantry');

    const mouthWorm = document.getElementById('mouth-worm');
    const wormBody = document.getElementById('worm-body');

    const ctrlPip = document.getElementById('ctrl-pip');
    const ctrlGantry = document.getElementById('ctrl-gantry');
    const ctrlWorm = document.getElementById('ctrl-worm');
    const ctrlActions = document.getElementById('ctrl-actions');

    const keysPressed = {
      a: false,
      d: false,
      x: false,
      a_zoomed: false,
      d_zoomed: false,
      x_zoomed: false
    };

    let wormZoomTimeout = null;
    let wormDescentTimeout = null;

    function updateCameraView() {
      if (keysPressed.x_zoomed) {
        viewport.className = 'viewport-box zoom-worm';
      } else if (keysPressed.a_zoomed) {
        viewport.className = 'viewport-box zoom-pip';
      } else if (keysPressed.d_zoomed) {
        viewport.className = 'viewport-box zoom-gantry';
      } else {
        viewport.className = 'viewport-box';
      }
    }

    /* --- PIP SEQUENCES --- */
    function startPipTalking() {
      if (keysPressed.a) return;

      keysPressed.a = true;
      keysPressed.a_zoomed = true;

      updateCameraView();

      puppetPip.classList.add('talking-body');
      mouthPip.classList.add('talking-mouth');
      ctrlPip.classList.add('active');
    }

    function stopPipTalking() {
      if (!keysPressed.a) return;

      keysPressed.a = false;
      keysPressed.a_zoomed = false;

      updateCameraView();

      puppetPip.classList.remove('talking-body');
      mouthPip.classList.remove('talking-mouth');
      ctrlPip.classList.remove('active');

      eyesPip.classList.add('blink-active');

      setTimeout(() => {
        eyesPip.classList.remove('blink-active');
      }, 800);
    }

    /* --- GANTRY SEQUENCES --- */
    function startGantryTalking() {
      if (keysPressed.d) return;

      keysPressed.d = true;
      keysPressed.d_zoomed = true;

      updateCameraView();

      puppetGantry.classList.add('talking-body');
      mouthGantry.classList.add('talking-mouth');
      ctrlGantry.classList.add('active');
    }

    function stopGantryTalking() {
      if (!keysPressed.d) return;

      keysPressed.d = false;
      keysPressed.d_zoomed = false;

      updateCameraView();

      puppetGantry.classList.remove('talking-body');
      mouthGantry.classList.remove('talking-mouth');
      ctrlGantry.classList.remove('active');

      eyesGantry.classList.add('blink-active');

      setTimeout(() => {
        eyesGantry.classList.remove('blink-active');
      }, 800);
    }

    /* --- WORM SEQUENCES --- */
    function startWormSequence() {
      if (keysPressed.x) return;

      keysPressed.x = true;
      ctrlWorm.classList.add('active');

      clearTimeout(wormZoomTimeout);
      clearTimeout(wormDescentTimeout);

      wormScene.classList.remove('worm-active', 'worm-descending', 'look-around-active');
      wormScene.classList.add('worm-up');

      wormZoomTimeout = setTimeout(() => {
        if (!keysPressed.x) return;

        keysPressed.x_zoomed = true;

        updateCameraView();

        wormBody.classList.add('talking-body');
        mouthWorm.classList.add('talking-mouth');
      }, 400);
    }

    function stopWormSequence() {
      if (!keysPressed.x) return;

      keysPressed.x = false;
      ctrlWorm.classList.remove('active');

      clearTimeout(wormZoomTimeout);

      wormBody.classList.remove('talking-body');
      mouthWorm.classList.remove('talking-mouth');

      keysPressed.x_zoomed = false;

      updateCameraView();

      wormScene.classList.add('look-around-active');

      wormDescentTimeout = setTimeout(() => {
        if (keysPressed.x) return;

        wormScene.classList.remove('worm-up', 'look-around-active');
        wormScene.classList.add('worm-descending');

        setTimeout(() => {
          if (!keysPressed.x) {
            wormScene.classList.remove('worm-descending');
          }
        }, 500);
      }, 800);
    }

    function triggerScenicMix() {
      if (!birdScene.classList.contains('bird-active')) {
        birdScene.classList.add('bird-active');

        setTimeout(() => {
          birdScene.classList.remove('bird-active');
        }, 4000);
      }

      if (
        !wormScene.classList.contains('worm-up') &&
        !wormScene.classList.contains('worm-active')
      ) {
        wormScene.classList.add('worm-active');

        setTimeout(() => {
          wormScene.classList.remove('worm-active');
        }, 3500);
      }
    }

    /* --- KEYBOARD INPUT ENGINE --- */
    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'a') {
        startPipTalking();
      }

      if (key === 'd') {
        startGantryTalking();
      }

      if (key === 'x') {
        startWormSequence();
      }

      if (key === 'w' || key === 'f') {
        ctrlActions.classList.add('active');
        triggerScenicMix();
      }
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'a') {
        stopPipTalking();
      }

      if (key === 'd') {
        stopGantryTalking();
      }

      if (key === 'x') {
        stopWormSequence();
      }

      if (key === 'w' || key === 'f') {
        ctrlActions.classList.remove('active');
      }
    });

    /* --- TOUCH / MOUSE INPUT ENGINE --- */
    function bindTouchControl(elementId, startCallback, endCallback) {
      const element = document.getElementById(elementId);

      element.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startCallback();
      }, { passive: false });

      element.addEventListener('touchend', (e) => {
        e.preventDefault();
        endCallback();
      }, { passive: false });

      element.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        endCallback();
      }, { passive: false });

      element.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startCallback();
      });

      element.addEventListener('mouseup', () => {
        endCallback();
      });

      element.addEventListener('mouseleave', () => {
        endCallback();
      });
    }

    bindTouchControl('ctrl-pip', startPipTalking, stopPipTalking);
    bindTouchControl('ctrl-gantry', startGantryTalking, stopGantryTalking);
    bindTouchControl('ctrl-worm', startWormSequence, stopWormSequence);

    ctrlActions.addEventListener('touchstart', (e) => {
      e.preventDefault();
      ctrlActions.classList.add('active');
      triggerScenicMix();
    }, { passive: false });

    ctrlActions.addEventListener('touchend', (e) => {
      e.preventDefault();
      ctrlActions.classList.remove('active');
    }, { passive: false });

    ctrlActions.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      ctrlActions.classList.remove('active');
    }, { passive: false });

    ctrlActions.addEventListener('mousedown', (e) => {
      e.preventDefault();
      ctrlActions.classList.add('active');
      triggerScenicMix();
    });

    ctrlActions.addEventListener('mouseup', () => {
      ctrlActions.classList.remove('active');
    });

    ctrlActions.addEventListener('mouseleave', () => {
      ctrlActions.classList.remove('active');
    });

    ctrlActions.addEventListener('click', () => {
      triggerScenicMix();
    });
  </script>
</body>
</html>
