<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile-first: no user scaling, notch-aware -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">

  <!-- iOS PWA / Capacitor meta -->
  <meta name="apple-mobile-web-app-capable"          content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title"            content="NBCOT Prep">
  <meta name="theme-color"                           content="#2563EB">

  <!-- Android / Capacitor -->
  <meta name="mobile-web-app-capable" content="yes">

  <title>NBCOT Prep</title>
  <meta name="description" content="Independent NBCOT exam prep study tool using spaced repetition. Not affiliated with or endorsed by the National Board for Certification in Occupational Therapy, Inc. (NBCOT®).">

  <!-- Icons -->
  <link rel="icon"             href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">

  <!-- Prevent page-level link preview / tap callouts on iOS -->
  <style>
    a { -webkit-touch-callout: none; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Prevent flash of unstyled content */
    body { opacity: 0; transition: opacity .15s; }
    body.ready { opacity: 1; }
  </style>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- All content rendered here by app.js -->
    <div id="main-content" aria-live="polite"></div>

    <!-- Bottom navigation (hidden until after onboarding) -->
    <nav id="bottom-nav" role="navigation" aria-label="Main navigation"
         style="display:none"></nav>
  </div>

  <!-- ── Scripts loaded in dependency order ── -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Reveal body once scripts have parsed (avoids FOUC)
    document.body.classList.add('ready');
  </script>
</body>
</html>
