<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ultimate Puzzle Architect</title>
    <style>
        :root {
            --cell-size: 40px;
            --bg0: #0f1419;
            --bg1: #1a2332;
            --panel: #ffffff;
            --text: #1c2430;
            --muted: #5c6b7e;
            --accent: #3d7eff;
            --accent2: #7c5cff;
            --success: #1fb86e;
            --danger: #e5484d;
            --sidebar-w: min(380px, 100vw);
            --radius: 12px;
            --shadow: 0 12px 40px rgba(15, 20, 25, 0.12);
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, var(--bg1) 0%, var(--bg0) 50%, #121a24 100%);
            color: var(--text);
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            padding: 22px 22px 18px;
            border-right: 1px solid rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 10;
            gap: 2px;
        }
        h2 {
            margin: 0 0 4px 0;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

        .switch-container {
            display: flex;
            align-items: center;
            background: #eef1f6;
            border-radius: 999px;
            padding: 4px;
            margin-bottom: 18px;
            position: relative;
            cursor: pointer;
            user-select: none;
            transition: background 0.25s var(--ease);
        }
        .switch-container:hover { background: #e4e9f2; }
        .switch-label {
            flex: 1;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.06em;
            z-index: 2;
            transition: color 0.3s var(--ease);
            color: var(--muted);
            pointer-events: none;
            padding: 8px 4px;
        }
        .switch-label.active { color: #fff; }
        .slider {
            position: absolute;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: linear-gradient(135deg, var(--accent), #2563eb);
            border-radius: 999px;
            transition: left 0.35s var(--ease), background 0.35s var(--ease), box-shadow 0.35s var(--ease);
            z-index: 1;
            left: 4px;
            top: 4px;
            box-shadow: 0 4px 14px rgba(61, 126, 255, 0.35);
        }
        .mode-ws .slider {
            left: calc(50% + 0px);
            background: linear-gradient(135deg, var(--accent2), #5b21b6);
            box-shadow: 0 4px 14px rgba(124, 92, 255, 0.35);
        }

        .input-group { margin-bottom: 12px; }
        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 11px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 126, 255, 0.2);
        }

        button {
            padding: 11px 14px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.15s var(--ease), box-shadow 0.2s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-add {
            background: linear-gradient(135deg, var(--success), #0d9f5c);
            color: white;
            width: 100%;
            margin-bottom: 6px;
            box-shadow: 0 6px 20px rgba(31, 184, 110, 0.35);
        }
        .btn-add:hover { filter: brightness(1.05); }
        .btn-export {
            background: linear-gradient(135deg, #2c3544, #1c2430);
            color: #f8fafc;
            margin-top: auto;
            padding: 14px;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .btn-export:hover { filter: brightness(1.08); }

        #wordList {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 1px solid #eef1f6;
            padding-top: 12px;
            min-height: 80px;
            scrollbar-width: thin;
        }
        .word-item {
            background: #f8fafc;
            border: 1px solid #e8edf4;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.25s var(--ease);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .word-item .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
        .word-actions { display: flex; gap: 6px; }
        .word-actions button {
            font-size: 11px;
            padding: 6px 10px;
            margin: 0;
            background: #fff;
            border: 1px solid #e2e8f0;
            color: var(--text);
        }
        .word-actions button:hover { background: #f1f5f9; }
        .word-actions .btn-del { color: var(--danger); border-color: #fecaca; }
        .word-actions .btn-del:hover { background: #fef2f2; }

        #main-view {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }
        #main-view::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(61, 126, 255, 0.08), transparent);
            pointer-events: none;
        }
        #grid-wrap {
            position: relative;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            background: #0a0d11;
            gap: 1px;
            border-radius: 8px;
            overflow: hidden;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #141a22;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            color: #4a5568;
            user-select: none;
            transition: background 0.2s, color 0.2s, transform 0.15s var(--ease);
        }
        .cell.active {
            background: #f8fafc;
            color: #1e293b;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
        }
        .cell.ws-fill { color: #64748b; }
        .cell.drag-handle {
            cursor: grab;
            box-shadow: inset 0 0 0 2px var(--accent);
        }
        .cell.drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Puzzle Architect</h2>
    <div class="subtitle">Build a crossword or word search, then export a playable HTML file.</div>
    <div class="switch-container" id="modeSwitch" onclick="toggleMode()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleMode(); }">
        <div class="slider" aria-hidden="true"></div>
        <div class="switch-label active" id="label-cw">Crossword</div>
        <div class="switch-label" id="label-ws">Word search</div>
    </div>

    <div class="input-group">
        <label>Puzzle name</label>
        <input type="text" id="puzzleName" placeholder="My masterpiece" maxlength="80">
    </div>
    <div class="input-group">
        <label>Word</label>
        <input type="text" id="wordIn" placeholder="HELLO" maxlength="32" autocomplete="off">
    </div>
    <div class="input-group">
        <label id="clueLabel">Clue</label>
        <input type="text" id="clueIn" placeholder="Greeting" maxlength="120" autocomplete="off">
    </div>
    <button type="button" class="btn-add" onclick="addWordToPuzzle()">Add word</button>
    <div id="wordList"></div>
    <button type="button" class="btn-export" onclick="exportWithSaveAs()">Export & save as…</button>
</div>

<div id="main-view">
    <div id="grid-wrap"><div id="grid"></div></div>
</div>

<script>
    const GRID_SIZE = 15;
    let puzzleWords = [];
    let currentMode = 'crossword';
    /** @type {string[][] | null} persistent filler letters in word search mode */
    let wsFill = null;
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    function randomLetter() {
        return ALPHABET[Math.floor(Math.random() * 26)];
    }

    function ensureWsFill() {
        if (!wsFill) {
            wsFill = Array.from({ length: GRID_SIZE }, () =>
                Array.from({ length: GRID_SIZE }, () => randomLetter())
            );
        }
    }

    function toggleMode() {
        currentMode = (currentMode === 'crossword') ? 'wordsearch' : 'crossword';
        document.getElementById('modeSwitch').classList.toggle('mode-ws', currentMode === 'wordsearch');
        document.getElementById('label-cw').classList.toggle('active', currentMode === 'crossword');
        document.getElementById('label-ws').classList.toggle('active', currentMode === 'wordsearch');
        document.getElementById('clueLabel').innerText = (currentMode === 'wordsearch') ? 'Hidden hint' : 'Clue';
        if (currentMode === 'wordsearch') ensureWsFill();
        else wsFill = null;
        renderAll();
    }

    function clampCell(v) {
        return Math.max(0, Math.min(GRID_SIZE - 1, v | 0));
    }

    function initGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        if (currentMode === 'wordsearch') ensureWsFill();

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${y}-${x}`;
                if (currentMode === 'wordsearch') {
                    cell.innerText = wsFill[y][x];
                    cell.classList.add('ws-fill');
                }
                cell.ondragover = (e) => e.preventDefault();
                cell.ondrop = (e) => {
                    const idx = Number(e.dataTransfer.getData("text/plain"), 10);
                    if (!Number.isInteger(idx) || idx < 0 || idx >= puzzleWords.length) return;
                    puzzleWords[idx].x = clampCell(x);
                    puzzleWords[idx].y = clampCell(y);
                    renderAll();
                };
                gridEl.appendChild(cell);
            }
        }
    }

    function addWordToPuzzle() {
        const wordEl = document.getElementById('wordIn');
        const clueEl = document.getElementById('clueIn');
        const word = wordEl.value.toUpperCase().replace(/[^A-Z]/g, '');
        if (!word) return;
        const startY = Math.min(puzzleWords.length, GRID_SIZE - 1);
        puzzleWords.push({
            word,
            clue: clueEl.value.trim() || (currentMode === 'wordsearch' ? 'Hidden' : 'No clue'),
            x: 2,
            y: startY,
            dir: 'across'
        });
        wordEl.value = '';
        clueEl.value = '';
        wordEl.focus();
        renderAll();
    }

    function renderAll() {
        initGrid();
        const listEl = document.getElementById('wordList');
        listEl.innerHTML = '';

        const occupied = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));

        puzzleWords.forEach((pw, idx) => {
            for (let i = 0; i < pw.word.length; i++) {
                const curX = pw.dir === 'across' ? pw.x + i : pw.x;
                const curY = pw.dir === 'across' ? pw.y : pw.y + i;
                if (curX >= 0 && curY >= 0 && curX < GRID_SIZE && curY < GRID_SIZE) {
                    const cell = document.getElementById(`cell-${curY}-${curX}`);
                    if (!cell) continue;
                    cell.innerText = pw.word[i];
                    cell.style.opacity = '1';
                    cell.classList.add('active');
                    cell.classList.remove('ws-fill');
                    occupied[curY][curX] = true;
                    if (i === 0) {
                        cell.setAttribute('draggable', 'true');
                        cell.classList.add('drag-handle');
                        cell.ondragstart = (e) => {
                            e.dataTransfer.setData('text/plain', String(idx));
                            e.dataTransfer.effectAllowed = 'move';
                        };
                    }
                }
            }

            const item = document.createElement('div');
            item.className = 'word-item';
            const left = document.createElement('div');
            left.innerHTML = `<div><b>${escapeHtml(pw.word)}</b> · ${pw.dir}</div><div class="meta">${escapeHtml(pw.clue)}</div>`;
            const actions = document.createElement('div');
            actions.className = 'word-actions';
            actions.innerHTML = `<button type="button" class="btn-rot">Rotate</button><button type="button" class="btn-del">Remove</button>`;
            actions.querySelector('.btn-rot').onclick = () => rotate(idx);
            actions.querySelector('.btn-del').onclick = () => remove(idx);
            item.appendChild(left);
            item.appendChild(actions);
            listEl.appendChild(item);
        });

        if (currentMode === 'wordsearch' && wsFill) {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (!occupied[y][x]) {
                        const cell = document.getElementById(`cell-${y}-${x}`);
                        if (cell && cell.classList.contains('ws-fill')) {
                            cell.innerText = wsFill[y][x];
                        }
                    }
                }
            }
        }
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function rotate(i) {
        puzzleWords[i].dir = puzzleWords[i].dir === 'across' ? 'down' : 'across';
        renderAll();
    }

    function remove(i) {
        puzzleWords.splice(i, 1);
        renderAll();
    }

    /** Valid word-search line: horizontal, vertical, or 45° diagonal */
    function wsLineCells(x0, y0, x1, y1) {
        const dx = x1 - x0;
        const dy = y1 - y0;
        const adx = Math.abs(dx);
        const ady = Math.abs(dy);
        let stepX = 0, stepY = 0;
        if (adx === 0 && ady === 0) return [{ x: x0, y: y0 }];
        if (ady === 0) stepX = Math.sign(dx);
        else if (adx === 0) stepY = Math.sign(dy);
        else if (adx === ady) {
            stepX = Math.sign(dx);
            stepY = Math.sign(dy);
        } else {
            return [];
        }
        const out = [];
        let cx = x0, cy = y0;
        let guard = 0;
        while (guard++ < GRID_SIZE * 2) {
            out.push({ x: cx, y: cy });
            if (cx === x1 && cy === y1) break;
            cx += stepX;
            cy += stepY;
        }
        return out;
    }

    async function exportWithSaveAs() {
        const rawName = document.getElementById('puzzleName').value.trim() || 'My_Puzzle';
        const gameName = escapeHtml(rawName);
        const safeFile = rawName.replace(/[^\w\- ]+/g, '').replace(/\s+/g, '_').slice(0, 64) || 'My_Puzzle';
        const isWS = currentMode === 'wordsearch';

        let cellNumbers = {};
        const exportWords = JSON.parse(JSON.stringify(puzzleWords));

        if (!isWS) {
            let numCount = 1;
            const sorted = [...exportWords].sort((a, b) => a.y - b.y || a.x - b.x);
            sorted.forEach((w) => {
                const key = `${w.y}-${w.x}`;
                if (!cellNumbers[key]) cellNumbers[key] = numCount++;
                w.number = cellNumbers[key];
            });
        }

        let gridData;
        if (isWS) {
            ensureWsFill();
            gridData = wsFill.map((row) => row.slice());
            exportWords.forEach((w) => {
                for (let i = 0; i < w.word.length; i++) {
                    const x = w.dir === 'across' ? w.x + i : w.x;
                    const y = w.dir === 'across' ? w.y : w.y + i;
                    if (y >= 0 && x >= 0 && y < GRID_SIZE && x < GRID_SIZE) {
                        gridData[y][x] = w.word[i];
                    }
                }
            });
        } else {
            gridData = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            exportWords.forEach((w) => {
                for (let i = 0; i < w.word.length; i++) {
                    const x = w.dir === 'across' ? w.x + i : w.x;
                    const y = w.dir === 'across' ? w.y : w.y + i;
                    if (y >= 0 && x >= 0 && y < GRID_SIZE && x < GRID_SIZE) {
                        gridData[y][x] = w.word[i];
                    }
                }
            });
        }

        const template = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${gameName}</title>
        <style>
            body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: radial-gradient(circle at 30% 20%, #f0f9ff 0%, #dbeafe 45%, #bfdbfe 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; margin: 0; }
            h1 { color: #0c4a6e; text-transform: uppercase; letter-spacing: 0.08em; margin: 8px 0 16px; font-size: clamp(1rem, 3vw, 1.35rem); font-weight: 800; text-align: center; }
            .game-container { display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px; width: 100%; max-width: 1100px; justify-content: center; align-items: flex-start; }
            .grid { display: grid; grid-template-columns: repeat(15, min(5.2vh, 40px)); gap: 0; background: transparent; user-select: none; touch-action: none; }
            .c { width: min(5.2vh, 40px); height: min(5.2vh, 40px); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #0f172a; position: relative; box-sizing: border-box; transition: background 0.15s ease, color 0.15s ease; }
            .c.empty { visibility: hidden; pointer-events: none; }
            .c.active { background: #fff; border: 1.5px solid #0f172a; margin: -0.75px; z-index: 1; border-radius: 2px; }
            .c.ws-cell { background: #fff; border: 1px solid #cbd5e1; cursor: pointer; border-radius: 2px; font-size: clamp(12px, 2.6vh, 16px); }
            .num { position: absolute; top: 2px; left: 3px; font-size: 9px; color: #334155; font-weight: 800; line-height: 1; z-index: 2; pointer-events: none; }
            .c input { width: 100%; height: 100%; text-align: center; border: none; text-transform: uppercase; font-weight: 800; font-size: min(2.8vh, 20px); outline: none; background: transparent; padding-top: 6px; caret-color: #2563eb; }
            .highlight { background: #fde047 !important; color: #422006 !important; }
            .found { background: #16a34a !important; color: #fff !important; border-color: #15803d !important; }
            .clue-box { background: rgba(255,255,255,0.92); padding: 16px 18px; border-radius: 14px; box-shadow: 0 12px 40px rgba(15,23,42,0.12); overflow-y: auto; flex: 1; min-width: 220px; max-width: 420px; max-height: 70vh; display: flex; flex-direction: column; gap: 14px; backdrop-filter: blur(8px); }
            .clue-col h3 { margin: 0 0 10px 0; font-size: 14px; border-bottom: 2px solid #7dd3fc; color: #0369a1; text-transform: uppercase; letter-spacing: 0.04em; }
            .clue-item { margin: 6px 0; font-size: 14px; cursor: default; padding: 6px 0; border-bottom: 1px solid #f1f5f9; transition: opacity 0.2s; }
            .done { text-decoration: line-through; color: #15803d; font-weight: 700; opacity: 0.55; }
            #win { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
            #win .card { background: #fff; padding: 36px 40px; border-radius: 20px; box-shadow: 0 24px 80px rgba(0,0,0,0.25); text-align: center; max-width: 90vw; animation: pop 0.4s cubic-bezier(0.22,1,0.36,1); }
            @keyframes pop { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
            #win h2 { margin: 0 0 8px; color: #15803d; }
            #win button { margin-top: 16px; padding: 12px 24px; border-radius: 10px; background: #0ea5e9; color: #fff; font-weight: 700; border: none; cursor: pointer; }
            #win button:hover { filter: brightness(1.05); }
        </style></head><body>
        <div id="win" style="display:none"><div class="card"><h2>Great job!</h2><p style="margin:0;color:#64748b">Puzzle solved.</p><button type="button" onclick="location.reload()">Play again</button></div></div>
        <h1>${gameName}</h1>
        <div class="game-container">
            <div class="grid" id="g"></div>
            <div class="clue-box">
                ${isWS ? '<div class="clue-col"><h3>Words to find</h3><div id="ws-l"></div></div>' :
                '<div class="clue-col"><h3>Across</h3><div id="across-l"></div></div><div class="clue-col"><h3>Down</h3><div id="down-l"></div></div>'}
            </div>
        </div>
        <script>
            const words = ${JSON.stringify(exportWords)};
            const isWS = ${isWS};
            const grid = ${JSON.stringify(gridData)};
            const cellNums = ${JSON.stringify(cellNumbers)};
            const GRID = 15;
            const g = document.getElementById('g');
            let isDragging = false, startCell = null, endCell = null;

            function wsLineCells(x0, y0, x1, y1) {
                const dx = x1 - x0, dy = y1 - y0;
                const adx = Math.abs(dx), ady = Math.abs(dy);
                let stepX = 0, stepY = 0;
                if (adx === 0 && ady === 0) return [{x:x0,y:y0}];
                if (ady === 0) stepX = Math.sign(dx);
                else if (adx === 0) stepY = Math.sign(dy);
                else if (adx === ady) { stepX = Math.sign(dx); stepY = Math.sign(dy); }
                else return [];
                const out = [];
                let cx = x0, cy = y0, guard = 0;
                while (guard++ < 40) {
                    out.push({x:cx,y:cy});
                    if (cx === x1 && cy === y1) break;
                    cx += stepX; cy += stepY;
                }
                return out;
            }

            grid.forEach((row, y) => row.forEach((char, x) => {
                const d = document.createElement('div'); d.className = 'c';
                d.dataset.x = x; d.dataset.y = y;
                if (!isWS) {
                    if (char !== "") {
                        d.classList.add('active');
                        if (cellNums[y+"-"+x]) d.innerHTML += '<span class="num">'+cellNums[y+"-"+x]+'</span>';
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.maxLength = 1;
                        inp.dataset.x = x; inp.dataset.y = y;
                        inp.autocomplete = 'off';
                        inp.spellcheck = false;
                        inp.oninput = (e) => {
                            e.target.value = e.target.value.replace(/[^a-zA-Z]/g,'').slice(-1).toUpperCase();
                            if (e.target.value) moveFocus(x, y);
                            check();
                        };
                        inp.onkeydown = (e) => {
                            if (e.key === 'Backspace' && !e.target.value) nudgeFocus(x, y, -1);
                        };
                        d.appendChild(inp);
                    } else d.classList.add('empty');
                } else {
                    d.textContent = char;
                    d.classList.add('ws-cell');
                    d.onmousedown = (ev) => { ev.preventDefault(); isDragging = true; startCell = {x, y}; endCell = {x, y}; paintLine(); };
                    d.onmouseenter = () => { if (isDragging) { endCell = {x, y}; paintLine(); } };
                    d.ontouchstart = (ev) => { const t = ev.touches[0]; const el = document.elementFromPoint(t.clientX, t.clientY); pickWsTouch(el, true); };
                }
                g.appendChild(d);
            }));

            function pickWsTouch(el, down) {
                while (el && !el.classList?.contains('ws-cell')) el = el.parentElement;
                if (!el) return;
                const x = +el.dataset.x, y = +el.dataset.y;
                if (down) { isDragging = true; startCell = {x, y}; endCell = {x, y}; paintLine(); }
                else { endCell = {x, y}; paintLine(); }
            }
            window.addEventListener('touchmove', (ev) => {
                if (!isWS || !isDragging) return;
                ev.preventDefault();
                const t = ev.touches[0];
                const el = document.elementFromPoint(t.clientX, t.clientY);
                pickWsTouch(el, false);
            }, { passive: false });

            window.onmouseup = () => finishWsDrag();
            window.addEventListener('touchend', () => finishWsDrag(), { passive: true });

            function finishWsDrag() {
                if (!isWS || !isDragging) return;
                validateSelection();
                isDragging = false;
                startCell = endCell = null;
                clearHighlights();
            }

            function paintLine() {
                clearHighlights();
                if (!startCell || !endCell) return;
                const cells = wsLineCells(startCell.x, startCell.y, endCell.x, endCell.y);
                cells.forEach(({x:cx,y:cy}) => {
                    const el = document.querySelector('.c[data-x="'+cx+'"][data-y="'+cy+'"]');
                    if (el) el.classList.add('highlight');
                });
            }

            function clearHighlights() {
                document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            }

            function orderedHighlightString() {
                if (!startCell || !endCell) return '';
                const cells = wsLineCells(startCell.x, startCell.y, endCell.x, endCell.y);
                return cells.map(({x:cx,y:cy}) => {
                    const el = document.querySelector('.c[data-x="'+cx+'"][data-y="'+cy+'"]');
                    return el ? el.textContent : '';
                }).join('');
            }

            function validateSelection() {
                const str = orderedHighlightString();
                const rev = str.split('').reverse().join('');
                words.forEach((w, i) => {
                    if (str === w.word || rev === w.word) {
                        document.querySelectorAll('.highlight').forEach(el => el.classList.add('found'));
                        document.getElementById('w'+i).classList.add('done');
                    }
                });
                check();
            }

            function moveFocus(x, y) {
                const word = words.find(w =>
                    (x >= w.x && x < w.x + w.word.length && y === w.y && w.dir === 'across') ||
                    (y >= w.y && y < w.y + w.word.length && x === w.x && w.dir === 'down'));
                if (!word) return;
                const nextX = word.dir === 'across' ? x + 1 : x;
                const nextY = word.dir === 'down' ? y + 1 : y;
                const next = document.querySelector('input[data-x="'+nextX+'"][data-y="'+nextY+'"]');
                if (next) next.focus();
            }

            function nudgeFocus(x, y, dir) {
                const word = words.find(w =>
                    (x >= w.x && x < w.x + w.word.length && y === w.y && w.dir === 'across') ||
                    (y >= w.y && y < w.y + w.word.length && x === w.x && w.dir === 'down'));
                if (!word) return;
                const px = word.dir === 'across' ? x + dir : x;
                const py = word.dir === 'down' ? y + dir : y;
                const prev = document.querySelector('input[data-x="'+px+'"][data-y="'+py+'"]');
                if (prev) { prev.focus(); prev.select?.(); }
            }

            function check() {
                let allDone = true;
                words.forEach((w, i) => {
                    const row = document.getElementById('w'+i);
                    if (row.classList.contains('done')) return;
                    if (!isWS) {
                        let current = '';
                        for (let k = 0; k < w.word.length; k++) {
                            const cx = w.dir === 'across' ? w.x + k : w.x;
                            const cy = w.dir === 'across' ? w.y : w.y + k;
                            const inp = document.querySelector('.c[data-x="'+cx+'"][data-y="'+cy+'"] input');
                            current += (inp && inp.value) ? inp.value.toUpperCase() : '';
                        }
                        if (current === w.word) row.classList.add('done');
                        else allDone = false;
                    } else allDone = false;
                });
                if (allDone) document.getElementById('win').style.display = 'flex';
            }

            words.forEach((w, i) => {
                const li = document.createElement('div');
                li.className = 'clue-item';
                li.id = 'w'+i;
                li.textContent = (isWS ? '' : (w.number + '. ')) + (isWS ? w.word : w.clue);
                document.getElementById((isWS ? 'ws' : w.dir) + '-l').appendChild(li);
            });
        <\/script></body></html>`;

        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: safeFile + '.html',
                types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(template);
            await writable.close();
        } catch (err) {
            const blob = new Blob([template], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = safeFile + '.html';
            a.click();
            URL.revokeObjectURL(a.href);
        }
    }

    document.getElementById('wordIn').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addWordToPuzzle(); }
    });
    document.getElementById('clueIn').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addWordToPuzzle(); }
    });

    renderAll();
</script>
</body>
</html>
