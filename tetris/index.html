<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f1a">
    <title>Tetris</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --panel: #16162a;
            --border: #3d3d5c;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.15);
            --text: #e8e8f0;
            --muted: #8888a0;
        }

        * { box-sizing: border-box; }

        html {
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 212, 170, 0.12), transparent 50%),
                linear-gradient(180deg, var(--bg), #0a0a14);
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(12px, 3vw, 24px);
            align-items: flex-start;
            justify-content: center;
            max-width: 520px;
        }

        .main-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .canvas-wrap {
            position: relative;
            border-radius: 8px;
            padding: 4px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            background: linear-gradient(145deg, #2a2a44, #1a1a32);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        #tetris {
            display: block;
            width: min(92vw, 288px);
            height: auto;
            aspect-ratio: 240 / 400;
            background: #000;
            border-radius: 4px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #overlay-msg {
            display: none;
            position: absolute;
            inset: 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.82);
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.45;
            color: var(--text);
            pointer-events: none;
            z-index: 2;
        }

        #overlay-msg.show {
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        #overlay-msg kbd {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 0.75rem;
        }

        #overlay-body {
            margin-bottom: 12px;
        }

        .overlay-primary-btn {
            display: none;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            touch-action: manipulation;
            background: linear-gradient(135deg, var(--accent), #00a884);
            color: #061816;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.35);
        }

        #overlay-msg.show .overlay-primary-btn.is-visible {
            display: block;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 140px;
            flex: 0 1 auto;
        }

        .stat-box {
            background: var(--panel);
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        }

        .stat-box.next-wrap {
            padding: 12px;
        }

        #next-canvas {
            display: block;
            margin: 8px auto 0;
            background: #000;
            border-radius: 6px;
            border: 1px solid var(--border);
            image-rendering: pixelated;
        }

        .label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .value {
            font-size: 1.45rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }

        .controls-hint {
            font-size: 0.72rem;
            color: var(--muted);
            text-align: left;
            line-height: 1.65;
            margin-top: 6px;
        }

        .controls-hint-touch {
            display: none;
            font-size: 0.72rem;
            color: var(--muted);
            text-align: left;
            line-height: 1.65;
            margin-top: 6px;
        }

        .touch-controls {
            display: none;
            width: 100%;
            max-width: min(96vw, 340px);
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .touch-controls.touch-visible {
            display: grid;
        }

        .touch-btn {
            min-height: 52px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--panel);
            color: var(--text);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .touch-btn:active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .touch-btn.span2 {
            grid-column: span 2;
        }

        .touch-btn.span4 {
            grid-column: span 4;
        }

        /* Phones / tablets / touch: always show on-screen controls */
        @media (max-width: 900px), (pointer: coarse), (hover: none) {
            .touch-controls.touch-visible {
                display: grid;
            }
            .controls-hint { display: none; }
            .controls-hint-touch { display: block; }
        }

        @media (min-width: 901px) and (pointer: fine) and (hover: hover) {
            .touch-controls.touch-visible {
                display: none !important;
            }
            .controls-hint { display: block; }
            .controls-hint-touch { display: none; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="main-col">
        <div class="canvas-wrap">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="overlay-msg" role="dialog" aria-modal="true" aria-live="polite" data-state="">
                <div id="overlay-body"></div>
                <button type="button" id="overlay-primary" class="overlay-primary-btn" aria-label="Confirm"></button>
            </div>
        </div>
        <div class="touch-controls touch-visible" id="touch-controls" aria-label="Touch controls">
            <button type="button" class="touch-btn" data-act="left" aria-label="Move left">←</button>
            <button type="button" class="touch-btn" data-act="rotate-ccw" aria-label="Rotate counter-clockwise">⟲</button>
            <button type="button" class="touch-btn" data-act="rotate" aria-label="Rotate clockwise">⟳</button>
            <button type="button" class="touch-btn" data-act="right" aria-label="Move right">→</button>
            <button type="button" class="touch-btn span2" data-act="soft" aria-label="Soft drop">▼ Drop</button>
            <button type="button" class="touch-btn span2" data-act="pause" aria-label="Pause">❚❚</button>
            <button type="button" class="touch-btn span4" data-act="hard" aria-label="Hard drop">Hard drop</button>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <div class="label">Score</div>
            <div id="score" class="value">0</div>
        </div>
        <div class="stat-box">
            <div class="label">Lines</div>
            <div id="lines" class="value">0</div>
        </div>
        <div class="stat-box next-wrap">
            <div class="label">Next</div>
            <canvas id="next-canvas" width="96" height="96"></canvas>
        </div>
        <div class="stat-box">
            <div class="label">Controls</div>
            <div class="controls-hint">
                <kbd>←</kbd><kbd>→</kbd> Move · <kbd>↓</kbd> Soft drop<br>
                <kbd>Q</kbd> / <kbd>W</kbd> Rotate · <kbd>Space</kbd> Hard drop<br>
                <kbd>P</kbd> Pause
            </div>
            <div class="controls-hint-touch">
                Use the on-screen buttons below the board: swipe row for moves &amp; rotates, soft drop, pause, hard drop.
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    const COLS = 12;
    const ROWS = 20;
    const BLOCK = 20;

    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(BLOCK, BLOCK);

    const nextCanvas = document.getElementById('next-canvas');
    const nextCtx = nextCanvas.getContext('2d');

    const ARENA_W = COLS;
    const ARENA_H = ROWS;

    function createPiece(type) {
        if (type === 'I') {
            return [
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
            ];
        }
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        return createPiece('T');
    }

    const colors = [
        null,
        '#00f5f5', '#ffa922', '#4466ff',
        '#ffeb3b', '#ff5252', '#69f0ae', '#e040fb'
    ];

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function collide(arena, player) {
        const m = player.matrix;
        const o = player.pos;
        for (let y = 0; y < m.length; y++) {
            for (let x = 0; x < m[y].length; x++) {
                if (m[y][x] === 0) continue;
                const ay = y + o.y;
                const ax = x + o.x;
                if (ax < 0 || ax >= arena[0].length || ay >= arena.length) return true;
                if (ay < 0) continue;
                if (arena[ay][ax] !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    const ay = y + player.pos.y;
                    const ax = x + player.pos.x;
                    if (ay >= 0 && ay < arena.length && ax >= 0 && ax < arena[0].length) {
                        arena[ay][ax] = value;
                    }
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; y++) {
            for (let x = 0; x < y; x++) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    let bag = [];
    const PIECE_TYPES = ['I', 'L', 'J', 'O', 'Z', 'S', 'T'];

    function refillBag() {
        bag = PIECE_TYPES.slice();
        for (let i = bag.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [bag[i], bag[j]] = [bag[j], bag[i]];
        }
    }

    function randomPieceMatrix() {
        if (bag.length === 0) refillBag();
        return createPiece(bag.pop());
    }

    let nextMatrix = randomPieceMatrix();

    function drawNextPreview() {
        const pad = 8;
        const bw = nextCanvas.width - pad * 2;
        const bh = nextCanvas.height - pad * 2;
        nextCtx.fillStyle = '#0a0a12';
        nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        const mw = nextMatrix[0].length;
        const mh = nextMatrix.length;
        const cell = Math.min(bw / mw, bh / mh, 22);
        const ox = pad + (bw - mw * cell) / 2;
        const oy = pad + (bh - mh * cell) / 2;
        nextMatrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    nextCtx.fillStyle = colors[value];
                    nextCtx.fillRect(ox + x * cell, oy + y * cell, cell - 1, cell - 1);
                    nextCtx.strokeStyle = 'rgba(0,0,0,0.35)';
                    nextCtx.strokeRect(ox + x * cell, oy + y * cell, cell - 1, cell - 1);
                }
            });
        });
    }

    function arenaSweep() {
        let linesClearedThisTurn = 0;
        let multiplier = 1;

        outer: for (let y = arena.length - 1; y >= 0; y--) {
            for (let x = 0; x < arena[y].length; x++) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            y++;
            linesClearedThisTurn++;
            player.score += 100 * multiplier;
            multiplier *= 2;
            player.lines += 1;
        }

        if (linesClearedThisTurn > 0) {
            dropInterval = Math.max(100, 1000 - Math.floor(player.lines / 5) * 100);
            updateScore();
        }
    }

    function drawBlock(ctx, x, y, value) {
        if (value === 0) return;
        ctx.fillStyle = colors[value];
        ctx.fillRect(x, y, 1, 1);
        ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.lineWidth = 0.06;
        ctx.strokeRect(x + 0.02, y + 0.02, 0.96, 0.96);
    }

    function drawMatrix(matrix, offset, ctx) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) drawBlock(ctx, x + offset.x, y + offset.y, value);
            });
        });
    }

    function draw() {
        context.fillStyle = '#07070e';
        context.fillRect(0, 0, ARENA_W, ARENA_H);

        context.strokeStyle = 'rgba(255,255,255,0.04)';
        context.lineWidth = 0.02;
        for (let x = 0; x <= ARENA_W; x++) {
            context.beginPath();
            context.moveTo(x, 0);
            context.lineTo(x, ARENA_H);
            context.stroke();
        }
        for (let y = 0; y <= ARENA_H; y++) {
            context.beginPath();
            context.moveTo(0, y);
            context.lineTo(ARENA_W, y);
            context.stroke();
        }

        drawMatrix(arena, { x: 0, y: 0 }, context);

        if (player.matrix) {
            const ghost = {
                pos: { x: player.pos.x, y: player.pos.y },
                matrix: player.matrix
            };
            while (!collide(arena, ghost)) ghost.pos.y++;
            ghost.pos.y--;
            context.globalAlpha = 0.22;
            drawMatrix(ghost.matrix, ghost.pos, context);
            context.globalAlpha = 1;

            drawMatrix(player.matrix, player.pos, context);
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerHardDrop() {
        while (!collide(arena, player)) player.pos.y++;
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (Math.abs(offset) > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    const overlayEl = document.getElementById('overlay-msg');
    const overlayBody = document.getElementById('overlay-body');
    const overlayPrimary = document.getElementById('overlay-primary');

    function hideOverlay() {
        overlayEl.classList.remove('show');
        overlayBody.innerHTML = '';
        overlayPrimary.textContent = '';
        overlayPrimary.classList.remove('is-visible');
        overlayPrimary.onclick = null;
        overlayEl.dataset.state = '';
    }

    function showOverlayDialog(html, primaryLabel, primaryAction) {
        overlayBody.innerHTML = html;
        if (primaryLabel && typeof primaryAction === 'function') {
            overlayPrimary.textContent = primaryLabel;
            overlayPrimary.classList.add('is-visible');
            overlayPrimary.onclick = function (e) {
                e.preventDefault();
                primaryAction();
            };
        } else {
            overlayPrimary.classList.remove('is-visible');
            overlayPrimary.onclick = null;
        }
        overlayEl.classList.add('show');
    }

    function gameOver() {
        playing = false;
        overlayEl.dataset.state = 'gameover';
        showOverlayDialog(
            'Game over<span style="display:block;font-weight:400;font-size:0.85rem;color:#aaa;margin-top:10px">Keyboard: Enter to restart</span>',
            'Play again',
            function () {
                hideOverlay();
                restartAfterGameOver();
            }
        );
    }

    function playerReset() {
        player.matrix = nextMatrix;
        nextMatrix = randomPieceMatrix();
        drawNextPreview();
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

        if (collide(arena, player)) {
            gameOver();
        }
    }

    function updateScore() {
        document.getElementById('score').textContent = player.score;
        document.getElementById('lines').textContent = player.lines;
    }

    const arena = createMatrix(COLS, ROWS);
    const player = {
        pos: { x: 0, y: 0 },
        matrix: null,
        score: 0,
        lines: 0
    };

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let playing = true;
    let paused = false;

    function update(time) {
        if (!lastTime) lastTime = time;
        const deltaTime = time - lastTime;
        lastTime = time;
        if (playing && !paused) {
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
        }
        draw();
        requestAnimationFrame(update);
    }

    function togglePause() {
        if (!playing || overlayEl.dataset.state === 'gameover') return;
        paused = !paused;
        if (paused) {
            overlayEl.dataset.state = 'pause';
            showOverlayDialog(
                'Paused<span style="display:block;font-weight:400;font-size:0.85rem;color:#aaa;margin-top:10px">Keyboard: P to resume</span>',
                'Resume',
                function () {
                    paused = false;
                    overlayEl.dataset.state = '';
                    hideOverlay();
                }
            );
        } else {
            hideOverlay();
        }
    }

    function restartAfterGameOver() {
        hideOverlay();
        paused = false;
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.lines = 0;
        dropInterval = 1000;
        refillBag();
        nextMatrix = randomPieceMatrix();
        drawNextPreview();
        player.matrix = nextMatrix;
        nextMatrix = randomPieceMatrix();
        drawNextPreview();
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        updateScore();
        dropCounter = 0;
        lastTime = 0;
        playing = true;
    }

    document.addEventListener('keydown', function (event) {
        if (event.ctrlKey || event.metaKey || event.altKey) return;

        const code = event.code;

        if (code === 'Enter' && overlayEl.dataset.state === 'gameover') {
            event.preventDefault();
            restartAfterGameOver();
            return;
        }

        if (!playing) return;

        if (code === 'KeyP') {
            event.preventDefault();
            togglePause();
            return;
        }

        if (paused) return;

        if (
            code === 'ArrowLeft' || code === 'ArrowRight' || code === 'ArrowDown' ||
            code === 'ArrowUp' || code === 'Space' || code === 'KeyQ' || code === 'KeyW'
        ) {
            event.preventDefault();
        }

        if (code === 'ArrowLeft') playerMove(-1);
        else if (code === 'ArrowRight') playerMove(1);
        else if (code === 'ArrowDown') playerDrop();
        else if (code === 'KeyQ') playerRotate(-1);
        else if (code === 'KeyW') playerRotate(1);
        else if (code === 'Space') playerHardDrop();
    });

    document.getElementById('touch-controls').addEventListener('pointerdown', function (e) {
        const btn = e.target.closest('[data-act]');
        if (!btn || !playing) return;
        const act = btn.getAttribute('data-act');

        if (act === 'pause') {
            e.preventDefault();
            togglePause();
            return;
        }

        if (paused) return;

        e.preventDefault();

        if (act === 'left') playerMove(-1);
        else if (act === 'right') playerMove(1);
        else if (act === 'soft') playerDrop();
        else if (act === 'rotate') playerRotate(1);
        else if (act === 'rotate-ccw') playerRotate(-1);
        else if (act === 'hard') playerHardDrop();

        dropCounter = 0;
    }, { passive: false });

    playerReset();
    updateScore();
    hideOverlay();
    requestAnimationFrame(update);
})();
</script>
</body>
</html>
