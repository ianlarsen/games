<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tangrams</title>
  <link rel="stylesheet" href="../_ios_compat.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(165deg, #faf5ff 0%, #e9d5ff 35%, #ddd6fe 100%);
      min-height: 100dvh;
      height: 100dvh;
      padding: max(0.35rem, env(safe-area-inset-top)) max(0.5rem, env(safe-area-inset-right)) max(0.35rem, env(safe-area-inset-bottom)) max(0.5rem, env(safe-area-inset-left));
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }
    header {
      max-width: 100%;
      width: 100%;
      margin: 0 auto 0.2rem;
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    .back-btn {
      text-decoration: none;
      background: #fff;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      padding: 0.45rem 0.9rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: #334155;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    h1 {
      font-size: clamp(1.25rem, 5vw, 1.85rem);
      color: #1e1b4b;
      text-align: center;
      flex: 1;
    }
    main {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 0.25rem;
    }
    .section-label {
      text-align: center;
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin: 0.06rem 0 0.04rem;
      flex: 0 0 auto;
    }
    .mode-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.28rem;
      justify-content: center;
      margin-bottom: 0.08rem;
      flex: 0 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.1rem;
      scrollbar-width: none;
    }
    .mode-row::-webkit-scrollbar { display: none; }
    .mode-row button {
      border: 2px solid #94a3b8;
      background: #fff;
      border-radius: 999px;
      padding: 0.32rem 0.65rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #334155;
      min-height: 40px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .mode-row button[aria-pressed="true"] {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff;
      border-color: #5b21b6;
    }
    .toolbar {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.3rem;
      justify-content: center;
      align-items: center;
      margin: 0.1rem 0 0.12rem;
      flex: 0 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .toolbar button, .toolbar label {
      border: 2px solid #cbd5e1;
      background: #fff;
      border-radius: 10px;
      padding: 0.35rem 0.65rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #334155;
      min-height: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .toolbar label { cursor: pointer; user-select: none; }
    .toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }
    .toolbar .tool-primary {
      border-color: #c7d2fe;
      background: linear-gradient(180deg, #fff 0%, #eef2ff 100%);
      color: #312e81;
      min-height: 44px;
      padding: 0.42rem 0.9rem;
      gap: 0.45rem;
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(79, 70, 229, 0.12);
    }
    .toolbar .tool-primary:not(:disabled):active {
      transform: scale(0.97);
    }
    .toolbar .tool-primary .tool-glyph {
      flex-shrink: 0;
      font-size: 1.45rem;
      line-height: 1;
      font-weight: 800;
      color: #4f46e5;
      min-width: 1.35rem;
      text-align: center;
    }
    .toolbar .tool-primary:disabled .tool-glyph { color: #94a3b8; }
    .toolbar .tool-primary[hidden] { display: none !important; }
    .canvas-wrap {
      background: #fff;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
      padding: min(0.35rem, 1.2vw);
      margin: 0 auto;
      width: 100%;
      max-width: 100%;
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Display size is set in JS so width/height scale together (no non-uniform stretch). */
    canvas {
      display: block;
      touch-action: none;
      border-radius: 10px;
      background: #f8fafc;
    }
    .help {
      margin-top: 0.08rem;
      font-size: clamp(0.6rem, 2.4vw, 0.68rem);
      color: #64748b;
      text-align: center;
      line-height: 1.3;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
      flex: 0 0 auto;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .done-badge {
      text-align: center;
      font-weight: 800;
      color: #15803d;
      font-size: 0.72rem;
      margin-bottom: 0.04rem;
      min-height: 0.95em;
      flex: 0 0 auto;
    }
    .win-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .win-overlay[hidden] {
      display: none !important;
    }
    .win-confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .confetti-bit {
      position: absolute;
      width: 9px;
      height: 14px;
      top: -8vh;
      left: calc(var(--cx) * 100%);
      background: var(--bg, #6366f1);
      border-radius: 2px;
      opacity: 0.95;
      animation: confetti-drop var(--dur, 2.1s) ease-in forwards;
      animation-delay: var(--delay, 0s);
    }
    .confetti-bit.round { border-radius: 50%; width: 10px; height: 10px; }
    @keyframes confetti-drop {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); }
      100% { transform: translate3d(var(--tx), 115vh, 0) rotate(3turn); opacity: 0.75; }
    }
    .win-card {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.35rem 1.5rem 1.25rem;
      max-width: 20rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }
    .win-card h2 {
      font-size: 1.45rem;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .win-card .btn-play-again {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.45);
      min-height: 48px;
    }
    .win-card .btn-play-again:active {
      transform: scale(0.98);
    }
  </style>

    const primary = pz.primarySnaps || pz.snaps || [];
    const snaps = primary.map(s => ({
      id: s.id,
      shape: s.shape || s.id,
      mx: s.mx,
      my: s.my,
      r: s.r,
      flip: !!s.flip
    }));
    const solutions = (pz.solutions && pz.solutions.length)
      ? pz.solutions.map(sol => sol.map(s => ({
          id: s.id,
          shape: s.shape || s.id,
          mx: s.mx,
          my: s.my,
          r: s.r,
          flip: !!s.flip
        })))
      : [snaps.map(s => ({ ...s }))];
    return {
      id: pz.id,
      label: pz.label,
      kind: pz.kind || 'shape',
      matShape: pz.matShape || 'square',
      flex: pz.flex || 'none',
      help: pz.help != null ? pz.help : 'Snap pieces to the dashed outlines.',
      pieceIds: pz.pieceIds.slice(),
      pieceRotMod: pz.pieceRotMod && typeof pz.pieceRotMod === 'object' ? { ...pz.pieceRotMod } : {},
      shapeDefs: cloneShapeDefs(pz.shapeDefs),
      snaps,
      solutions
    };
  }

  /** Scale file/embedded puzzles from author 400×400 space into logical play space. */
  function scaleLoadedPuzzleLayout(act, s) {
    if (!act || s === 1) return act;
    const scRow = r => ({ ...r, mx: r.mx * s, my: r.my * s });
    const out = { ...act };
    out.snaps = (act.snaps || []).map(scRow);
    out.solutions = (act.solutions || []).map(sol => sol.map(scRow));
    if (act.shapeDefs) {
      out.shapeDefs = { ...act.shapeDefs };
      for (const k of Object.keys(out.shapeDefs)) {
        const v = out.shapeDefs[k];
        if (v && Array.isArray(v.local)) {
          out.shapeDefs[k] = { ...v, local: v.local.map(p => [p[0] * s, p[1] * s]) };
        }
      }
    }
    return out;
  }

  /** Rotation symmetry for author palette shapes (matches tangram_author defaults). */
  const PALETTE_PIECE_ROT_MOD = {
    yellow_square: 90,
    green_triangle: 180,
    red_triangle: 180,
    blue_triangle: 180,
    teal_triangle: 180,
    violet_triangle: 180,
    orange_rhombus: 180
  };

  function scalePts(pts, s) {
    return pts.map(p => [p[0] * s, p[1] * s]);
  }

  function localVertexToMat(mx, my, rDeg, flip, lx, ly) {
    let x = lx;
    let y = ly;
    if (flip) x = -x;
    const rad = (rDeg * Math.PI) / 180;
    const c = Math.cos(rad);
    const s = Math.sin(rad);
    return [x * c - y * s + mx, x * s + y * c + my];
  }

  function convertAuthorSnapshotToPuzzle(snap) {
    if (!snap || snap.format !== 'otg-tangram-author-snapshot') throw new Error('bad snapshot format');
    const draft = snap.draftFields || {};
    const matF = snap.matFrame || {};
    const authorMat = { w: 400, h: 400 };
    const matDims = matF.mat || authorMat;
    const matW = Number(matDims.w) || authorMat.w;
    const matH = Number(matDims.h) || authorMat.h;
    const byId = Object.fromEntries((snap.matPieces || []).map(p => [p.pieceId, p]));
    const sol0 = snap.capturedSolutions && snap.capturedSolutions[0] ? snap.capturedSolutions[0] : null;
    if (!sol0 || !sol0.length) throw new Error('snapshot missing capturedSolutions[0]');

    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;
    for (const row of sol0) {
      const pc = byId[row.id];
      if (!pc || !pc.local) continue;
      for (const [lx, ly] of pc.local) {
        const [gx, gy] = localVertexToMat(row.mx, row.my, row.r, !!row.flip, lx, ly);
        minX = Math.min(minX, gx);
        maxX = Math.max(maxX, gx);
        minY = Math.min(minY, gy);
        maxY = Math.max(maxY, gy);
      }
    }
    if (!Number.isFinite(minX)) throw new Error('snapshot bbox');

    const margin = 14;
    const bw = Math.max(1, maxX - minX);
    const bh = Math.max(1, maxY - minY);
    const scale = Math.min((matW - 2 * margin) / bw, (matH - 2 * margin) / bh, 1);
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const tx = matW / 2 - scale * cx;
    const ty = matH / 2 - scale * cy;

    const shapeDefs = {};
    for (const row of sol0) {
      const pc = byId[row.id];
      if (!pc) continue;
      const sh = row.shape || pc.shapeId;
      shapeDefs[sh] = {
        color: pc.color,
        para: !!pc.para,
        local: scalePts(pc.local, scale)
      };
    }

    const newSol = sol0.map(row => {
      const pc = byId[row.id];
      const sh = row.shape || (pc && pc.shapeId);
      return {
        id: row.id,
        shape: sh,
        mx: row.mx * scale + tx,
        my: row.my * scale + ty,
        r: row.r,
        flip: !!row.flip
      };
    });

    function pieceNum(id) {
      const m = /^p(\d+)$/.exec(String(id));
      return m ? parseInt(m[1], 10) : 0;
    }
    const pieceIds = [...new Set(newSol.map(r => r.id))].sort((a, b) => pieceNum(a) - pieceNum(b));
    const byRow = Object.fromEntries(newSol.map(r => [r.id, r]));
    const ordered = pieceIds.map(pid => {
      const u = byRow[pid];
      return { id: u.id, shape: u.shape, mx: u.mx, my: u.my, r: u.r, flip: u.flip };
    });

    const slug = String(draft.id || 'animal')
      .trim()
      .replace(/\s+/g, '_')
      .replace(/[^a-z0-9_-]/gi, '') || 'animal';
    const label = (draft.label && String(draft.label).trim()) || slug;
    return normalizePuzzleFromFile({
      id: slug,
      label,
      kind: draft.kind || 'picture',
      matShape: matF.matShape || 'square',
      flex: draft.flex || 'none',
      help: `Match the dashed ${label} silhouette.`,
      pieceIds,
      solutions: [ordered.map(r => ({ ...r }))],
      primarySnaps: ordered.map(r => ({ ...r })),
      shapeDefs,
      pieceRotMod: { ...PALETTE_PIECE_ROT_MOD }
    });
  }

  function snapshotBundleToPuzzles(bundle) {
    const snaps = bundle && bundle.snapshots;
    if (!Array.isArray(snaps)) return [];
    const out = [];
    for (const s of snaps) {
      try {
        out.push(convertAuthorSnapshotToPuzzle(s));
      } catch (e) {
        const id = (s && s.draftFields && s.draftFields.id) || '?';
        console.warn('Skipping animal snapshot "' + id + '":', e.message || e);
      }
    }
    return out;
  }

  function computePieceEdgeForActivities(acts) {
    let maxR = 0;
    for (const act of acts) {
      const snaps = act.snaps || [];
      for (const s of snaps) {
        const sh = s.shape || s.id;
        const def = resolveTanDef(act, sh);
        if (!def || !def.local) continue;
        for (const p of def.local) maxR = Math.max(maxR, Math.hypot(p[0], p[1]));
      }
    }
    return Math.max(245 * LAYOUT_SCALE, Math.ceil(maxR * 1.22) + 40 * LAYOUT_SCALE);
  }

  function resizeCanvas() {
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  /** Fit the square logical canvas into the wrap with one scale on both axes (preserves aspect ratio). */
  function layoutCanvasDisplay() {
    if (!canvasWrap) {
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      return;
    }
    const cs = getComputedStyle(canvasWrap);
    const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight) || 0;
    const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom) || 0;
    const aw = Math.max(1, canvasWrap.clientWidth - padX);
    const ah = Math.max(1, canvasWrap.clientHeight - padY);
    const scale = Math.min(aw / W, ah / H, 1);
    let dw = Math.round(W * scale);
    let dh = Math.round(H * scale);
    if (W === H) {
      const side = Math.min(dw, dh);
      dw = side;
      dh = side;
    }
    canvas.style.width = dw + 'px';
    canvas.style.height = dh + 'px';
  }

  function refitCanvas() {
    resizeCanvas();
    layoutCanvasDisplay();
  }

  function syncLayoutFromEdge(edge) {
    PIECE_EDGE = edge;
    MAT.x = edge;
    MAT.y = edge;
    MAT.w = MAT_W;
    MAT.h = MAT_H;
    W = MAT.x + MAT.w + PIECE_EDGE;
    H = MAT.y + MAT.h + PIECE_EDGE;
    TRAY.x0 = MAT.x + MAT.w + 12 * LAYOUT_SCALE;
    TRAY.x1 = W - 12 * LAYOUT_SCALE;
    TRAY.y0 = MAT.y + 20 * LAYOUT_SCALE;
    TRAY.y1 = MAT.y + MAT.h - 20 * LAYOUT_SCALE;
    refitCanvas();
  }
  syncLayoutFromEdge(computePieceEdgeForActivities(DEFAULT_ACTIVITIES));

  function layoutCanvasDisplayAndDraw() {
    layoutCanvasDisplay();
    if (ACTIVITIES.length) draw();
  }

  window.addEventListener('resize', layoutCanvasDisplayAndDraw);
  if (typeof ResizeObserver !== 'undefined' && canvasWrap) {
    new ResizeObserver(layoutCanvasDisplayAndDraw).observe(canvasWrap);
  }

  function rotXY(x, y, deg) {
    const rad = deg * Math.PI / 180;
    const c = Math.cos(rad), s = Math.sin(rad);
    return [x * c - y * s, x * s + y * c];
  }

  function normRot(r) {
    let x = r % 360;
    if (x > 180) x -= 360;
    if (x <= -180) x += 360;
    return x;
  }

  function rotateSnapAround(s, cx, cy, deg) {
    const rad = deg * Math.PI / 180;
    const c = Math.cos(rad), si = Math.sin(rad);
    const dx = s.mx - cx, dy = s.my - cy;
    return {
      id: s.id,
      shape: s.shape || s.id,
      mx: c * dx - si * dy + cx,
      my: si * dx + c * dy + cy,
      r: normRot(s.r + deg),
      flip: s.flip
    };
  }

  function cloneSnaps(snaps) {
    return snaps.map(s => ({ ...s }));
  }

  /** All rigid rotations of the whole solution about center (mat px). */
  function expandSquareRotations(snaps) {
    const cx = MAT.w / 2, cy = MAT.h / 2;
    const list = [];
    for (const deg of [0, 90, 180, 270]) {
      list.push(snaps.map(s => rotateSnapAround(s, cx, cy, deg)));
    }
    return list;
  }

  /** Triangle: two halves; allow 180° rotation of both pieces together, and swap which large occupies which half. */
  function expandTriangleTargets(snaps) {
    const cx = MAT.w / 3;
    const cy = MAT.h / 3;
    const v0 = cloneSnaps(snaps);
    const v180 = v0.map(s => rotateSnapAround(s, cx, cy, 180));
    const swap = [snaps[1], snaps[0]];
    const swap180 = swap.map(s => rotateSnapAround(s, cx, cy, 180));
    return [v0, v180, swap, swap180];
  }

  function dedupeTargets(list) {
    const seen = new Set();
    const out = [];
    for (let i = 0; i < list.length; i++) {
      const t = list[i];
      const k = '' + t.mx + ',' + t.my + ',' + t.r + ',' + t.flip;
      if (seen.has(k)) continue;
      seen.add(k);
      out.push({ mx: t.mx, my: t.my, r: t.r, flip: t.flip });
    }
    return out;
  }

  /** Classic tangram: each pair of congruent isosceles triangles shares snap targets (palette ids differ). */
  const LARGE_ISO_TANS = new Set(['red_triangle', 'blue_triangle', 'lp', 'lb']);
  const SMALL_ISO_TANS = new Set(['teal_triangle', 'violet_triangle', 'st', 'sr']);

  function tanEquivalenceSlot(shape) {
    const s = shape || '';
    if (LARGE_ISO_TANS.has(s)) return 'large_iso';
    if (SMALL_ISO_TANS.has(s)) return 'small_iso';
    return null;
  }

  /**
   * Merge targets among interchangeable pieces so either physical tan can satisfy either dashed slot.
   * Mutates per in place.
   */
  function mergeInterchangeableTanTargets(act, per) {
    const pieceIds = act.pieceIds || [];
    const snaps = act.snaps || [];
    const bySnapId = Object.fromEntries(snaps.map(s => [s.id, s]));
    const buckets = new Map();
    for (let i = 0; i < pieceIds.length; i++) {
      const snapRow = bySnapId[pieceIds[i]] || snaps[i];
      const shape = snapRow ? (snapRow.shape || snapRow.id) : '';
      const slot = tanEquivalenceSlot(shape);
      if (!slot) continue;
      if (!buckets.has(slot)) buckets.set(slot, []);
      buckets.get(slot).push(i);
    }
    for (const indices of buckets.values()) {
      if (indices.length < 2) continue;
      const merged = [];
      for (const idx of indices) merged.push(...per[idx]);
      const deduped = dedupeTargets(merged);
      for (const idx of indices) per[idx] = deduped;
    }
    return per;
  }

  function isImportedPuzzle(act) {
    return !!(act.solutions && act.pieceIds && act.pieceIds.length && /^p\d+$/.test(String(act.pieceIds[0])));
  }

  /** Per piece index: list of acceptable {mx,my,r,flip} poses (mat space). */
  function buildTargetsForActivity(act) {
    const pieceIds = act.pieceIds || [];
    const n = pieceIds.length;
    const per = Array.from({ length: n }, () => []);

    if (isImportedPuzzle(act)) {
      if (act.flex === 'square4') {
        const merged = pieceIds.map(() => []);
        for (let s = 0; s < act.solutions.length; s++) {
          const sol = act.solutions[s];
          const byId = Object.fromEntries(sol.map(row => [row.id, row]));
          const ordered = pieceIds.map(pid => {
            const row = byId[pid];
            if (!row) return null;
            return {
              id: row.id,
              shape: row.shape || row.id,
              mx: row.mx,
              my: row.my,
              r: row.r,
              flip: !!row.flip
            };
          }).filter(Boolean);
          for (const variant of expandSquareRotations(ordered)) {
            for (let i = 0; i < n; i++) {
              merged[i].push({ mx: variant[i].mx, my: variant[i].my, r: variant[i].r, flip: !!variant[i].flip });
            }
          }
        }
        for (let i = 0; i < n; i++) per[i] = dedupeTargets(merged[i]);
      } else {
        for (let s = 0; s < act.solutions.length; s++) {
          const sol = act.solutions[s];
          const byId = Object.fromEntries(sol.map(row => [row.id, row]));
          for (let i = 0; i < n; i++) {
            const row = byId[pieceIds[i]];
            if (!row) continue;
            per[i].push({ mx: row.mx, my: row.my, r: row.r, flip: !!row.flip });
          }
        }
        for (let i = 0; i < n; i++) per[i] = dedupeTargets(per[i]);
      }
      return mergeInterchangeableTanTargets(act, per);
    }

    const snaps = act.snaps;
    const ns = snaps.length;
    if (act.flex === 'square4') {
      const vars = expandSquareRotations(snaps);
      for (const variant of vars) {
        for (let i = 0; i < ns; i++) per[i].push({ mx: variant[i].mx, my: variant[i].my, r: variant[i].r, flip: !!variant[i].flip });
      }
    } else if (act.flex === 'triangle2') {
      const vars = expandTriangleTargets(snaps);
      for (const variant of vars) {
        for (let i = 0; i < ns; i++) per[i].push({ mx: variant[i].mx, my: variant[i].my, r: variant[i].r, flip: !!variant[i].flip });
      }
    } else {
      for (let i = 0; i < ns; i++) per[i].push({ mx: snaps[i].mx, my: snaps[i].my, r: snaps[i].r, flip: !!snaps[i].flip });
    }
    return mergeInterchangeableTanTargets(act, per);
  }

  let activityId = 'square';
  let pieces = [];
  let pieceTargets = [];
  let selected = null;
  let dragging = null;
  /** Awaiting tap vs drag: piece brought to front; drag starts after hold timer or slop. */
  let pointerPending = null;
  let pointerHoldTimer = null;
  let dragOff = { dx: 0, dy: 0 };
  let completed = false;
  let wonPlayed = false;
  let winUiShown = false;

  function hideWinCelebration() {
    if (!winOverlay) return;
    winOverlay.hidden = true;
    winOverlay.setAttribute('aria-hidden', 'true');
    if (winConfetti) winConfetti.innerHTML = '';
  }

  function burstConfetti() {
    if (!winConfetti) return;
    winConfetti.innerHTML = '';
    const colors = ['#7c3aed', '#6366f1', '#22c55e', '#f59e0b', '#ec4899', '#0ea5e9', '#db2777', '#14b8a6', '#eab308'];
    const n = 72;
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      d.className = 'confetti-bit' + (Math.random() > 0.55 ? ' round' : '');
      d.style.setProperty('--cx', (Math.random() * 0.92 + 0.04).toFixed(3));
      d.style.setProperty('--tx', ((Math.random() - 0.5) * 70).toFixed(1) + 'vw');
      d.style.setProperty('--bg', colors[i % colors.length]);
      d.style.setProperty('--delay', (Math.random() * 0.35).toFixed(2) + 's');
      d.style.setProperty('--dur', (1.85 + Math.random() * 0.9).toFixed(2) + 's');
      winConfetti.appendChild(d);
    }
  }

  function showWinCelebration() {
    if (!winOverlay) return;
    winOverlay.hidden = false;
    winOverlay.setAttribute('aria-hidden', 'false');
    burstConfetti();
    const again = document.getElementById('btn-play-again');
    if (again) {
      try { again.focus({ preventScroll: true }); } catch (_) { again.focus(); }
    }
  }

  function currentActivity() {
    return ACTIVITIES.find(a => a.id === activityId) || ACTIVITIES[0];
  }

  function snapShape(snap) {
    return snap.shape || snap.id;
  }

  function buildPiecesFromActivity() {
    const act = currentActivity();
    pieceTargets = buildTargetsForActivity(act);
    const bySnapId = Object.fromEntries((act.snaps || []).map(s => [s.id, s]));
    pieces = act.pieceIds.map((pid, i) => {
      const snapRow = bySnapId[pid] || act.snaps[i];
      const shape = snapShape(snapRow);
      const def = resolveTanDef(act, shape);
      if (!def) {
        console.warn('Unknown tangram shape:', shape);
        return null;
      }
      return {
        tanId: shape,
        color: def.color,
        para: def.para,
        local: def.local.map(p => [p[0], p[1]]),
        targets: pieceTargets[i],
        x: 0,
        y: 0,
        r: 0,
        flip: false,
        snapped: false,
        snapIndex: 0
      };
    }).filter(Boolean);
    scatterPieces(true);
  }

  function scatterPieces(silent) {
    const n = pieces.length;
    for (let i = 0; i < n; i++) {
      const t = i / Math.max(n - 1, 1);
      const px = TRAY.x0 + (TRAY.x1 - TRAY.x0) * (0.15 + 0.7 * t);
      const py = TRAY.y0 + (TRAY.y1 - TRAY.y0) * (0.2 + 0.6 * ((i * 37) % 100) / 100);
      pieces[i].x = px;
      pieces[i].y = py;
      pieces[i].r = snapAngle([0, 45, -45, 90, 135, 180, 225][i % 7]);
      pieces[i].flip = false;
      pieces[i].snapped = false;
      pieces[i].snapIndex = 0;
    }
    completed = false;
    wonPlayed = false;
    winUiShown = false;
    hideWinCelebration();
    document.getElementById('done-msg').textContent = '';
    selected = null;
    dragging = null;
    pointerPending = null;
    clearPointerHoldTimer();
    updateToolbar();
    if (!silent) playFlip();
    draw();
  }

  function snapAngle(r) {
    const el = document.getElementById('snap-ang');
    if (!el || !el.checked) return r;
    return Math.round(r / 45) * 45;
  }

  function playFlip() {
    const a = document.getElementById('snd-flip');
    a.currentTime = 0;
    a.play().catch(() => {});
  }

  function playWin() {
    const a = document.getElementById('snd-win');
    a.currentTime = 0;
    a.play().catch(() => {});
  }

  function angDist(a, b) {
    let d = Math.abs(a - b) % 360;
    if (d > 180) d = 360 - d;
    return d;
  }

  function pieceRotModFor(act) {
    return act && act.pieceRotMod && typeof act.pieceRotMod === 'object' ? act.pieceRotMod : {};
  }

  /** Smallest circular distance from pr to (tr + k·period) for integer k. */
  function minAngDistWithRotMod(pr, tr, tanId, act) {
    const period = pieceRotModFor(act)[tanId];
    if (period == null || period <= 0) return angDist(pr, tr);
    let best = 360;
    for (let k = -4; k <= 4; k++) {
      const d = angDist(pr, tr + k * period);
      if (d < best) best = d;
    }
    return best;
  }

  function nearestSnappedTargetR(pr, tr, tanId, act) {
    const period = pieceRotModFor(act)[tanId];
    if (period == null || period <= 0) return snapAngle(tr);
    let bestR = snapAngle(tr);
    let bestD = angDist(pr, bestR);
    for (let k = -4; k <= 4; k++) {
      const cand = snapAngle(tr + k * period);
      const d = angDist(pr, cand);
      if (d < bestD) {
        bestD = d;
        bestR = cand;
      }
    }
    return bestR;
  }

  function trySnapPiece(p) {
    const act = currentActivity();
    let best = null;
    let bestD = Infinity;
    for (let k = 0; k < p.targets.length; k++) {
      const t = p.targets[k];
      const px = MAT.x + t.mx;
      const py = MAT.y + t.my;
      const d = Math.hypot(p.x - px, p.y - py);
      if (d > SNAP_D) continue;
      if (minAngDistWithRotMod(p.r, t.r, p.tanId, act) > SNAP_A) continue;
      if (!!p.flip !== !!t.flip) continue;
      if (d < bestD) {
        bestD = d;
        best = { t, k, px, py };
      }
    }
    if (!best) return false;
    p.x = best.px;
    p.y = best.py;
    p.r = nearestSnappedTargetR(p.r, best.t.r, p.tanId, act);
    p.flip = best.t.flip;
    p.snapped = true;
    p.snapIndex = best.k;
    return true;
  }

  function checkWin() {
    if (pieces.every(p => p.snapped)) {
      completed = true;
      if (!wonPlayed) {
        wonPlayed = true;
        playWin();
      }
      if (!winUiShown) {
        winUiShown = true;
        showWinCelebration();
      }
    }
  }

  function globalToLocal(gx, gy, piece) {
    const dx = gx - piece.x, dy = gy - piece.y;
    const rad = -piece.r * Math.PI / 180;
    const c = Math.cos(rad), s = Math.sin(rad);
    let lx = dx * c - dy * s;
    let ly = dx * s + dy * c;
    if (piece.flip) lx = -lx;
    return [lx, ly];
  }

  function pointInPoly(lx, ly, local) {
    let inside = false;
    const n = local.length;
    for (let i = 0, j = n - 1; i < n; j = i++) {
      const xi = local[i][0], yi = local[i][1];
      const xj = local[j][0], yj = local[j][1];
      if ((yi > ly) !== (yj > ly) && lx < (xj - xi) * (ly - yi) / (yj - yi + 1e-9) + xi) inside = !inside;
    }
    return inside;
  }

  function hitTest(gx, gy) {
    for (let i = pieces.length - 1; i >= 0; i--) {
      const p = pieces[i];
      const [lx, ly] = globalToLocal(gx, gy, p);
      if (pointInPoly(lx, ly, p.local)) return p;
    }
    return null;
  }

  function beginMatClip(act) {
    ctx.save();
    ctx.beginPath();
    if (act.matShape === 'triangle') {
      ctx.moveTo(MAT.x, MAT.y);
      ctx.lineTo(MAT.x + MAT.w, MAT.y);
      ctx.lineTo(MAT.x, MAT.y + MAT.h);
      ctx.closePath();
    } else if (act.matShape === 'house') {
      const inset = 95 * LAYOUT_SCALE;
      const roofL = MAT.x + inset;
      const roofR = MAT.x + MAT.w - inset;
      const roofY = MAT.y + 38 * LAYOUT_SCALE;
      const eaveY = MAT.y + 188 * LAYOUT_SCALE;
      ctx.moveTo(MAT.x, eaveY);
      ctx.lineTo(MAT.x, MAT.y + MAT.h);
      ctx.lineTo(MAT.x + MAT.w, MAT.y + MAT.h);
      ctx.lineTo(MAT.x + MAT.w, eaveY);
      ctx.lineTo(roofR, eaveY);
      ctx.lineTo(MAT.x + MAT.w / 2, roofY);
      ctx.lineTo(roofL, eaveY);
      ctx.closePath();
    } else {
      ctx.rect(MAT.x, MAT.y, MAT.w, MAT.h);
    }
    ctx.clip();
  }

  function drawMatBorder(act) {
    ctx.save();
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 2.5 * LAYOUT_SCALE;
    ctx.beginPath();
    if (act.matShape === 'triangle') {
      ctx.moveTo(MAT.x, MAT.y);
      ctx.lineTo(MAT.x + MAT.w, MAT.y);
      ctx.lineTo(MAT.x, MAT.y + MAT.h);
      ctx.closePath();
    } else if (act.matShape === 'house') {
      const inset = 95 * LAYOUT_SCALE;
      const roofL = MAT.x + inset;
      const roofR = MAT.x + MAT.w - inset;
      const roofY = MAT.y + 38 * LAYOUT_SCALE;
      const eaveY = MAT.y + 188 * LAYOUT_SCALE;
      ctx.moveTo(MAT.x, eaveY);
      ctx.lineTo(MAT.x, MAT.y + MAT.h);
      ctx.lineTo(MAT.x + MAT.w, MAT.y + MAT.h);
      ctx.lineTo(MAT.x + MAT.w, eaveY);
      ctx.lineTo(roofR, eaveY);
      ctx.lineTo(MAT.x + MAT.w / 2, roofY);
      ctx.lineTo(roofL, eaveY);
      ctx.closePath();
    } else {
      ctx.rect(MAT.x, MAT.y, MAT.w, MAT.h);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawHouseGuideOutline() {
    const S = LAYOUT_SCALE;
    ctx.save();
    ctx.translate(MAT.x, MAT.y);
    ctx.strokeStyle = 'rgba(100, 116, 139, 0.55)';
    ctx.lineWidth = 2 * S;
    ctx.setLineDash([8 * S, 6 * S]);
    ctx.beginPath();
    ctx.rect(40 * S, 195 * S, 320 * S, 185 * S);
    ctx.moveTo(100 * S, 195 * S);
    ctx.lineTo(300 * S, 195 * S);
    ctx.lineTo(200 * S, 35 * S);
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawPieceOutlineMat(snap, style) {
    ctx.save();
    ctx.translate(MAT.x, MAT.y);
    ctx.translate(snap.mx, snap.my);
    ctx.rotate(snap.r * Math.PI / 180);
    if (snap.flip) ctx.scale(-1, 1);
    const act = currentActivity();
    const def = resolveTanDef(act, snapShape(snap));
    if (!def) return;
    const v = def.local;
    ctx.beginPath();
    ctx.moveTo(v[0][0], v[0][1]);
    for (let i = 1; i < v.length; i++) ctx.lineTo(v[i][0], v[i][1]);
    ctx.closePath();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.lineWidth;
    ctx.setLineDash(style.dash);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawFilledPiece(p, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r * Math.PI / 180);
    if (p.flip) ctx.scale(-1, 1);
    ctx.beginPath();
    const v = p.local;
    ctx.moveTo(v[0][0], v[0][1]);
    for (let i = 1; i < v.length; i++) ctx.lineTo(v[i][0], v[i][1]);
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.lineWidth = selected === p ? 3 * LAYOUT_SCALE : 1.5 * LAYOUT_SCALE;
    ctx.strokeStyle = selected === p ? '#1e1b4b' : 'rgba(30,27,59,0.35)';
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const act = currentActivity();

    ctx.fillStyle = '#e8eef5';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    beginMatClip(act);
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(MAT.x, MAT.y, MAT.w, MAT.h);
    ctx.restore();
    drawMatBorder(act);

    if (act.matShape === 'house') drawHouseGuideOutline();

    const dashStyle = {
      color: 'rgba(71, 85, 105, 0.92)',
      lineWidth: 2.5 * LAYOUT_SCALE,
      dash: [10 * LAYOUT_SCALE, 7 * LAYOUT_SCALE]
    };
    const shown = new Set();
    for (let i = 0; i < act.snaps.length; i++) {
      const s = act.snaps[i];
      const key = snapShape(s) + '|' + s.mx + '|' + s.my + '|' + s.r + '|' + s.flip;
      if (shown.has(key)) continue;
      shown.add(key);
      drawPieceOutlineMat(act.snaps[i], dashStyle);
    }

    pieces.forEach(p => drawFilledPiece(p, 1));

    const hintControls =
      ' Tap a piece to rotate 45°. Press and hold, or drag, to move.';
    document.getElementById('help-text').textContent = act.help + hintControls;
  }

  function updateToolbar() {
    const flipBtn = document.getElementById('btn-flip');
    const showFlip = !!(selected && selected.para);
    flipBtn.hidden = !showFlip;
    flipBtn.disabled = !showFlip;
  }

  function setActivity(id) {
    hideWinCelebration();
    winUiShown = false;
    wonPlayed = false;
    activityId = id;
    document.querySelectorAll('#puzzle-row button').forEach(b => {
      b.setAttribute('aria-pressed', b.dataset.act === id ? 'true' : 'false');
    });
    buildPiecesFromActivity();
  }

  function buildNav() {
    const row = document.getElementById('puzzle-row');
    row.innerHTML = '';
    for (const a of ACTIVITIES) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = a.label;
      b.dataset.act = a.id;
      b.setAttribute('aria-pressed', a.id === activityId ? 'true' : 'false');
      b.addEventListener('click', () => setActivity(a.id));
      row.appendChild(b);
    }
  }

  function canvasCoords(ev) {
    const r = canvas.getBoundingClientRect();
    return [
      (ev.clientX - r.left) * (W / r.width),
      (ev.clientY - r.top) * (H / r.height)
    ];
  }

  const TAP_ROTATE_MAX_MS = 420;
  const HOLD_TO_DRAG_MS = 280;

  function inputNow() {
    return typeof performance !== 'undefined' && performance.now ? performance.now() : Date.now();
  }

  function canvasDragSlop() {
    const r = canvas.getBoundingClientRect();
    return Math.max(10 * LAYOUT_SCALE, 14 * (W / Math.max(r.width, 1)));
  }

  function clearPointerHoldTimer() {
    if (pointerHoldTimer != null) {
      clearTimeout(pointerHoldTimer);
      pointerHoldTimer = null;
    }
  }

  function beginPieceDrag(piece, cx, cy) {
    clearPointerHoldTimer();
    pointerPending = null;
    const z = pieces.indexOf(piece);
    if (z >= 0) {
      pieces.splice(z, 1);
      pieces.push(piece);
    }
    dragOff.dx = cx - piece.x;
    dragOff.dy = cy - piece.y;
    dragging = piece;
  }

  function rotatePieceOnTap(piece) {
    piece.r = snapAngle(piece.r + 45);
    piece.snapped = false;
    playFlip();
  }

  function onDown(ev) {
    ev.preventDefault();
    clearPointerHoldTimer();
    pointerPending = null;
    const [cx, cy] = canvasCoords(ev);
    const hit = hitTest(cx, cy);
    selected = hit;
    if (hit) {
      try { canvas.setPointerCapture(ev.pointerId); } catch (_) {}
      const z = pieces.indexOf(hit);
      pieces.splice(z, 1);
      pieces.push(hit);
      const t0 = inputNow();
      pointerPending = {
        piece: hit,
        startT: t0,
        sx: cx,
        sy: cy,
        lx: cx,
        ly: cy
      };
      pointerHoldTimer = setTimeout(() => {
        pointerHoldTimer = null;
        if (!pointerPending || dragging) return;
        const pp = pointerPending;
        beginPieceDrag(pp.piece, pp.lx, pp.ly);
      }, HOLD_TO_DRAG_MS);
    } else {
      dragging = null;
    }
    updateToolbar();
    draw();
  }

  function onMove(ev) {
    const [cx, cy] = canvasCoords(ev);
    if (pointerPending && !dragging) {
      pointerPending.lx = cx;
      pointerPending.ly = cy;
      const slop = canvasDragSlop();
      const dx = cx - pointerPending.sx;
      const dy = cy - pointerPending.sy;
      if (dx * dx + dy * dy > slop * slop) beginPieceDrag(pointerPending.piece, cx, cy);
    }
    if (!dragging) return;
    ev.preventDefault();
    let nx = cx - dragOff.dx;
    let ny = cy - dragOff.dy;
    nx = Math.max(PIECE_EDGE, Math.min(W - PIECE_EDGE, nx));
    ny = Math.max(PIECE_EDGE, Math.min(H - PIECE_EDGE, ny));
    dragging.x = nx;
    dragging.y = ny;
    dragging.snapped = false;
    draw();
  }

  function onUp(ev) {
    clearPointerHoldTimer();
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
    if (dragging) {
      const snapped = trySnapPiece(dragging);
      if (snapped) playFlip();
      dragging = null;
      pointerPending = null;
      checkWin();
    } else if (pointerPending) {
      const pp = pointerPending;
      pointerPending = null;
      const dt = inputNow() - pp.startT;
      const dx = pp.lx - pp.sx;
      const dy = pp.ly - pp.sy;
      const slop = canvasDragSlop();
      if (dt <= TAP_ROTATE_MAX_MS && dx * dx + dy * dy <= slop * slop) {
        selected = pp.piece;
        rotatePieceOnTap(pp.piece);
      }
    }
    draw();
  }

  function onCancel(ev) {
    clearPointerHoldTimer();
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
    pointerPending = null;
    if (dragging) {
      trySnapPiece(dragging);
      checkWin();
      dragging = null;
    }
    draw();
  }

  document.getElementById('btn-scatter').addEventListener('click', () => scatterPieces(false));
  document.getElementById('btn-play-again').addEventListener('click', () => scatterPieces(false));
  document.getElementById('btn-flip').addEventListener('click', () => {
    if (!selected || !selected.para) return;
    selected.flip = !selected.flip;
    selected.snapped = false;
    playFlip();
    draw();
  });

  canvas.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onCancel);

  function startTangrams() {
    buildNav();
    setActivity(activityId);
  }

  function readEmbeddedTangramDoc() {
    const el = document.getElementById('tangram-embedded-data');
    if (!el) return null;
    const raw = el.textContent.trim();
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch (e) {
      console.warn('tangram embedded JSON parse failed', e);
      return null;
    }
  }

  function applyTangramDoc(doc, animalsBundle) {
    const base = (doc.puzzles || []).map(normalizePuzzleFromFile).map(p => scaleLoadedPuzzleLayout(p, LAYOUT_SCALE));
    const extra = (animalsBundle ? snapshotBundleToPuzzles(animalsBundle) : []).map(p => scaleLoadedPuzzleLayout(p, LAYOUT_SCALE));
    const list = base.concat(extra);
    if (!list.length) throw new Error('empty puzzles');
    ACTIVITIES = list;
    activityId = ACTIVITIES[0].id;
    const edge = computePieceEdgeForActivities(ACTIVITIES);
    syncLayoutFromEdge(edge);
  }

  function readEmbeddedAnimalsDoc() {
    const el = document.getElementById('tangram-animals-embedded-data');
    if (!el) return null;
    const raw = el.textContent.trim();
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch (e) {
      console.warn('tangram animals embedded JSON parse failed', e);
      return null;
    }
  }

  function loadAnimalsBundle() {
    return fetch('tangram_animals.json')
      .then(r => (r.ok ? r.json() : null))
      .catch(() => null)
      .then(b => b || readEmbeddedAnimalsDoc());
  }

  fetch('tangram_data.json')
    .then(r => (r.ok ? r.json() : Promise.reject(new Error('bad status'))))
    .then(doc => {
      if (!doc.puzzles || !doc.puzzles.length) throw new Error('empty puzzles');
      return loadAnimalsBundle().then(anim => ({ doc, anim }));
    })
    .then(({ doc, anim }) => applyTangramDoc(doc, anim))
    .catch(() => {
      const emb = readEmbeddedTangramDoc();
      const anim = readEmbeddedAnimalsDoc();
      if (emb && emb.puzzles && emb.puzzles.length) {
        try {
          applyTangramDoc(emb, anim);
          return;
        } catch (e2) {
          console.warn('embedded tangram apply failed', e2);
        }
      }
      ACTIVITIES = DEFAULT_ACTIVITIES.slice();
      activityId = 'square';
      syncLayoutFromEdge(computePieceEdgeForActivities(ACTIVITIES));
    })
    .finally(() => startTangrams());
})();
  </script>
</body>
