<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shadow Match</title>
  <link rel="stylesheet" href="../_ios_compat.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 45%, #cbd5e1 100%);
      min-height: 100dvh;
      padding: 1rem 1rem 2rem;
      touch-action: pan-y;
    }

    header {
      max-width: 720px;
      margin: 0 auto 0.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn {
      text-decoration: none;
      background: #fff;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .score-badge {
      background: #fff;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: #334155;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      color: #1e293b;
      margin-bottom: 0.1rem;
      text-shadow: 1px 2px 0 rgba(255,255,255,0.6);
    }

    .subtitle {
      font-size: clamp(0.82rem, 3.2vw, 0.95rem);
      color: #475569;
      margin-bottom: 0.3rem;
    }

    .round-label {
      font-size: clamp(0.7rem, 2.4vw, 0.85rem);
      color: #64748b;
      margin-bottom: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-track {
      background: #e2e8f0;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(to right, #64748b, #334155);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .question-row {
      background: #f1f5f9;
      border: 2px solid #cbd5e1;
      border-radius: 16px;
      padding: 0.55rem 1rem;
      margin-bottom: 0.65rem;
      font-size: clamp(0.95rem, 3.8vw, 1.15rem);
      font-weight: 800;
      color: #1e293b;
      line-height: 1.35;
    }

    .play-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      border: 2px solid #e2e8f0;
      padding: 0.65rem 0.75rem 0.85rem;
      margin-bottom: 0.65rem;
    }

    .dock-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    .dock {
      position: relative;
      min-height: clamp(140px, 32vh, 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
      margin-bottom: 0.75rem;
    }

    #piece-host {
      position: relative;
      width: min(160px, 42vw);
      height: min(160px, 42vw);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
      z-index: 5;
    }

    #piece-host:active { cursor: grabbing; }

    #piece-host.is-dragging {
      cursor: grabbing;
      z-index: 2000;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25));
    }

    #piece-host.is-locked {
      pointer-events: none;
      cursor: default;
      opacity: 0.35;
    }

    #piece-host svg {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .shadow-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    .shadow-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 440px;
      margin: 0 auto;
    }

    .shadow-slot {
      min-height: clamp(100px, 22vh, 130px);
      border-radius: 16px;
      border: 3px dashed #94a3b8;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .shadow-slot svg {
      width: min(88px, 22vw);
      height: auto;
      max-height: min(100px, 20vh);
      display: block;
      pointer-events: none;
    }

    .shadow-slot.is-over {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .shadow-slot.state-wrong {
      animation: slotShake 0.4s ease;
      border-color: #f87171;
      background: #fff5f5;
    }

    .shadow-slot.state-correct {
      border-style: solid;
      border-color: #22c55e;
      background: #f0fdf4;
    }

    @keyframes slotShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .feedback {
      min-height: 2rem;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 800;
    }
    .feedback.correct { color: #15803d; }
    .feedback.wrong   { color: #dc2626; }
    .feedback.hint    { color: #475569; }

    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .win-overlay.show { opacity: 1; pointer-events: auto; }

    .win-card {
      background: #fff;
      border-radius: 26px;
      padding: 2rem 1.6rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      animation: popCard 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popCard {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-emoji  { font-size: 3rem; margin-bottom: 0.4rem; }
    .win-title  { font-size: clamp(1.3rem,5vw,1.7rem); font-weight: 800; color: #1f2937; margin-bottom: 0.4rem; }
    .win-score  { font-size: 1rem; color: #6b7280; margin-bottom: 1.2rem; }

    .replay-btn {
      background: linear-gradient(135deg, #475569, #1e293b);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 50px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      transition: transform 0.12s;
    }
    .replay-btn:hover  { transform: translateY(-2px); }
    .replay-btn:active { transform: scale(0.96); }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2500;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      body {
        padding: 0.35rem 0.35rem 0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        overscroll-behavior-y: none;
      }
      header { flex-shrink: 0; margin-bottom: 0.25rem; }
      .back-btn, .score-badge {
        min-height: 38px;
        padding: 0.3rem 0.7rem;
        font-size: 0.82rem;
        border-radius: 10px;
      }
      main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      h1 { font-size: 1rem; margin-bottom: 0; }
      .subtitle { font-size: 0.68rem; margin-bottom: 0.1rem; }
      .round-label { font-size: 0.62rem; margin-bottom: 0.15rem; }
      .progress-track { height: 6px; margin-bottom: 0.22rem; flex-shrink: 0; }
      .question-row {
        flex-shrink: 0;
        padding: 0.28rem 0.65rem;
        margin-bottom: 0.22rem;
        font-size: clamp(0.82rem, 3.4vw, 0.95rem);
      }
      .play-card {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        margin-bottom: 0.2rem;
        padding: 0.45rem 0.5rem 0.55rem;
        overflow: hidden;
      }
      .dock {
        flex: 1;
        min-height: 0;
        margin-bottom: 0.45rem;
      }
      #piece-host {
        width: min(150px, 40vw);
        height: min(150px, 40vw);
      }
      .shadow-grid {
        flex-shrink: 0;
        gap: 6px;
      }
      .shadow-slot { min-height: 0; padding: 0.25rem; }
      .feedback {
        flex-shrink: 0;
        min-height: 1.3rem;
        font-size: 0.88rem;
        padding-bottom: env(safe-area-inset-bottom, 0.25rem);
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html#map" class="back-btn">← Back</a>
    <div class="score-badge"><span id="score-val">0</span> / 8</div>
  </header>

  <main>
    <h1>Shadow Match</h1>
    <p class="subtitle">Drag the bright shape onto its black shadow.</p>
    <p class="round-label" id="round-label">Round 1 of 8</p>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="question-row" id="question-row">Use your finger or mouse — drag and let go on the matching shadow.</div>

    <div class="play-card">
      <div class="dock-label">Your shape</div>
      <div class="dock" id="dock">
        <div id="piece-host" aria-grabbed="false" role="img" aria-label="Draggable 3D shape">
          <!-- SVG injected -->
        </div>
      </div>
      <div class="shadow-label">Shadows</div>
      <div class="shadow-grid" id="shadow-grid"></div>
    </div>

    <div class="feedback hint" id="feedback" aria-live="polite"></div>
  </main>

  <div class="confetti-layer" id="confetti-layer"></div>

  <div class="win-overlay" id="win-overlay" role="dialog" aria-modal="true" aria-labelledby="win-title-el">
    <div class="win-card">
      <div class="win-emoji" id="win-emoji">★</div>
      <div class="win-title" id="win-title-el">Amazing!</div>
      <div class="win-score" id="win-score-msg"></div>
      <button class="replay-btn" onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    const TOTAL = 8;
    const KINDS = ['circle', 'square', 'triangle', 'diamond', 'star', 'heart', 'hexagon'];

    let gid = 0;

    const SFX = {
      match: new Audio('../sounds/match.mp3'),
      win:   new Audio('../sounds/win.mp3'),
    };
    function playSound(name) {
      const s = SFX[name];
      if (!s) return;
      s.currentTime = 0;
      s.play().catch(() => {});
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function starPoints(cx, cy, outer, inner, n) {
      const pts = [];
      for (let i = 0; i < n * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const ang = (-Math.PI / 2) + (i * Math.PI) / n;
        pts.push(`${cx + r * Math.cos(ang)},${cy + r * Math.sin(ang)}`);
      }
      return pts.join(' ');
    }

    function ngonPoints(cx, cy, R, n) {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const ang = (-Math.PI / 2) + (i * 2 * Math.PI) / n;
        pts.push(`${cx + R * Math.cos(ang)},${cy + R * Math.sin(ang)}`);
      }
      return pts.join(' ');
    }

    function appendShapeGeometry(parent, kind, fillAttr, stroke, sw) {
      let el;
      if (kind === 'circle') {
        el = document.createElementNS(NS, 'circle');
        el.setAttribute('cx', '50'); el.setAttribute('cy', '50'); el.setAttribute('r', '38');
      } else if (kind === 'square') {
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x', '14'); el.setAttribute('y', '14');
        el.setAttribute('width', '72'); el.setAttribute('height', '72');
      } else if (kind === 'triangle') {
        el = document.createElementNS(NS, 'polygon');
        el.setAttribute('points', '50,12 90,88 10,88');
      } else if (kind === 'diamond') {
        el = document.createElementNS(NS, 'polygon');
        el.setAttribute('points', '50,8 92,50 50,92 8,50');
      } else if (kind === 'star') {
        el = document.createElementNS(NS, 'polygon');
        el.setAttribute('points', starPoints(50, 50, 40, 16, 5));
      } else if (kind === 'heart') {
        el = document.createElementNS(NS, 'path');
        el.setAttribute('d', 'M50,90 C20,58 10,42 22,30 C30,18 40,20 50,36 C60,20 70,18 78,30 C90,42 80,58 50,90 Z');
      } else if (kind === 'hexagon') {
        el = document.createElementNS(NS, 'polygon');
        el.setAttribute('points', ngonPoints(50, 50, 38, 6));
      } else {
        el = document.createElementNS(NS, 'circle');
        el.setAttribute('cx', '50'); el.setAttribute('cy', '50'); el.setAttribute('r', '38');
      }
      el.setAttribute('fill', fillAttr);
      el.setAttribute('stroke', stroke);
      el.setAttribute('stroke-width', sw);
      el.setAttribute('stroke-linejoin', 'round');
      parent.appendChild(el);
      return el;
    }

    const GRAD_STOPS = {
      circle:   [['#93c5fd', 0], ['#2563eb', 0.5], ['#1e3a8a', 1]],
      square:   [['#fca5a5', 0], ['#dc2626', 0.55], ['#7f1d1d', 1]],
      triangle: [['#86efac', 0], ['#16a34a', 0.5], ['#14532d', 1]],
      diamond:  [['#d8b4fe', 0], ['#9333ea', 0.5], ['#581c87', 1]],
      star:     [['#fde047', 0], ['#eab308', 0.45], ['#a16207', 1]],
      heart:    [['#fda4af', 0], ['#f43f5e', 0.5], ['#9f1239', 1]],
      hexagon:  [['#67e8f9', 0], ['#0891b2', 0.5], ['#164e63', 1]],
    };

    function build3DPiece(kind) {
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('xmlns', NS);
      const id = 'g3d-' + (++gid);
      const defs = document.createElementNS(NS, 'defs');
      const lg = document.createElementNS(NS, 'linearGradient');
      lg.setAttribute('id', id);
      lg.setAttribute('x1', '0'); lg.setAttribute('y1', '0');
      lg.setAttribute('x2', '1'); lg.setAttribute('y2', '1');
      (GRAD_STOPS[kind] || GRAD_STOPS.circle).forEach(([c, o]) => {
        const s = document.createElementNS(NS, 'stop');
        s.setAttribute('offset', `${o * 100}%`);
        s.setAttribute('stop-color', c);
        lg.appendChild(s);
      });
      defs.appendChild(lg);
      svg.appendChild(defs);

      const g = document.createElementNS(NS, 'g');
      appendShapeGeometry(g, kind, `url(#${id})`, '#0f172a', '2.8');

      const hi = document.createElementNS(NS, 'ellipse');
      hi.setAttribute('cx', '38'); hi.setAttribute('cy', '36');
      hi.setAttribute('rx', '18'); hi.setAttribute('ry', '11');
      hi.setAttribute('fill', 'rgba(255,255,255,0.42)');
      hi.setAttribute('pointer-events', 'none');
      g.appendChild(hi);

      svg.appendChild(g);
      return svg;
    }

    function buildShadowSilhouette(kind) {
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('xmlns', NS);
      const g = document.createElementNS(NS, 'g');
      appendShapeGeometry(g, kind, '#0a0a0a', '#000000', '1.5');
      svg.appendChild(g);
      return svg;
    }

    let round = 0;
    let score = 0;
    let answerKind = '';
    let slotEls = [];
    let dragging = false;
    let grabDx = 0;
    let grabDy = 0;
    let homeLeft = 0;
    let homeTop = 0;
    let homeW = 0;
    let homeH = 0;
    let locked = false;
    let activePointerId = null;

    const pieceHost = document.getElementById('piece-host');
    const dock = document.getElementById('dock');
    const shadowGrid = document.getElementById('shadow-grid');

    function setFeedback(text, cls) {
      const fb = document.getElementById('feedback');
      fb.textContent = text;
      fb.className = 'feedback ' + (cls || 'hint');
    }

    function placePieceHome() {
      pieceHost.classList.remove('is-dragging');
      pieceHost.style.position = '';
      pieceHost.style.left = '';
      pieceHost.style.top = '';
      pieceHost.style.width = '';
      pieceHost.style.height = '';
      pieceHost.style.transform = '';
    }

    function rememberHomeRect() {
      const r = pieceHost.getBoundingClientRect();
      homeLeft = r.left;
      homeTop = r.top;
      homeW = r.width;
      homeH = r.height;
    }

    function onPointerDown(e) {
      if (locked || dragging) return;
      if (e.button !== undefined && e.button !== 0) return;
      e.preventDefault();
      dragging = true;
      activePointerId = e.pointerId;
      pieceHost.setPointerCapture(e.pointerId);
      pieceHost.classList.add('is-dragging');
      pieceHost.setAttribute('aria-grabbed', 'true');

      const r = pieceHost.getBoundingClientRect();
      grabDx = e.clientX - r.left;
      grabDy = e.clientY - r.top;
      homeLeft = r.left;
      homeTop = r.top;
      homeW = r.width;
      homeH = r.height;

      pieceHost.style.position = 'fixed';
      pieceHost.style.width = `${homeW}px`;
      pieceHost.style.height = `${homeH}px`;
      pieceHost.style.left = `${e.clientX - grabDx}px`;
      pieceHost.style.top = `${e.clientY - grabDy}px`;

      setFeedback('Drag over a shadow and let go.', 'hint');
    }

    function onPointerMove(e) {
      if (!dragging || e.pointerId !== activePointerId) return;
      e.preventDefault();
      pieceHost.style.left = `${e.clientX - grabDx}px`;
      pieceHost.style.top = `${e.clientY - grabDy}px`;

      let over = null;
      const cx = e.clientX;
      const cy = e.clientY;
      slotEls.forEach((slot) => {
        const r = slot.getBoundingClientRect();
        const inside = cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom;
        slot.classList.toggle('is-over', inside);
        if (inside) over = slot;
      });
    }

    function snapHome() {
      placePieceHome();
      rememberHomeRect();
    }

    function onPointerUp(e) {
      if (!dragging || e.pointerId !== activePointerId) return;
      e.preventDefault();
      dragging = false;
      activePointerId = null;
      try {
        pieceHost.releasePointerCapture(e.pointerId);
      } catch (err) { /* ignore */ }

      slotEls.forEach((s) => s.classList.remove('is-over'));

      const cx = e.clientX;
      const cy = e.clientY;
      let hit = null;
      slotEls.forEach((slot) => {
        const r = slot.getBoundingClientRect();
        if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) hit = slot;
      });

      pieceHost.classList.remove('is-dragging');
      pieceHost.setAttribute('aria-grabbed', 'false');

      if (!hit) {
        snapHome();
        setFeedback('Drop on one of the shadows.', 'hint');
        return;
      }

      const k = hit.dataset.kind;
      if (k === answerKind) {
        locked = true;
        playSound('match');
        hit.classList.add('state-correct');
        pieceHost.classList.add('is-locked');
        const hr = hit.getBoundingClientRect();
        pieceHost.style.position = 'fixed';
        pieceHost.style.width = `${homeW}px`;
        pieceHost.style.height = `${homeH}px`;
        pieceHost.style.left = `${hr.left + hr.width / 2 - homeW / 2}px`;
        pieceHost.style.top = `${hr.top + hr.height / 2 - homeH / 2}px`;
        pieceHost.style.transform = 'scale(0.92)';
        pieceHost.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
        pieceHost.style.opacity = '0.25';

        setFeedback('Perfect match!', 'correct');
        score++;
        document.getElementById('score-val').textContent = score;

        setTimeout(() => {
          round++;
          if (round >= TOTAL) showWinScreen();
          else renderRound();
        }, 1100);
      } else {
        hit.classList.add('state-wrong');
        setFeedback('Not that shadow — try again!', 'wrong');
        snapHome();
        setTimeout(() => {
          hit.classList.remove('state-wrong');
          setFeedback('Drag the shape onto the matching shadow.', 'hint');
        }, 450);
      }
    }

    function onPointerCancel(e) {
      if (e.pointerId !== activePointerId) return;
      dragging = false;
      activePointerId = null;
      slotEls.forEach((s) => s.classList.remove('is-over'));
      pieceHost.classList.remove('is-dragging');
      pieceHost.setAttribute('aria-grabbed', 'false');
      snapHome();
      setFeedback('Drag the shape onto the matching shadow.', 'hint');
    }

    function renderRound() {
      locked = false;
      pieceHost.style.opacity = '';
      pieceHost.style.transition = '';
      pieceHost.style.transform = '';
      answerKind = pick(KINDS);
      const wrong = shuffle(KINDS.filter((k) => k !== answerKind)).slice(0, 3);
      const four = shuffle([answerKind, ...wrong]);

      document.getElementById('round-label').textContent =
        `Round ${round + 1} of ${TOTAL}`;
      document.getElementById('progress-fill').style.width =
        `${(round / TOTAL) * 100}%`;

      pieceHost.classList.remove('is-locked', 'is-dragging');
      pieceHost.style.transition = '';
      pieceHost.style.opacity = '';
      pieceHost.style.transform = '';
      placePieceHome();
      pieceHost.innerHTML = '';
      pieceHost.appendChild(build3DPiece(answerKind));

      shadowGrid.innerHTML = '';
      slotEls = [];
      four.forEach((kind) => {
        const slot = document.createElement('div');
        slot.className = 'shadow-slot';
        slot.dataset.kind = kind;
        slot.appendChild(buildShadowSilhouette(kind));
        shadowGrid.appendChild(slot);
        slotEls.push(slot);
      });

      requestAnimationFrame(() => rememberHomeRect());

      setFeedback('Drag the bright shape onto its black shadow.', 'hint');
    }

    pieceHost.addEventListener('pointerdown', onPointerDown);
    pieceHost.addEventListener('pointermove', onPointerMove);
    pieceHost.addEventListener('pointerup', onPointerUp);
    pieceHost.addEventListener('pointercancel', onPointerCancel);

    window.addEventListener('resize', () => {
      if (!dragging && !locked) rememberHomeRect();
    });

    function showWinScreen() {
      document.getElementById('progress-fill').style.width = '100%';
      playSound('win');
      const emojiEl = document.getElementById('win-emoji');
      const titleEl = document.getElementById('win-title-el');
      const scoreEl = document.getElementById('win-score-msg');
      if (score >= TOTAL)  { emojiEl.textContent = '★★★'; titleEl.textContent = 'Shadow master!'; }
      else if (score >= 6) { emojiEl.textContent = '★★'; titleEl.textContent = 'Super matcher!'; }
      else if (score >= 4) { emojiEl.textContent = '★'; titleEl.textContent = 'Great matching!'; }
      else                 { emojiEl.textContent = ''; titleEl.textContent = 'Keep practising!'; }
      scoreEl.textContent = `You got ${score} out of ${TOTAL} right!`;
      document.getElementById('win-overlay').classList.add('show');
      launchConfetti();
    }

    function launchConfetti() {
      const style = document.createElement('style');
      style.textContent = `@keyframes confettiFall {
        0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
        100% { transform:translateY(105vh) rotate(540deg); opacity:0; }
      }`;
      document.head.appendChild(style);
      const layer = document.getElementById('confetti-layer');
      layer.innerHTML = '';
      const colors = ['#f87171','#fbbf24','#34d399','#60a5fa','#a78bfa','#94a3b8','#38bdf8'];
      for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        const size = 7 + Math.random() * 8;
        el.style.cssText = `
          position:absolute;left:${Math.random()*100}%;top:-20px;
          width:${size}px;height:${size}px;
          border-radius:${Math.random()>0.45?'50%':'2px'};
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation:confettiFall ${1.6+Math.random()*2.2}s ease-in ${Math.random()}s forwards;
        `;
        layer.appendChild(el);
      }
    }

    function restartGame() {
      round = 0;
      score = 0;
      document.getElementById('score-val').textContent = '0';
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('confetti-layer').innerHTML = '';
      renderRound();
    }

    restartGame();
  </script>
</body>
</html>
