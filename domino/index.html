<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Interactive 3D Black Domino</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffffff 0%, #eeeeee 62%, #d8d8d8 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #1a1a1a;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    p {
      margin: 3px 0;
      color: #555;
      font-size: 0.9rem;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="ui-overlay">
    <h1>Interactive 3D Domino</h1>
    <p>Classic black molded domino with white pips.</p>
    <p>Click/touch and drag to spin the tile.</p>
  </div>

  <script>
    // --------------------------------------------------
    // 1. Scene, camera, renderer
    // --------------------------------------------------

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 0.1, 5.2);

    const renderer = new THREE.WebGLRenderer({
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    if (THREE.sRGBEncoding) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }

    document.body.appendChild(renderer.domElement);

    // --------------------------------------------------
    // 2. Lighting
    // --------------------------------------------------

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.38);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.15);
    keyLight.position.set(4, 5, 6);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xbfd4ff, 0.35);
    fillLight.position.set(-4, 2, 3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.45);
    rimLight.position.set(-3, -2, -5);
    scene.add(rimLight);

    // --------------------------------------------------
    // 3. Drawing helpers
    // --------------------------------------------------

    function roundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawPip(ctx, x, y, radius) {
      const pocketGradient = ctx.createRadialGradient(
        x,
        y,
        radius * 0.15,
        x + 3,
        y + 4,
        radius + 9
      );

      pocketGradient.addColorStop(0, "#101010");
      pocketGradient.addColorStop(0.7, "#030303");
      pocketGradient.addColorStop(1, "#000000");

      ctx.fillStyle = pocketGradient;
      ctx.beginPath();
      ctx.arc(x + 3, y + 4, radius + 7, 0, Math.PI * 2);
      ctx.fill();

      const pipGradient = ctx.createRadialGradient(
        x - radius * 0.35,
        y - radius * 0.35,
        radius * 0.1,
        x,
        y,
        radius
      );

      pipGradient.addColorStop(0, "#ffffff");
      pipGradient.addColorStop(0.62, "#f4f4f4");
      pipGradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = pipGradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.50)";
      ctx.beginPath();
      ctx.arc(
        x - radius * 0.25,
        y - radius * 0.25,
        radius * 0.20,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawMoldedRoundedRect(ctx, x, y, w, h, r) {
      ctx.strokeStyle = "rgba(0,0,0,0.84)";
      ctx.lineWidth = 10;
      roundedRect(ctx, x + 2, y + 3, w, h, r);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.13)";
      ctx.lineWidth = 5;
      roundedRect(ctx, x - 1, y - 1, w, h, r);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.64)";
      ctx.lineWidth = 3;
      roundedRect(ctx, x + 10, y + 10, w - 20, h - 20, Math.max(4, r - 8));
      ctx.stroke();
    }

    // --------------------------------------------------
    // 4. Texture generators
    // --------------------------------------------------

    function createFrontTexture() {
      const width = 512;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const bodyGradient = ctx.createLinearGradient(0, 0, width, height);
      bodyGradient.addColorStop(0, "#242424");
      bodyGradient.addColorStop(0.38, "#111111");
      bodyGradient.addColorStop(1, "#030303");

      ctx.fillStyle = bodyGradient;
      ctx.fillRect(0, 0, width, height);

      const vignette = ctx.createRadialGradient(
        width / 2,
        height / 2,
        width * 0.18,
        width / 2,
        height / 2,
        height * 0.72
      );

      vignette.addColorStop(0, "rgba(255,255,255,0.045)");
      vignette.addColorStop(1, "rgba(0,0,0,0.50)");

      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);

      // Outer border
      drawMoldedRoundedRect(ctx, 28, 28, width - 56, height - 56, 42);

      // Each half gets its own raised/inset molded rectangle
      const marginX = 58;
      const topY = 70;
      const segmentW = width - marginX * 2;
      const segmentH = 390;
      const lowerY = height / 2 + 54;

      drawMoldedRoundedRect(ctx, marginX, topY, segmentW, segmentH, 26);
      drawMoldedRoundedRect(ctx, marginX, lowerY, segmentW, segmentH, 26);

      // Divider ridge/groove between segments
      const centerY = height / 2;

      ctx.strokeStyle = "rgba(255,255,255,0.13)";
      ctx.lineWidth = 13;
      ctx.beginPath();
      ctx.moveTo(52, centerY - 7);
      ctx.lineTo(width - 52, centerY - 7);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.92)";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(52, centerY + 2);
      ctx.lineTo(width - 52, centerY + 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.055)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(52, centerY + 10);
      ctx.lineTo(width - 52, centerY + 10);
      ctx.stroke();

      const pipRadius = 39;

      // Top half: one pip exactly centered
      drawPip(ctx, width / 2, topY + segmentH / 2, pipRadius);

      // Bottom half: two pips diagonal, centered as a cluster
      const lowerCenterX = width / 2;
      const lowerCenterY = lowerY + segmentH / 2;

      const diagonalOffsetX = 78;
      const diagonalOffsetY = 78;

      drawPip(
        ctx,
        lowerCenterX - diagonalOffsetX,
        lowerCenterY - diagonalOffsetY,
        pipRadius
      );

      drawPip(
        ctx,
        lowerCenterX + diagonalOffsetX,
        lowerCenterY + diagonalOffsetY,
        pipRadius
      );

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return texture;
    }

    function createBackTexture() {
      const width = 512;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const bodyGradient = ctx.createLinearGradient(0, 0, width, height);
      bodyGradient.addColorStop(0, "#252525");
      bodyGradient.addColorStop(0.45, "#101010");
      bodyGradient.addColorStop(1, "#030303");

      ctx.fillStyle = bodyGradient;
      ctx.fillRect(0, 0, width, height);

      const vignette = ctx.createRadialGradient(
        width / 2,
        height / 2,
        width * 0.15,
        width / 2,
        height / 2,
        height * 0.72
      );

      vignette.addColorStop(0, "rgba(255,255,255,0.04)");
      vignette.addColorStop(1, "rgba(0,0,0,0.55)");

      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);

      function moldedStrokePath(drawPath, lightWidth, darkWidth) {
        ctx.save();
        ctx.translate(3, 4);
        ctx.strokeStyle = "rgba(0,0,0,0.82)";
        ctx.lineWidth = darkWidth;
        drawPath();
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.translate(-2, -2);
        ctx.strokeStyle = "rgba(255,255,255,0.105)";
        ctx.lineWidth = lightWidth;
        drawPath();
        ctx.stroke();
        ctx.restore();
      }

      function backRoundedRectPath(x, y, w, h, r) {
        return function () {
          roundedRect(ctx, x, y, w, h, r);
        };
      }

      moldedStrokePath(
        backRoundedRectPath(32, 32, width - 64, height - 64, 44),
        6,
        14
      );

      moldedStrokePath(
        backRoundedRectPath(66, 74, width - 132, height - 148, 28),
        4,
        9
      );

      ctx.save();
      ctx.translate(width / 2, height / 2);

      function drawReliefDiamond(cx, cy, w, h) {
        moldedStrokePath(function () {
          ctx.beginPath();
          ctx.moveTo(cx, cy - h / 2);
          ctx.lineTo(cx + w / 2, cy);
          ctx.lineTo(cx, cy + h / 2);
          ctx.lineTo(cx - w / 2, cy);
          ctx.closePath();
        }, 4, 9);
      }

      drawReliefDiamond(0, 0, 310, 610);
      drawReliefDiamond(0, 0, 230, 455);
      drawReliefDiamond(0, 0, 145, 285);

      const smallDiamonds = [
        [0, -330, 150, 170],
        [0, 330, 150, 170],
        [-145, -190, 110, 150],
        [145, -190, 110, 150],
        [-145, 190, 110, 150],
        [145, 190, 110, 150],
        [-175, 0, 95, 140],
        [175, 0, 95, 140]
      ];

      for (const d of smallDiamonds) {
        drawReliefDiamond(d[0], d[1], d[2], d[3]);
      }

      moldedStrokePath(function () {
        ctx.beginPath();
        ctx.ellipse(0, 0, 48, 68, 0, 0, Math.PI * 2);
      }, 4, 10);

      const dotPositions = [
        [-82, -88], [82, -88],
        [-82, 88], [82, 88],
        [0, -195], [0, 195],
        [-118, -290], [118, -290],
        [-118, 290], [118, 290]
      ];

      for (const pos of dotPositions) {
        const x = pos[0];
        const y = pos[1];

        ctx.beginPath();
        ctx.arc(x + 3, y + 4, 18, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.78)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x - 2, y - 2, 16, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.055)";
        ctx.fill();
      }

      ctx.restore();

      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = Math.random() * 8 - 4;
        data[i] += noise;
        data[i + 1] += noise;
        data[i + 2] += noise;
      }

      ctx.putImageData(imageData, 0, 0);

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return texture;
    }

    function createSideTexture() {
      const width = 256;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, width, 0);
      gradient.addColorStop(0, "#050505");
      gradient.addColorStop(0.25, "#1c1c1c");
      gradient.addColorStop(0.5, "#111111");
      gradient.addColorStop(0.75, "#030303");
      gradient.addColorStop(1, "#171717");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "rgba(255,255,255,0.055)";
      ctx.lineWidth = 3;

      for (let y = 40; y < height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return texture;
    }

    // --------------------------------------------------
    // 5. Geometry helpers
    // --------------------------------------------------

    function createRoundedDominoShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;

      const shape = new THREE.Shape();

      shape.moveTo(x + radius, y);
      shape.lineTo(x + width - radius, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + radius);
      shape.lineTo(x + width, y + height - radius);
      shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      shape.lineTo(x + radius, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - radius);
      shape.lineTo(x, y + radius);
      shape.quadraticCurveTo(x, y, x + radius, y);
      shape.closePath();

      return shape;
    }

    const dominoWidth = 1.35;
    const dominoHeight = 2.7;
    const dominoDepth = 0.22;
    const cornerRadius = 0.14;

    const dominoShape = createRoundedDominoShape(
      dominoWidth,
      dominoHeight,
      cornerRadius
    );

    // Main body is now just physical black plastic.
    // The decorative front/back are separate face meshes.
    const bodyGeometry = new THREE.ExtrudeGeometry(dominoShape, {
      depth: dominoDepth,
      bevelEnabled: true,
      bevelThickness: 0.045,
      bevelSize: 0.045,
      bevelSegments: 8,
      curveSegments: 18
    });

    bodyGeometry.center();

    const sideTexture = createSideTexture();

    const bodyMaterial = new THREE.MeshPhongMaterial({
      map: sideTexture,
      color: 0x111111,
      shininess: 85,
      specular: new THREE.Color(0x444444)
    });

    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.castShadow = true;
    body.receiveShadow = true;

    // Dedicated full-size front face.
    // This fixes the corner-pushed texture problem.
    const frontTexture = createFrontTexture();

    const frontMaterial = new THREE.MeshPhongMaterial({
      map: frontTexture,
      shininess: 58,
      specular: new THREE.Color(0x333333),
      side: THREE.DoubleSide
    });

    const frontGeometry = new THREE.PlaneGeometry(dominoWidth * 0.965, dominoHeight * 0.965);

    const frontFace = new THREE.Mesh(frontGeometry, frontMaterial);
    frontFace.position.z = dominoDepth / 2 + 0.052;
    frontFace.castShadow = true;
    frontFace.receiveShadow = true;

    // Dedicated full-size back face.
    const backTexture = createBackTexture();

    const backMaterial = new THREE.MeshPhongMaterial({
      map: backTexture,
      shininess: 62,
      specular: new THREE.Color(0x333333),
      side: THREE.DoubleSide
    });

    const backGeometry = new THREE.PlaneGeometry(dominoWidth * 0.965, dominoHeight * 0.965);

    const backFace = new THREE.Mesh(backGeometry, backMaterial);
    backFace.position.z = -dominoDepth / 2 - 0.052;
    backFace.rotation.y = Math.PI;
    backFace.castShadow = true;
    backFace.receiveShadow = true;

    const dominoGroup = new THREE.Group();
    dominoGroup.add(body);
    dominoGroup.add(frontFace);
    dominoGroup.add(backFace);

    dominoGroup.rotation.x = THREE.MathUtils.degToRad(-12);
    dominoGroup.rotation.y = THREE.MathUtils.degToRad(24);
    dominoGroup.rotation.z = THREE.MathUtils.degToRad(-4);

    scene.add(dominoGroup);

    // --------------------------------------------------
    // 6. Soft ground shadow
    // --------------------------------------------------

    const shadowPlaneGeometry = new THREE.PlaneGeometry(8, 8);

    const shadowPlaneMaterial = new THREE.ShadowMaterial({
      opacity: 0.18
    });

    const shadowPlane = new THREE.Mesh(shadowPlaneGeometry, shadowPlaneMaterial);
    shadowPlane.position.z = -1.2;
    shadowPlane.position.y = -1.5;
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;

    scene.add(shadowPlane);

    // --------------------------------------------------
    // 7. Mouse and touch spin controls
    // --------------------------------------------------

    const dominoState = {
      isDragging: false,
      previousX: 0,
      previousY: 0,
      spinX: 0,
      spinY: 0
    };

    function pointerDown(x, y) {
      dominoState.isDragging = true;
      dominoState.previousX = x;
      dominoState.previousY = y;
    }

    function pointerMove(x, y) {
      if (!dominoState.isDragging) {
        return;
      }

      const deltaX = x - dominoState.previousX;
      const deltaY = y - dominoState.previousY;

      dominoState.spinY = deltaX * 0.006;
      dominoState.spinX = deltaY * 0.006;

      dominoGroup.rotation.y += dominoState.spinY;
      dominoGroup.rotation.x += dominoState.spinX;

      dominoState.previousX = x;
      dominoState.previousY = y;
    }

    function pointerUp() {
      dominoState.isDragging = false;
    }

    window.addEventListener("mousedown", function (event) {
      pointerDown(event.clientX, event.clientY);
    });

    window.addEventListener("mousemove", function (event) {
      pointerMove(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", pointerUp);
    window.addEventListener("mouseleave", pointerUp);

    window.addEventListener(
      "touchstart",
      function (event) {
        if (event.touches.length > 0) {
          pointerDown(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener(
      "touchmove",
      function (event) {
        if (event.touches.length > 0) {
          pointerMove(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener("touchend", pointerUp);
    window.addEventListener("touchcancel", pointerUp);

    // --------------------------------------------------
    // 8. Animation loop
    // --------------------------------------------------

    const friction = 0.955;

    function animate() {
      requestAnimationFrame(animate);

      if (!dominoState.isDragging) {
        dominoState.spinX *= friction;
        dominoState.spinY *= friction;

        dominoGroup.rotation.x += dominoState.spinX;
        dominoGroup.rotation.y += dominoState.spinY;
      }

      renderer.render(scene, camera);
    }

    animate();

    // --------------------------------------------------
    // 9. Resize handling
    // --------------------------------------------------

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
