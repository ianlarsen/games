<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Black Domino</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffffff 0%, #eeeeee 62%, #d8d8d8 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #1a1a1a;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    p {
      margin: 3px 0;
      color: #555;
      font-size: 0.9rem;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="ui-overlay">
    <h1>Interactive 3D Domino</h1>
    <p>One white dot on each side.</p>
    <p>Click/touch and drag to spin the tile.</p>
  </div>

  <script>
    // --------------------------------------------------
    // 1. Scene, camera, renderer
    // --------------------------------------------------

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 0.1, 5.2);

    const renderer = new THREE.WebGLRenderer({
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    if (THREE.sRGBEncoding) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }

    document.body.appendChild(renderer.domElement);

    // --------------------------------------------------
    // 2. Lighting
    // --------------------------------------------------

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.38);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.15);
    keyLight.position.set(4, 5, 6);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xbfd4ff, 0.35);
    fillLight.position.set(-4, 2, 3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.45);
    rimLight.position.set(-3, -2, -5);
    scene.add(rimLight);

    // --------------------------------------------------
    // 3. Texture helpers
    // --------------------------------------------------

    function roundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawPip(ctx, x, y, radius) {
      // Shadow/recess ring
      ctx.fillStyle = "#050505";
      ctx.beginPath();
      ctx.arc(x + 3, y + 4, radius + 4, 0, Math.PI * 2);
      ctx.fill();

      // Clean white inset pip
      const gradient = ctx.createRadialGradient(
        x - radius * 0.35,
        y - radius * 0.35,
        radius * 0.1,
        x,
        y,
        radius
      );

      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(0.65, "#f2f2f2");
      gradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      // Tiny highlight
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.beginPath();
      ctx.arc(x - radius * 0.25, y - radius * 0.25, radius * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }

    function createFrontTexture() {
      const width = 512;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      // Slight black-plastic gradient
      const bodyGradient = ctx.createLinearGradient(0, 0, width, height);
      bodyGradient.addColorStop(0, "#202020");
      bodyGradient.addColorStop(0.45, "#0f0f0f");
      bodyGradient.addColorStop(1, "#050505");

      ctx.fillStyle = bodyGradient;
      ctx.fillRect(0, 0, width, height);

      // Subtle edge vignette
      const edgeGradient = ctx.createRadialGradient(
        width / 2,
        height / 2,
        width * 0.2,
        width / 2,
        height / 2,
        height * 0.7
      );
      edgeGradient.addColorStop(0, "rgba(255,255,255,0.04)");
      edgeGradient.addColorStop(1, "rgba(0,0,0,0.42)");
      ctx.fillStyle = edgeGradient;
      ctx.fillRect(0, 0, width, height);

      // Inset border line
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 10;
      roundedRect(ctx, 24, 24, width - 48, height - 48, 42);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.72)";
      ctx.lineWidth = 5;
      roundedRect(ctx, 36, 36, width - 72, height - 72, 34);
      ctx.stroke();

      // Center divider groove
      const centerY = height / 2;

      ctx.strokeStyle = "rgba(255,255,255,0.10)";
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(56, centerY - 5);
      ctx.lineTo(width - 56, centerY - 5);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.9)";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(56, centerY + 3);
      ctx.lineTo(width - 56, centerY + 3);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(56, centerY + 9);
      ctx.lineTo(width - 56, centerY + 9);
      ctx.stroke();

      // One pip on each half
      drawPip(ctx, width / 2, height * 0.25, 42);
      drawPip(ctx, width / 2, height * 0.75, 42);

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return texture;
    }

    function createBackTexture() {
      const width = 512;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const bodyGradient = ctx.createLinearGradient(0, 0, width, height);
      bodyGradient.addColorStop(0, "#222222");
      bodyGradient.addColorStop(0.5, "#101010");
      bodyGradient.addColorStop(1, "#030303");

      ctx.fillStyle = bodyGradient;
      ctx.fillRect(0, 0, width, height);

      // Outer molded border
      ctx.strokeStyle = "rgba(255,255,255,0.10)";
      ctx.lineWidth = 14;
      roundedRect(ctx, 28, 28, width - 56, height - 56, 44);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.85)";
      ctx.lineWidth = 6;
      roundedRect(ctx, 46, 46, width - 92, height - 92, 34);
      ctx.stroke();

      // Relief pattern: interlocking diamond / lattice motif
      ctx.save();
      ctx.translate(width / 2, height / 2);

      const patternStrokeLight = "rgba(255,255,255,0.105)";
      const patternStrokeDark = "rgba(0,0,0,0.72)";

      function drawDiamond(size, offsetX, offsetY) {
        ctx.beginPath();
        ctx.moveTo(offsetX, offsetY - size);
        ctx.lineTo(offsetX + size * 0.72, offsetY);
        ctx.lineTo(offsetX, offsetY + size);
        ctx.lineTo(offsetX - size * 0.72, offsetY);
        ctx.closePath();

        // Dark lower/right impression
        ctx.strokeStyle = patternStrokeDark;
        ctx.lineWidth = 10;
        ctx.stroke();

        // Light upper highlight, slightly offset
        ctx.beginPath();
        ctx.moveTo(offsetX - 2, offsetY - size - 2);
        ctx.lineTo(offsetX + size * 0.72 - 2, offsetY - 2);
        ctx.lineTo(offsetX - 2, offsetY + size - 2);
        ctx.lineTo(offsetX - size * 0.72 - 2, offsetY - 2);
        ctx.closePath();

        ctx.strokeStyle = patternStrokeLight;
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      drawDiamond(265, 0, 0);
      drawDiamond(190, 0, 0);
      drawDiamond(115, 0, 0);

      // Small center medallion
      ctx.beginPath();
      ctx.arc(0, 0, 44, 0, Math.PI * 2);
      ctx.strokeStyle = patternStrokeDark;
      ctx.lineWidth = 10;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(-2, -2, 44, 0, Math.PI * 2);
      ctx.strokeStyle = patternStrokeLight;
      ctx.lineWidth = 4;
      ctx.stroke();

      // Repeating small molded dots, same black-on-black plastic style
      const positions = [
        [-110, -220], [110, -220],
        [-150, -95], [150, -95],
        [-150, 95], [150, 95],
        [-110, 220], [110, 220]
      ];

      for (const pos of positions) {
        const x = pos[0];
        const y = pos[1];

        ctx.beginPath();
        ctx.arc(x + 3, y + 4, 20, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x - 2, y - 2, 18, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.055)";
        ctx.fill();
      }

      ctx.restore();

      // Fine plastic noise
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = Math.random() * 10 - 5;
        data[i] += noise;
        data[i + 1] += noise;
        data[i + 2] += noise;
      }

      ctx.putImageData(imageData, 0, 0);

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return texture;
    }

    function createSideTexture() {
      const width = 256;
      const height = 1024;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, width, 0);
      gradient.addColorStop(0, "#050505");
      gradient.addColorStop(0.25, "#1c1c1c");
      gradient.addColorStop(0.5, "#111111");
      gradient.addColorStop(0.75, "#030303");
      gradient.addColorStop(1, "#171717");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      // Subtle molded edge stripes
      ctx.strokeStyle = "rgba(255,255,255,0.055)";
      ctx.lineWidth = 3;

      for (let y = 40; y < height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);

      if (THREE.sRGBEncoding) {
        texture.encoding = THREE.sRGBEncoding;
      }

      return texture;
    }

    // --------------------------------------------------
    // 4. Domino geometry
    // --------------------------------------------------

    function createRoundedDominoShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;

      const shape = new THREE.Shape();

      shape.moveTo(x + radius, y);
      shape.lineTo(x + width - radius, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + radius);
      shape.lineTo(x + width, y + height - radius);
      shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      shape.lineTo(x + radius, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - radius);
      shape.lineTo(x, y + radius);
      shape.quadraticCurveTo(x, y, x + radius, y);
      shape.closePath();

      return shape;
    }

    const dominoWidth = 1.35;
    const dominoHeight = 2.7;
    const dominoDepth = 0.22;
    const cornerRadius = 0.14;

    const dominoShape = createRoundedDominoShape(
      dominoWidth,
      dominoHeight,
      cornerRadius
    );

    const dominoGeometry = new THREE.ExtrudeGeometry(dominoShape, {
      depth: dominoDepth,
      bevelEnabled: true,
      bevelThickness: 0.045,
      bevelSize: 0.045,
      bevelSegments: 8,
      curveSegments: 18
    });

    dominoGeometry.center();

    // ExtrudeGeometry creates material groups.
    // Material index 0 = front/back caps.
    // Material index 1 = sides/bevel.
    const frontTexture = createFrontTexture();
    const backTexture = createBackTexture();
    const sideTexture = createSideTexture();

    const frontMaterial = new THREE.MeshPhongMaterial({
      map: frontTexture,
      shininess: 55,
      specular: new THREE.Color(0x333333)
    });

    const sideMaterial = new THREE.MeshPhongMaterial({
      map: sideTexture,
      color: 0x111111,
      shininess: 80,
      specular: new THREE.Color(0x444444)
    });

    const domino = new THREE.Mesh(dominoGeometry, [
      frontMaterial,
      sideMaterial
    ]);

    domino.castShadow = true;
    domino.receiveShadow = true;

    // Add a separate back face just behind the rear side so the relief texture is guaranteed visible.
    const backGeometry = new THREE.ShapeGeometry(dominoShape);
    const backMaterial = new THREE.MeshPhongMaterial({
      map: backTexture,
      shininess: 60,
      specular: new THREE.Color(0x333333),
      side: THREE.FrontSide
    });

    const backFace = new THREE.Mesh(backGeometry, backMaterial);
    backFace.position.z = -dominoDepth / 2 - 0.047;
    backFace.rotation.y = Math.PI;
    backFace.castShadow = true;

    const dominoGroup = new THREE.Group();
    dominoGroup.add(domino);
    dominoGroup.add(backFace);

    // Start at a slight angle so the object immediately reads as 3D.
    dominoGroup.rotation.x = THREE.MathUtils.degToRad(-12);
    dominoGroup.rotation.y = THREE.MathUtils.degToRad(24);
    dominoGroup.rotation.z = THREE.MathUtils.degToRad(-4);

    scene.add(dominoGroup);

    // --------------------------------------------------
    // 5. Optional soft ground shadow
    // --------------------------------------------------

    const shadowPlaneGeometry = new THREE.PlaneGeometry(8, 8);

    const shadowPlaneMaterial = new THREE.ShadowMaterial({
      opacity: 0.18
    });

    const shadowPlane = new THREE.Mesh(shadowPlaneGeometry, shadowPlaneMaterial);
    shadowPlane.position.z = -1.2;
    shadowPlane.position.y = -1.5;
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);

    // --------------------------------------------------
    // 6. Mouse and touch spin controls
    // --------------------------------------------------

    const dominoState = {
      isDragging: false,
      previousX: 0,
      previousY: 0,
      spinX: 0,
      spinY: 0
    };

    function pointerDown(x, y) {
      dominoState.isDragging = true;
      dominoState.previousX = x;
      dominoState.previousY = y;
    }

    function pointerMove(x, y) {
      if (!dominoState.isDragging) {
        return;
      }

      const deltaX = x - dominoState.previousX;
      const deltaY = y - dominoState.previousY;

      dominoState.spinY = deltaX * 0.006;
      dominoState.spinX = deltaY * 0.006;

      dominoGroup.rotation.y += dominoState.spinY;
      dominoGroup.rotation.x += dominoState.spinX;

      dominoState.previousX = x;
      dominoState.previousY = y;
    }

    function pointerUp() {
      dominoState.isDragging = false;
    }

    window.addEventListener("mousedown", function (event) {
      pointerDown(event.clientX, event.clientY);
    });

    window.addEventListener("mousemove", function (event) {
      pointerMove(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", pointerUp);
    window.addEventListener("mouseleave", pointerUp);

    window.addEventListener(
      "touchstart",
      function (event) {
        if (event.touches.length > 0) {
          pointerDown(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener(
      "touchmove",
      function (event) {
        if (event.touches.length > 0) {
          pointerMove(event.touches[0].clientX, event.touches[0].clientY);
        }
      },
      { passive: true }
    );

    window.addEventListener("touchend", pointerUp);
    window.addEventListener("touchcancel", pointerUp);

    // --------------------------------------------------
    // 7. Animation loop
    // --------------------------------------------------

    const friction = 0.955;

    function animate() {
      requestAnimationFrame(animate);

      if (!dominoState.isDragging) {
        dominoState.spinX *= friction;
        dominoState.spinY *= friction;

        dominoGroup.rotation.x += dominoState.spinX;
        dominoGroup.rotation.y += dominoState.spinY;
      }

      renderer.render(scene, camera);
    }

    animate();

    // --------------------------------------------------
    // 8. Resize handling
    // --------------------------------------------------

    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
